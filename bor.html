<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bor Sportbar</title>

<style>
body{
margin:0;
background:#05070a;
color:white;
font-family:Arial, Helvetica, sans-serif;
overflow:hidden;
}

/* BAKGRUND LOGGA */
body::before{
content:"";
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:950px;
height:950px;
background:url("bor.png") no-repeat center;
background-size:contain;
opacity:0.50;
filter:blur(0.4px);
z-index:0;
}

.container{
display:grid;
grid-template-columns:0.9fr 1.7fr;
gap:25px;
padding:25px 35px;
height:100vh;
box-sizing:border-box;
position:relative;
z-index:2;
}

.panel{
background:#0c1118ee;
border-radius:18px;
padding:22px;
box-shadow:0 0 40px rgba(0,0,0,0.7);
}

/* INFO */
.block{margin-bottom:25px;}
.title{font-size:18px;color:#9aa4af;margin-bottom:6px;}
.big{font-size:28px;font-weight:bold;}
.form{font-size:22px;letter-spacing:6px;}

/* TABELL */
table{
width:100%;
border-collapse:collapse;
font-size:20px;
}

td,th{
padding:8px 10px;
border-bottom:1px solid #1d2430;
}

th{
font-weight:normal;
color:#8b97a7;
}

.bor{
color:#00ff87;
font-weight:bold;
}

/* FOOTER */
.footer{
position:absolute;
bottom:6px;
width:100%;
text-align:center;
font-size:12px;
opacity:0.35;
}
</style>
</head>

<body>

<div class="container">

<!-- INFO -->
<div class="panel">

<div class="block">
<div class="title">Senaste match</div>
<div class="big" id="lastMatch">Säsongen ej startad</div>
</div>

<div class="block">
<div class="title">Nästa match</div>
<div class="big" id="nextMatch">Väntar på seriepremiär</div>
</div>

<div class="block">
<div class="title">Form</div>
<div class="form" id="formRad">- - - - -</div>
</div>

</div>

<!-- TABELL -->
<div class="panel">

<table>
<tr>
<th>#</th>
<th>Lag</th>
<th>P</th>
<th>+/-</th>
</tr>

<tr class="bor"><td>1</td><td>Bors SK</td><td>0</td><td>0</td></tr>
<tr><td>2</td><td>Hallaryds IF</td><td>0</td><td>0</td></tr>
<tr><td>3</td><td>HL21</td><td>0</td><td>0</td></tr>
<tr><td>4</td><td>Lagans AIK</td><td>0</td><td>0</td></tr>
<tr><td>5</td><td>Liatorps IF/Eneryda IF</td><td>0</td><td>0</td></tr>
<tr><td>6</td><td>Rydaholms GoIF</td><td>0</td><td>0</td></tr>
<tr><td>7</td><td>Ryssby IF</td><td>0</td><td>0</td></tr>
<tr><td>8</td><td>Strömsnäsbruks IF</td><td>0</td><td>0</td></tr>
<tr><td>9</td><td>Torpa IF</td><td>0</td><td>0</td></tr>
<tr><td>10</td><td>Urshults IF</td><td>0</td><td>0</td></tr>
<tr><td>11</td><td>Virestads IF</td><td>0</td><td>0</td></tr>
<tr><td>12</td><td>VTIF/Grimslöv</td><td>0</td><td>0</td></tr>

</table>

</div>
</div>

<div class="footer" id="updateTime"></div>

<script>

/* ===== FORM (kommer fyllas auto sen) ===== */
let form = [];

/* render form */
let formHtml="";
if(form.length===0){formHtml="- - - - -";}
form.forEach(f=>{
if(f=="V") formHtml+="🟢";
if(f=="O") formHtml+="🟡";
if(f=="F") formHtml+="🔴";
});
document.getElementById("formRad").innerHTML=formHtml;

/* uppdaterad tid */
function updateClock(){
let d=new Date();
let t=d.toLocaleTimeString("sv-SE",{hour:'2-digit',minute:'2-digit'});
let dat=d.toLocaleDateString("sv-SE");
document.getElementById("updateTime").innerText="Aktiv sportbar • "+dat+" "+t;
}
updateClock();

/* ===== AUTO SYSTEM (vilande tills säsong start) ===== */
/* När serien startar kopplas live-data in här */
async function autoCheck(){
/* här kopplas live-tabell senare vis säsongsstart */
}
setInterval(autoCheck,600000); // redo

</script>

</body>
</html>

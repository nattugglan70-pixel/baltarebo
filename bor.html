<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bor SK Sportbar</title>

<style>
body{
margin:0;
background:#05070a;
color:white;
font-family:Arial, Helvetica, sans-serif;
overflow:hidden;
}

/* BAKGRUND LOGGA */
body::before{
content:"";
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:1100px;
height:1100px;
background:url("bor.png") no-repeat center;
background-size:contain;
opacity:0.50;
filter:blur(0.5px);
z-index:0;
}

.container{
display:grid;
grid-template-columns:1.4fr 1fr;
gap:30px;
padding:50px;
position:relative;
z-index:2;
height:100vh;
box-sizing:border-box;
}

.panel{
background:#0c1118ee;
border-radius:22px;
padding:30px;
box-shadow:0 0 60px rgba(0,0,0,0.8);
position:relative;
}

h1{
margin-top:0;
font-size:40px;
letter-spacing:1px;
}

.bigPosition{
font-size:90px;
font-weight:bold;
color:#00ff87;
text-align:center;
margin:20px 0;
}

.subInfo{
text-align:center;
font-size:26px;
color:#ccc;
margin-bottom:10px;
}

.matchCard{
padding:18px 10px;
border-bottom:1px solid #1f2630;
}

.matchTeams{
font-size:26px;
font-weight:bold;
}

.matchTime{
font-size:20px;
color:#aaa;
margin-top:6px;
}

table{
width:100%;
border-collapse:collapse;
font-size:20px;
}

th,td{
padding:12px;
border-bottom:1px solid #222;
}

.borRow{
color:#00ff87;
font-weight:bold;
}

.footer{
position:absolute;
bottom:15px;
width:100%;
text-align:center;
font-size:12px;
opacity:0.25;
}
</style>
</head>

<body>

<div class="container">

<!-- VÄNSTER PANEL -->
<div class="panel">
<h1>Division 5</h1>

<div class="bigPosition" id="placering">1:a</div>
<div class="subInfo" id="poang">0 poäng</div>
<div class="subInfo" id="mal">0 i målskillnad</div>

<h2>Senaste / Nästa</h2>
<div id="matches"></div>

</div>

<!-- HÖGER PANEL -->
<div class="panel">

<h2>Tabell</h2>

<table>
<tr>
<th>#</th>
<th>Lag</th>
<th>P</th>
<th>+/-</th>
</tr>

<tr class="borRow"><td>1</td><td>Bors SK</td><td>0</td><td>0</td></tr>
<tr><td>2</td><td>Hallaryds IF</td><td>0</td><td>0</td></tr>
<tr><td>3</td><td>HL21</td><td>0</td><td>0</td></tr>
<tr><td>4</td><td>Lagans AIK</td><td>0</td><td>0</td></tr>
<tr><td>5</td><td>Liatorps IF/Eneryda IF</td><td>0</td><td>0</td></tr>
<tr><td>6</td><td>Rydaholms GoIF</td><td>0</td><td>0</td></tr>
<tr><td>7</td><td>Ryssby IF</td><td>0</td><td>0</td></tr>
<tr><td>8</td><td>Strömsnäsbruks IF</td><td>0</td><td>0</td></tr>
<tr><td>9</td><td>Torpa IF</td><td>0</td><td>0</td></tr>
<tr><td>10</td><td>Urshults IF</td><td>0</td><td>0</td></tr>
<tr><td>11</td><td>Virestads IF</td><td>0</td><td>0</td></tr>
<tr><td>12</td><td>VTIF/Grimslöv</td><td>0</td><td>0</td></tr>

</table>

</div>

</div>

<div class="footer">Bor SK Sportbar aktiv</div>

<script>

/* ÄNDRA ENDAST HÄR EFTER MATCH (tills vi kopplar live) */
let borPlacering = 1;
let borPoang = 0;
let borMal = 0;

const matches = [
["Premiär","Bors SK – ???"],
["Omg 2","??? – Bors SK"],
["Omg 3","Bors SK – ???"]
];

function updateInfo(){
document.getElementById("placering").innerText = borPlacering + ":a";
document.getElementById("poang").innerText = borPoang + " poäng";
document.getElementById("mal").innerText = borMal + " i målskillnad";
}

function showMatches(){
let html="";
matches.forEach(m=>{
html+=`
<div class="matchCard">
<div class="matchTeams">${m[1]}</div>
<div class="matchTime">${m[0]}</div>
</div>`;
});
document.getElementById("matches").innerHTML = html;
}

updateInfo();
showMatches();

/* REFRESH VID ÖPPNING + redo för framtida auto */
setInterval(()=>{location.reload();},600000);

</script>

</body>
</html>

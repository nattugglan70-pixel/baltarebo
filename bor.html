<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bor Sportbar</title>

<style>
body{
margin:0;
background:#05070a;
color:white;
font-family:Arial, Helvetica, sans-serif;
overflow:hidden;
}

/* BAKGRUND */
body::before{
content:"";
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:1150px;
height:1150px;
background:url("bor.png") no-repeat center;
background-size:contain;
opacity:0.50;
filter:blur(0.5px);
z-index:0;
}

.container{
display:grid;
grid-template-columns:1fr 1.6fr;
gap:40px;
padding:50px;
height:100vh;
box-sizing:border-box;
position:relative;
z-index:2;
}

.panel{
background:#0c1118ee;
border-radius:22px;
padding:30px;
box-shadow:0 0 60px rgba(0,0,0,0.8);
}

/* MATCHINFO */
.block{
margin-bottom:30px;
}

.title{
font-size:22px;
color:#aaa;
margin-bottom:8px;
}

.big{
font-size:34px;
font-weight:bold;
}

.form{
font-size:28px;
letter-spacing:6px;
}

/* TABELL */
table{
width:100%;
border-collapse:collapse;
font-size:24px;
}

td,th{
padding:14px;
border-bottom:1px solid #222;
}

.bor{
color:#00ff87;
font-weight:bold;
}

/* FOOTER */
.footer{
position:absolute;
bottom:12px;
width:100%;
text-align:center;
font-size:13px;
opacity:0.35;
}
</style>
</head>

<body>

<div class="container">

<!-- VÄNSTER INFO -->
<div class="panel">

<div class="block">
<div class="title">Senaste match</div>
<div class="big" id="lastMatch">Ingen match spelad</div>
</div>

<div class="block">
<div class="title">Nästa match</div>
<div class="big" id="nextMatch">Schema ej klart</div>
</div>

<div class="block">
<div class="title">Form</div>
<div class="form" id="formRad">- - - - -</div>
</div>

</div>

<!-- TABELL -->
<div class="panel">

<table>
<tr>
<th>#</th>
<th>Lag</th>
<th>P</th>
<th>+/-</th>
</tr>

<tr class="bor"><td>1</td><td>Bors SK</td><td>0</td><td>0</td></tr>
<tr><td>2</td><td>Hallaryds IF</td><td>0</td><td>0</td></tr>
<tr><td>3</td><td>HL21</td><td>0</td><td>0</td></tr>
<tr><td>4</td><td>Lagans AIK</td><td>0</td><td>0</td></tr>
<tr><td>5</td><td>Liatorps IF/Eneryda IF</td><td>0</td><td>0</td></tr>
<tr><td>6</td><td>Rydaholms GoIF</td><td>0</td><td>0</td></tr>
<tr><td>7</td><td>Ryssby IF</td><td>0</td><td>0</td></tr>
<tr><td>8</td><td>Strömsnäsbruks IF</td><td>0</td><td>0</td></tr>
<tr><td>9</td><td>Torpa IF</td><td>0</td><td>0</td></tr>
<tr><td>10</td><td>Urshults IF</td><td>0</td><td>0</td></tr>
<tr><td>11</td><td>Virestads IF</td><td>0</td><td>0</td></tr>
<tr><td>12</td><td>VTIF/Grimslöv</td><td>0</td><td>0</td></tr>

</table>

</div>

</div>

<div class="footer" id="updateTime">Uppdaterad: --</div>

<script>

/* FYLL I NÄR SÄSONG STARTAR */
let lastMatch = "Bor – Hallaryd 3-1";
let nextMatch = "Lör 13:00  Ryssby – Bor";
let form = ["V","V","F","O","V"]; // senaste 5

document.getElementById("lastMatch").innerText = lastMatch;
document.getElementById("nextMatch").innerText = nextMatch;

/* FORM */
let formHtml="";
form.forEach(f=>{
if(f=="V") formHtml+="🟢";
if(f=="O") formHtml+="🟡";
if(f=="F") formHtml+="🔴";
});
document.getElementById("formRad").innerHTML=formHtml;

/* UPPDATERAD TID */
function updateClock(){
let d=new Date();
let t=d.toLocaleTimeString("sv-SE",{hour:'2-digit',minute:'2-digit'});
let dat=d.toLocaleDateString("sv-SE");
document.getElementById("updateTime").innerText="Uppdaterad: "+dat+" "+t;
}
updateClock();

/* AUTO REFRESH */
setInterval(()=>{
location.reload();
},3600000); // 1 gång/timme nu

</script>

</body>
</html>

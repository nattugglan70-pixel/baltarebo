<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Väderdashboard</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(to right, #141e30, #243b55);
  color: white;
  margin: 0;
  padding: 30px;
}
.container {
  max-width: 900px;
  margin: auto;
}

/* ===== DAGENS VÄDERBLOCK ===== */
.card {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  border-radius: 20px;
  padding: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
  margin-bottom: 25px;
  position: relative;
}

/* HUVUDBLOCK */
.current-weather {
  display: flex;
  gap: 20px;
}

/* VÄDERMAIN */
.weather-main {
  display: flex;
  align-items: center;
  gap: 20px;
  flex: 2;
}
.weather-main img {
  width: 80px;
}

/* EXTRA INFO LEFT */
.extra-info {
  display: flex;
  flex-direction: column;
  gap: 6px;
  font-size: 14px;
}
.wind-direction {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 14px;
}

/* Temperatur */
.temp-block {
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.temp {
  font-size: 52px;
  font-weight: bold;
}
.feels-like {
  opacity: 0.8;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

/* HÖGERINFO */
.weather-info {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 8px;
  font-size: 16px;
  justify-content: center;
}
.date-week {
  font-size: 16px;
  opacity: 0.9;
  margin-bottom: 5px;
}

/* 5 DAGARS PROGNOS */
.forecast {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 15px;
}
.day-card {
  background: rgba(255,255,255,0.06);
  padding: 15px;
  border-radius: 16px;
  text-align: center;
  transition: transform 0.2s ease;
}
.day-card:hover {
  transform: translateY(-4px);
}
.day-card img {
  width: 45px;
}
.day-name {
  font-weight: bold;
  margin-bottom: 5px;
}
.temp-range {
  font-size: 14px;
}
</style>
</head>
<body>

<div class="container">

<!-- DAGENS VÄDER -->
<div class="card current-weather">
  <div class="weather-main">
    <img id="weatherIcon" src="">
    <div class="extra-info">
      <div class="feels-like" id="feelsLike">Känns som --° <span id="windArrow">⬆</span></div>
      <div>Vind: <span id="wind">-- m/s</span></div>
      <div>Luftfuktighet: <span id="humidity">--%</span></div>
      <div>Tryck: <span id="pressure">-- hPa</span></div>
      <div>Nederbörd (1h): <span id="precip">-- mm</span></div>
      <div>Igår samma tid: <span id="tempYesterday">--°</span></div>
      <div>Igår – Min: <span id="yesterdayMin">--°</span> / Max: <span id="yesterdayMax">--°</span></div>
    </div>
    <div class="temp-block">
      <div class="temp" id="temperature">--°</div>
    </div>
  </div>
  <div class="weather-info">
    <div class="date-week" id="dateWeek">--</div>
    <div>Senast uppdaterad: <span id="updatedTime">--:--</span></div>
  </div>
</div>

<!-- 5-DYGN -->
<div class="card">
  <h3>5-dygnsprognos</h3>
  <div class="forecast" id="forecast"></div>
</div>

</div>

<script>
// ===== CONFIG =====
const fallback = { lat: 57.173, lon: 14.040, name: "Bor" };

// ===== DATUM + VECKA =====
function updateDateWeek() {
  const now = new Date();
  const dayNum = now.getDay() || 7;
  const date = new Date(now);
  const yearStart = new Date(date.getFullYear(),0,1);
  const week = Math.ceil((((date - yearStart)/86400000 + 1)/7));
  document.getElementById("dateWeek").innerText =
    now.toLocaleDateString('sv-SE', { weekday:'long', day:'numeric', month:'long', year:'numeric'}) + " | Vecka " + week;
}

// ===== KORREKT KÄNNS SOM BERÄKNING =====
function calculateFeelsLike(tempC, windMps) {
  // Om temp ≤10 och vind > 1.3 m/s, använd wind chill
  if(tempC <= 10 && windMps > 1.3){
    const vKmh = windMps * 3.6;
    return 13.12 + 0.6215*tempC - 11.37*Math.pow(vKmh,0.16) + 0.3965*tempC*Math.pow(vKmh,0.16);
  }
  // Om temp ≥20 använd värmeindex (för enkelhet, annars returnera temp)
  return tempC;
}

// ===== WEATHER FETCH =====
async function getWeather(lat, lon) {
  updateDateWeek();
  const now = new Date();

  // Aktuellt
  const urlCurrent = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,apparent_temperature,weather_code,wind_speed_10m,wind_direction_10m,relative_humidity_2m,surface_pressure,precipitation&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=Europe/Stockholm&forecast_days=6`;
  const res = await fetch(urlCurrent);
  const data = await res.json();

  const c = data.current_weather || data.current;
  const feels = calculateFeelsLike(c.temperature_2m, c.wind_speed_10m);

  temperature.textContent = Math.round(c.temperature_2m) + "°";
  feelsLike.innerHTML = `Känns som ${Math.round(feels)}° <span id="windArrow">${getWindArrow(c.wind_direction_10m)}</span>`;
  wind.textContent = c.wind_speed_10m + " m/s";
  humidity.textContent = c.relative_humidity_2m + " %";
  pressure.textContent = c.surface_pressure + " hPa";
  precip.textContent = (c.precipitation || 0) + " mm";
  weatherIcon.src = weatherCodeToIcon(c.weather_code);

  // Femdygnsprognos
  forecast.innerHTML = "";
  for(let i=1;i<=5;i++){
    const date = new Date(data.daily.time[i]);
    const dayName = date.toLocaleDateString("sv-SE",{weekday:'short'});
    const card = document.createElement("div");
    card.className = "day-card";
    card.innerHTML = `
      <div class="day-name">${dayName}</div>
      <img src="${weatherCodeToIcon(data.daily.weather_code[i])}">
      <div class="temp-range">
        ${Math.round(data.daily.temperature_2m_max[i])}° / ${Math.round(data.daily.temperature_2m_min[i])}°
      </div>`;
    forecast.appendChild(card);
  }

  // ===== HISTORISKT: IGÅR =====
  const yesterdayDate = new Date(now.getTime() - 86400000);
  const start = yesterdayDate.toISOString().split('T')[0];
  const end = start;
  const urlHistory = `https://archive-api.open-meteo.com/v1/archive?latitude=${lat}&longitude=${lon}&start_date=${start}&end_date=${end}&hourly=temperature_2m&timezone=Europe/Stockholm`;
  const resH = await fetch(urlHistory);
  const dataH = await resH.json();
  let temps = dataH.hourly.temperature_2m;
  let times = dataH.hourly.time.map(t=>new Date(t));
  let minY=999,maxY=-999,sameHourTemp=null;
  const nowHour = now.getHours();
  for(let i=0;i<temps.length;i++){
    const d = times[i];
    if(temps[i]<minY) minY=temps[i];
    if(temps[i]>maxY) maxY=temps[i];
    if(d.getHours()===nowHour) sameHourTemp = temps[i];
  }
  tempYesterday.textContent = sameHourTemp !== null ? Math.round(sameHourTemp)+"°" : "--";
  yesterdayMin.textContent = Math.round(minY);
  yesterdayMax.textContent = Math.round(maxY);

  // Uppdaterad tid
  updatedTime.textContent = now.toLocaleTimeString('sv-SE',{hour:'2-digit',minute:'2-digit'});
}

// ===== WIND ARROW =====
function getWindArrow(deg){
  // Enkel 8-kompass riktning
  if(deg>=337.5 || deg<22.5) return "⬆ N";
  if(deg>=22.5 && deg<67.5) return "↗ NE";
  if(deg>=67.5 && deg<112.5) return "→ E";
  if(deg>=112.5 && deg<157.5) return "↘ SE";
  if(deg>=157.5 && deg<202.5) return "⬇ S";
  if(deg>=202.5 && deg<247.5) return "↙ SW";
  if(deg>=247.5 && deg<292.5) return "← W";
  if(deg>=292.5 && deg<337.5) return "↖ NW";
  return "⬆";
}

// ===== GPS =====
if(navigator.geolocation){
  navigator.geolocation.getCurrentPosition(
    pos => getWeather(pos.coords.latitude,pos.coords.longitude),
    () => getWeather(fallback.lat,fallback.lon)
  );
} else {
  getWeather(fallback.lat,fallback.lon);
}

// ===== WEATHER CODE =====
function weatherCodeToIcon(code){
  if(code===0)return "https://cdn-icons-png.flaticon.com/512/869/869869.png";
  if([1,2].includes(code))return "https://cdn-icons-png.flaticon.com/512/1163/1163624.png";
  if(code===3)return "https://cdn-icons-png.flaticon.com/512/414/414825.png";
  if([61,80].includes(code))return "https://cdn-icons-png.flaticon.com/512/1163/1163657.png";
  if([71,85].includes(code))return "https://cdn-icons-png.flaticon.com/512/642/642102.png";
  return "https://cdn-icons-png.flaticon.com/512/1163/1163661.png";
}

</script>
</body>
</html>

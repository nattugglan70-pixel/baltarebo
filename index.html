<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>INFOBOARD</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #000;
  color: #fff;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 15px;
}

.section {
  margin: 10px 0;
  padding: 20px;
  background: #111;
  border-radius: 12px;
  width: 100%;
  max-width: 380px;
  box-shadow: 0 2px 10px rgba(255,255,255,0.2);
  text-align: center;
}

.value {
  font-size: 32px;
  font-weight: bold;
  margin: 8px 0;
}

.subtext {
  font-size: 16px;
  color: #ccc;
}

.yesterday-temp {
  color: gold;
  font-size: 20px;
  margin-top: 6px;
}

/* ===== Tooltip ===== */

.tooltip {
  position: relative;
  display: inline-block;
  cursor: default;
}

/* Fade + slide animation */
@keyframes tooltipFade {
  0% { opacity: 0; transform: translate(-50%, -10px); }
  100% { opacity: 1; transform: translate(-50%, 0); }
}

.big-tooltip {
  visibility: hidden;
  opacity: 0;
  background: rgba(0,0,0,0.95);
  color: #fff;
  padding: 12px 16px;
  border-radius: 12px;
  font-size: 14px;
  line-height: 1.6;
  min-width: 220px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.6);
  position: absolute;
  bottom: 125%;
  left: 50%;
  transform: translateX(-50%);
  z-index: 20;
  transition: opacity 0.3s ease;
}

.tooltip:hover .big-tooltip {
  visibility: visible;
  opacity: 1;
  animation: tooltipFade 0.3s ease forwards;
}

/* ===== Glide animation for temperature ===== */

@keyframes glideIn {
  0% { opacity: 0; transform: translateY(-10px); }
  50% { opacity: 0.5; transform: translateY(2px); }
  100% { opacity: 1; transform: translateY(0); }
}

.animate-update {
  animation: glideIn 0.5s ease-in-out;
}

/* ===== Min/max tooltip ===== */

.tooltiptext {
  visibility: hidden;
  background: gold;
  color: black;
  padding: 5px 8px;
  border-radius: 6px;
  font-size: 13px;
  position: absolute;
  bottom: 125%;
  left: 50%;
  transform: translateX(-50%);
  white-space: nowrap;
}

.tooltip:hover .tooltiptext {
  visibility: visible;
}

.minmax {
  font-size: 18px;
  line-height: 1.6;
  margin-top: 5px;
}

/* ===== Forecast ===== */

.forecast-row {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  margin-top: 10px;
}

.forecast-day {
  min-width: 60px;
  text-align: center;
}
</style>
</head>

<body>

<div class="section">
  <div id="date-week"></div>
  <div class="subtext" id="weather-updated">Senast uppdaterad: --:--</div>
</div>

<div class="section">
  <div class="tooltip value">
    <div id="temp-now">-- °C (-- °C)</div>
    <div class="big-tooltip" id="weather-tooltip">
      Laddar väderdata...
    </div>
  </div>
  <div class="yesterday-temp" id="temp-yesterday">-- °C</div>
</div>

<div class="section">
  <div class="tooltip minmax">
    <div id="today-minmax">Idag<br>Min: -- °C<br>Max: -- °C</div>
    <div class="tooltiptext" id="yesterday-minmax-tooltip">
      Igår – Min: -- °C | Max: -- °C
    </div>
  </div>
</div>

<div class="section">
  <div>Prognos 5 dagar:</div>
  <div class="forecast-row" id="forecast-5days"></div>
</div>

<script>
const lat = 57.114025;
const lon = 14.168177;

function animateUpdate(element) {
  element.classList.remove('animate-update');
  void element.offsetWidth;
  element.classList.add('animate-update');
}

function updateDateWeek() {
  const now = new Date();
  document.getElementById('date-week').innerText =
    now.toLocaleDateString('sv-SE', {
      weekday: 'long',
      day: 'numeric',
      month: 'long',
      year: 'numeric'
    });
}

async function updateWeatherNow() {
  try {
    const url = `https://opendata-download-metfcst.smhi.se/api/category/pmp3g/version/2/geotype/point/lon/${lon}/lat/${lat}/data.json`;
    const res = await fetch(url);
    const data = await res.json();

    const now = new Date();
    const current = data.timeSeries
      .map(ts => ({...ts, time:new Date(ts.validTime)}))
      .filter(ts => ts.time <= now)
      .sort((a,b)=>b.time-a.time)[0];

    if(!current) return;

    const params = current.parameters;

    const temp = params.find(p=>p.name==="t")?.values[0];
    const wind = params.find(p=>p.name==="ws")?.values[0];
    const humidity = params.find(p=>p.name==="r")?.values[0];
    const pressure = params.find(p=>p.name==="msl")?.values[0];
    const precip = params.find(p=>p.name==="pmean")?.values[0] || 0;
    const symbol = params.find(p=>p.name==="Wsymb2")?.values[0];

    let feelsLike = temp;

    if (temp <= 10 && wind > 1.3) {
      const windKmH = wind * 3.6;
      feelsLike = 13.12 + 0.6215*temp - 11.37*Math.pow(windKmH,0.16) + 0.3965*temp*Math.pow(windKmH,0.16);
    }

    let icon="☁️", weatherText="Molnigt";

    if(symbol===1){ icon="☀️"; weatherText="Klart väder"; }
    else if(symbol===2){ icon="🌤️"; weatherText="Lätt molnighet"; }
    else if(symbol===3){ icon="⛅"; weatherText="Växlande molnighet"; }
    else if(symbol===4){ icon="☁️"; weatherText="Mulet"; }
    else if(symbol===5){ icon="🌦️"; weatherText="Snöblandat regn"; }
    else if(symbol===6){ icon="🌧️"; weatherText="Regn"; }
    else if(symbol===7||symbol===8){ icon="🌨️"; weatherText="Snö"; }
    else if(symbol===9){ icon="⛈️"; weatherText="Åska"; }

    const tempNowDiv = document.getElementById('temp-now');
    tempNowDiv.innerHTML = `${icon} ${temp?.toFixed(1)} °C (${feelsLike?.toFixed(1)} °C)`;

    if(temp <= 10) tempNowDiv.style.color='#00bfff';
    else if(temp <= 20) tempNowDiv.style.color='#ffff00';
    else tempNowDiv.style.color='#ff4500';

    animateUpdate(tempNowDiv);

    document.getElementById('weather-tooltip').innerHTML = `
      <strong>${weatherText}</strong><br>
      🌡️ Temperatur: ${temp?.toFixed(1)} °C<br>
      🤔 Känns som: ${feelsLike?.toFixed(1)} °C<br>
      🌬️ Vind: ${wind?.toFixed(1)} m/s<br>
      💧 Luftfuktighet: ${humidity?.toFixed(0)} %<br>
      📈 Tryck: ${pressure?.toFixed(0)} hPa<br>
      🌧️ Nederbörd kommande timme: ${precip?.toFixed(1)} mm
    `;

    document.getElementById('weather-updated').innerText =
      "Senast uppdaterad: " +
      now.toLocaleTimeString('sv-SE',{hour:'2-digit',minute:'2-digit'});

  } catch(err){ console.error(err); }
}

updateDateWeek();
updateWeatherNow();
setInterval(updateWeatherNow,5*60*1000);
</script>

</body>
</html>

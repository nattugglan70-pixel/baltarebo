<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Väderdashboard</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(to right, #141e30, #243b55);
  color: white;
  margin: 0;
  padding: 30px;
}
.container {
  max-width: 900px;
  margin: auto;
}

/* ===== DAGENS VÄDERBLOCK ===== */
.card {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  border-radius: 20px;
  padding: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
  margin-bottom: 25px;
  position: relative;
  display: flex;
  justify-content: space-between;
}

/* LEFT COLUMN */
.left-column {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 10px;
}

/* CENTER COLUMN */
.center-column {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 6px;
}

/* RIGHT COLUMN */
.right-column {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 6px;
}

/* WEATHER MAIN */
.weather-main {
  display: flex;
  align-items: center;
  gap: 15px;
}
.weather-main img {
  width: 80px;
}
.temp {
  font-size: 52px;
  font-weight: bold;
}
.feels-like {
  opacity: 0.8;
  display: flex;
  align-items: center;
  gap: 8px;
}
.wind-direction {
  font-size: 32px; /* Justera storlek här */
}

/* FIVE-DAY FORECAST */
.forecast {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 15px;
}
.day-card {
  background: rgba(255,255,255,0.06);
  padding: 15px;
  border-radius: 16px;
  text-align: center;
  transition: transform 0.2s ease;
}
.day-card:hover {
  transform: translateY(-4px);
}
.day-card img {
  width: 45px;
}
.day-name {
  font-weight: bold;
  margin-bottom: 5px;
}
.temp-range {
  font-size: 14px;
}

/* DATUM/VECKA */
.date-week {
  font-size: 14px;
  opacity: 0.8;
  margin-bottom: 5px;
}
</style>
</head>
<body>

<div class="container">

<!-- DAGENS VÄDER -->
<div class="card">
  <!-- LEFT COLUMN -->
  <div class="left-column">
    <div class="weather-main">
      <img id="weatherIcon" src="">
      <div>
        <div class="temp" id="temperature">--°</div>
        <div class="feels-like">
          <span id="feelsLike">Känns som --°</span>
          <span class="wind-direction" id="windDirection">↑</span>
        </div>
      </div>
    </div>
  </div>

  <!-- CENTER COLUMN -->
  <div class="center-column">
    <div>Vind: <span id="wind">-- m/s</span></div>
    <div>Luftfuktighet: <span id="humidity">-- %</span></div>
    <div>Tryck: <span id="pressure">-- hPa</span></div>
    <div>Nederbörd (1h): <span id="precip">-- mm</span></div>
    <div>Igår samma tid: <span id="tempYesterday">--°</span></div>
    <div>Igår – Min: <span id="yesterdayMin">--°</span> / Max: <span id="yesterdayMax">--°</span></div>
  </div>

  <!-- RIGHT COLUMN -->
  <div class="right-column">
    <div class="date-week" id="dateWeek">--</div>
    <div>Senast uppdaterad: <span id="updatedTime">--:--</span></div>
  </div>
</div>

<!-- 5-DYGN -->
<div class="card">
  <h3>5-dygnsprognos</h3>
  <div class="forecast" id="forecast"></div>
</div>

</div>

<script>
// ===== CONFIG =====
const fallback = { lat: 57.173, lon: 14.040, name: "Bor", stationId: 98220 }; // Hagsult

// ===== DATUM + VECKA =====
function updateDateWeek() {
  const now = new Date();
  const dayNum = now.getDay() || 7;
  const date = new Date(now);
  const yearStart = new Date(date.getFullYear(),0,1);
  const week = Math.ceil((((date - yearStart)/86400000 + 1)/7));
  document.getElementById("dateWeek").innerText =
    now.toLocaleDateString('sv-SE', { weekday:'long', day:'numeric', month:'long', year:'numeric'}) + " | Vecka " + week;
}

// ===== FEELS LIKE FORMULA =====
// Wind chill, vind i km/h, temperatur i °C
function calculateFeelsLike(temp, windMs) {
  const windKmH = windMs * 3.6;
  if(temp <= 10 && windKmH > 4.8){
    return Math.round(13.12 + 0.6215*temp - 11.37*Math.pow(windKmH,0.16) + 0.3965*temp*Math.pow(windKmH,0.16));
  } else {
    return Math.round(temp);
  }
}

// ===== FETCH SMHI =====
async function getWeatherSMHI(lat, lon, stationId) {
  updateDateWeek();
  const now = new Date();
  const nowISO = now.toISOString();

  // SMHI punktprognos API
  const url = `https://opendata-download-metfcst.smhi.se/api/category/pmp3g/version/2/geotype/point/lon/${lon}/lat/${lat}/data.json`;
  const res = await fetch(url);
  const data = await res.json();

  // ===== DAGENS VÄDER =====
  // Hitta närmaste tidpunkt till nu
  const timeSeries = data.timeSeries;
  let closest = timeSeries[0];
  for(const ts of timeSeries){
    if(new Date(ts.validTime) >= now){
      closest = ts;
      break;
    }
  }

  const params = {};
  closest.parameters.forEach(p => params[p.name] = p.values[0]);

  const temp = params["t"];
  const wind = params["ws"];
  const windDirDeg = params["wd"];
  const humidity = params["r"];
  const pressure = params["msl"];
  const precip = params["pmean"];
  const weatherCode = params["Wsymb2"];

  // Temperatur och feels like
  document.getElementById("temperature").textContent = Math.round(temp) + "°";
  document.getElementById("feelsLike").textContent = "Känns som " + calculateFeelsLike(temp, wind) + "°";

  // Vind
  document.getElementById("wind").textContent = wind.toFixed(1) + " m/s";
  document.getElementById("windDirection").style.transform = `rotate(${windDirDeg}deg)`;

  // Luftfuktighet, tryck, nederbörd
  document.getElementById("humidity").textContent = humidity + " %";
  document.getElementById("pressure").textContent = pressure + " hPa";
  document.getElementById("precip").textContent = precip + " mm";

  // Väderikon (enkel mapping)
  const iconMap = {1:"https://cdn-icons-png.flaticon.com/512/869/869869.png", 2:"https://cdn-icons-png.flaticon.com/512/1163/1163624.png", 3:"https://cdn-icons-png.flaticon.com/512/414/414825.png", 4:"https://cdn-icons-png.flaticon.com/512/1163/1163657.png", 5:"https://cdn-icons-png.flaticon.com/512/642/642102.png"};
  document.getElementById("weatherIcon").src = iconMap[weatherCode] || iconMap[1];

  // ===== HISTORISKT: IGÅR =====
  // SMHI observation API
  const yesterdayDate = new Date(now.getTime() - 86400000);
  const start = yesterdayDate.toISOString().split('T')[0];
  const urlObs = `https://opendata-download-metobs.smhi.se/api/version/latest/parameter/1/station/${stationId}/period/corrected-archive/data.json`;
  try{
    const resObs = await fetch(urlObs);
    const dataObs = await resObs.json();
    const temps = dataObs.value;
    const times = dataObs.time;
    // Igår samma tid
    let sameHour = temps[0];
    for(let i=0;i<times.length;i++){
      if(times[i].startsWith(start + "T" + String(now.getHours()).padStart(2,"0"))){
        sameHour = temps[i];
        break;
      }
    }
    document.getElementById("tempYesterday").textContent = Math.round(sameHour) + "°";
    // Igår min/max
    const yesterdayTemps = temps.filter((v,i)=>times[i].startsWith(start));
    const minY = Math.min(...yesterdayTemps);
    const maxY = Math.max(...yesterdayTemps);
    document.getElementById("yesterdayMin").textContent = Math.round(minY);
    document.getElementById("yesterdayMax").textContent = Math.round(maxY);
  } catch(e){
    document.getElementById("tempYesterday").textContent = "--";
    document.getElementById("yesterdayMin").textContent = "--";
    document.getElementById("yesterdayMax").textContent = "--";
  }

  // Uppdaterad tid
  document.getElementById("updatedTime").textContent = now.toLocaleTimeString('sv-SE',{hour:'2-digit',minute:'2-digit'});

  // ===== FEMDYGNSPROGNOS =====
  const forecast = document.getElementById("forecast");
  forecast.innerHTML = "";
  const dailyMap = {};
  timeSeries.forEach(ts=>{
    const date = ts.validTime.split("T")[0];
    if(!dailyMap[date]) dailyMap[date] = ts.parameters;
  });
  const dailyDates = Object.keys(dailyMap).slice(0,5);
  dailyDates.forEach(date=>{
    const dailyParams = dailyMap[date];
    let tMax = null, tMin = null, weatherCode = 1;
    dailyParams.forEach(p=>{
      if(p.name==="t_max") tMax = p.values[0];
      if(p.name==="t_min") tMin = p.values[0];
      if(p.name==="Wsymb2") weatherCode = p.values[0];
    });
    const card = document.createElement("div");
    card.className = "day-card";
    const dayName = new Date(date).toLocaleDateString("sv-SE",{weekday:"short"});
    card.innerHTML = `
      <div class="day-name">${dayName}</div>
      <img src="${iconMap[weatherCode] || iconMap[1]}">
      <div class="temp-range">${Math.round(tMax)}° / ${Math.round(tMin)}°</div>`;
    forecast.appendChild(card);
  });
}

// ===== INIT =====
getWeatherSMHI(fallback.lat,fallback.lon,fallback.stationId);
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Väderdashboard</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(to right, #141e30, #243b55);
  color: white;
  margin: 0;
  padding: 30px;
}
.container {
  max-width: 900px;
  margin: auto;
}

/* ===== DAGENS VÄDERBLOCK ===== */
.card {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  border-radius: 20px;
  padding: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
  margin-bottom: 25px;
  position: relative;
}

/* HUVUDBLOCK */
.current-weather {
  display: flex;
  gap: 20px;
  cursor: pointer;
  transition: transform 0.2s ease;
}
.current-weather:hover {
  transform: translateY(-3px);
}

/* VÄDERMAIN */
.weather-main {
  display: flex;
  align-items: center;
  gap: 20px;
  flex: 2;
}
.weather-main img {
  width: 80px;
}
.temp {
  font-size: 52px;
  font-weight: bold;
}
.feels-like {
  opacity: 0.8;
}

/* HÖGERINFO */
.weather-info {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 8px;
  font-size: 16px; /* justerat textstorlek lite större */
  justify-content: center;
}

/* HOVER-OVERLAY */
.weather-tooltip {
  position: absolute;
  inset: 0;
  background: black; /* ändrat till svart bakgrund */
  color: white; /* vit text */
  border-radius: 20px;
  padding: 20px;
  display: none;
  flex-direction: column;
  justify-content: center;
  gap: 8px;
  z-index: 10;
}
.current-weather:hover .weather-tooltip {
  display: flex;
}

/* ===== 5 DAGARS PROGNOS ===== */
.forecast {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 15px;
}
.day-card {
  background: rgba(255,255,255,0.06);
  padding: 15px;
  border-radius: 16px;
  text-align: center;
  transition: transform 0.2s ease;
}
.day-card:hover {
  transform: translateY(-4px);
}
.day-card img {
  width: 45px;
}
.day-name {
  font-weight: bold;
  margin-bottom: 5px;
}
.temp-range {
  font-size: 14px;
}

/* DATUM/VECKA + SENAST UPPDATERAD */
.date-week {
  font-size: 16px; /* lite större */
  opacity: 0.9;
  margin-bottom: 5px;
}
</style>
</head>
<body>

<div class="container">

<!-- DAGENS VÄDER -->
<div class="card current-weather">
  <div class="weather-main">
    <img id="weatherIcon" src="">
    <div>
      <div class="temp" id="temperature">--°</div>
      <div class="feels-like" id="feelsLike">Känns som --°</div>
    </div>
  </div>
  <div class="weather-info">
    <div class="date-week" id="dateWeek">--</div>
    <div>Senast uppdaterad: <span id="updatedTime">--:--</span></div>
    <div>Igår samma tid: <span id="tempYesterday">--°</span></div>
    <div>Igår – Min: <span id="yesterdayMin">--°</span> / Max: <span id="yesterdayMax">--°</span></div>
  </div>

  <div class="weather-tooltip">
    <div id="weatherDescription"></div>
    <div>Vind: <span id="wind"></span></div>
    <div>Luftfuktighet: <span id="humidity"></span></div>
    <div>Tryck: <span id="pressure"></span></div>
    <div>Nederbörd (1h): <span id="precip"></span></div>
  </div>
</div>

<!-- 5-DYGN -->
<div class="card">
  <h3>5-dygnsprognos</h3>
  <div class="forecast" id="forecast"></div>
</div>

</div>

<script>
// ===== CONFIG / FALLBACK =====
const fallback = { lat: 57.173, lon: 14.040, name: "Bor" };

// ===== DATUM + VECKA =====
function updateDateWeek() {
  const now = new Date();
  const dayNum = now.getDay() || 7;
  const date = new Date(now);
  const yearStart = new Date(date.getFullYear(),0,1);
  const week = Math.ceil((((date - yearStart)/86400000 + 1)/7));
  document.getElementById("dateWeek").innerText =
    now.toLocaleDateString('sv-SE', { weekday:'long', day:'numeric', month:'long', year:'numeric'}) + " | Vecka " + week;
}

// ===== FEELS LIKE BERÄKNING =====
function calculateFeelsLike(tempC, windMs) {
  const windKmH = windMs*3.6;
  if(tempC <= 10 && windMs > 1.3){
    // Vindkylaformel
    return 13.12 + 0.6215*tempC - 11.37*Math.pow(windKmH,0.16) + 0.3965*tempC*Math.pow(windKmH,0.16);
  } else if(tempC >= 20){
    // Värmeindex med luftfuktighet ej i denna simpla version, kan lägga till om vi vill
    return tempC; 
  } else {
    return tempC;
  }
}

// ===== WEATHER FETCH =====
async function getWeather(lat, lon) {
  updateDateWeek();
  const now = new Date();

  // SMHI aktuellt
  const urlSMHI = `https://opendata-download-metfcst.smhi.se/api/category/pmp3g/version/2/geotype/point/lon/${lon}/lat/${lat}/data.json`;
  const resSMHI = await fetch(urlSMHI);
  const dataSMHI = await resSMHI.json();

  const timeSeries = dataSMHI.timeSeries.map(ts=>({ ...ts, time: new Date(ts.validTime)}))
                    .filter(ts=>ts.time <= now)
                    .sort((a,b)=>b.time - a.time);
  const current = timeSeries[0];
  const params = current.parameters;
  const temp = params.find(p=>p.name==='t')?.values[0];
  const wind = params.find(p=>p.name==='ws')?.values[0];
  const humidityVal = params.find(p=>p.name==='r')?.values[0];
  const pressureVal = params.find(p=>p.name==='msl')?.values[0];
  const precipVal = params.find(p=>p.name==='pmean')?.values[0] || 0;
  const weatherCode = params.find(p=>p.name==='Wsymb2')?.values[0];

  temperature.textContent = Math.round(temp) + "°";
  feelsLike.textContent = "Känns som " + Math.round(calculateFeelsLike(temp, wind)) + "°";
  wind.textContent = wind.toFixed(1) + " m/s";
  humidity.textContent = humidityVal + " %";
  pressure.textContent = pressureVal + " hPa";
  precip.textContent = precipVal.toFixed(1) + " mm";
  weatherDescription.textContent = weatherCodeToText(weatherCode);
  weatherIcon.src = weatherCodeToIcon(weatherCode);

  // 5-dygnsprognos från Open-Meteo
  const urlForecast = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=temperature_2m_max,temperature_2m_min,weathercode&timezone=Europe/Stockholm&forecast_days=6`;
  const resForecast = await fetch(urlForecast);
  const dataForecast = await resForecast.json();
  forecast.innerHTML = "";
  for(let i=1;i<=5;i++){
    const date = new Date(dataForecast.daily.time[i]);
    const dayName = date.toLocaleDateString("sv-SE",{weekday:'short'});
    const card = document.createElement("div");
    card.className = "day-card";
    card.innerHTML = `
      <div class="day-name">${dayName}</div>
      <img src="${weatherCodeToIcon(dataForecast.daily.weathercode[i])}">
      <div class="temp-range">
        ${Math.round(dataForecast.daily.temperature_2m_max[i])}° / ${Math.round(dataForecast.daily.temperature_2m_min[i])}°
      </div>`;
    forecast.appendChild(card);
  }

  // Historik igår
  const yesterdayDate = new Date(now.getTime()-86400000);
  const start = yesterdayDate.toISOString().split('T')[0];
  const urlHistory = `https://archive-api.open-meteo.com/v1/archive?latitude=${lat}&longitude=${lon}&start_date=${start}&end_date=${start}&hourly=temperature_2m&timezone=Europe/Stockholm`;
  const resH = await fetch(urlHistory);
  const dataH = await resH.json();
  const temps = dataH.hourly.temperature_2m;
  const times = dataH.hourly.time.map(t=>new Date(t));
  let minY=999,maxY=-999,sameHourTemp=null;
  const nowHour = now.getHours();
  for(let i=0;i<temps.length;i++){
    const d = times[i];
    if(temps[i]<minY) minY=temps[i];
    if(temps[i]>maxY) maxY=temps[i];
    if(d.getHours()===nowHour) sameHourTemp = temps[i];
  }
  tempYesterday.textContent = sameHourTemp !== null ? Math.round(sameHourTemp)+"°" : "--";
  yesterdayMin.textContent = Math.round(minY);
  yesterdayMax.textContent = Math.round(maxY);

  updatedTime.textContent = now.toLocaleTimeString('sv-SE',{hour:'2-digit',minute:'2-digit'});
}

// GPS
if(navigator.geolocation){
  navigator.geolocation.getCurrentPosition(
    pos => getWeather(pos.coords.latitude,pos.coords.longitude),
    () => getWeather(fallback.lat,fallback.lon)
  );
} else {
  getWeather(fallback.lat,fallback.lon);
}

// Weather code to text/icon
function weatherCodeToText(code){
  const map = {0:"Klart",1:"Mestadels klart",2:"Halvklart",3:"Mulet",61:"Regn",71:"Snö",80:"Regnskurar",85:"Snöbyar"};
  return map[code]||"Okänt väder";
}
function weatherCodeToIcon(code){
  if(code===0)return "https://cdn-icons-png.flaticon.com/512/869/869869.png";
  if([1,2].includes(code))return "https://cdn-icons-png.flaticon.com/512/1163/1163624.png";
  if(code===3)return "https://cdn-icons-png.flaticon.com/512/414/414825.png";
  if([61,80].includes(code))return "https://cdn-icons-png.flaticon.com/512/1163/1163657.png";
  if([71,85].includes(code))return "https://cdn-icons-png.flaticon.com/512/642/642102.png";
  return "https://cdn-icons-png.flaticon.com/512/1163/1163661.png";
}
</script>
</body>
</html>

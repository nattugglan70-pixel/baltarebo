<!-- VÄDER 1.6.6 - Stabil 1.6.5 + subtil bakgrundsanimation -->
<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VÄDER</title>
<link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/869/869869.png" sizes="32x32">

<style>
body{
  font-family: Arial, sans-serif;
  background: linear-gradient(to right,#141e30,#243b55);
  color:white;
  margin:0;
  padding:30px;
  position:relative;
  overflow-x:hidden;
}

/* ===== BAKGRUND ===== */
#bg-animation{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  pointer-events:none;
  z-index:0;
  overflow:hidden;
}

.cloud{
  position:absolute;
  background:rgba(255,255,255,0.05);
  border-radius:50%;
  filter:blur(12px);
  animation:moveCloud linear infinite;
}

@keyframes moveCloud{
  from{ transform:translateX(-250px); }
  to{ transform:translateX(110vw); }
}
/* ===== SLUT BAKGRUND ===== */

.container{
  max-width:900px;
  margin:auto;
  position:relative;
  z-index:2;
}

.card{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(12px);
  border-radius:20px;
  padding:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
  margin-bottom:25px;
  position:relative;
}

.version{
  position:absolute;
  top:10px;
  right:15px;
  font-size:12px;
  color:gold;
  font-weight:bold;
}

.current{
  display:flex;
  gap:25px;
  align-items:center;
}

.left{
  flex:1.5;
  display:flex;
  flex-direction:column;
  gap:10px;
}
.left-top{
  display:flex;
  align-items:center;
  gap:15px;
}
.left img{width:80px; cursor:default;}
.temp{font-size:52px;font-weight:bold;}
.feels{display:flex;align-items:center;gap:10px;}
.wind-arrow{
  font-size:32px;
  display:inline-block;
}

.middle{
  flex:1;
  display:flex;
  flex-direction:column;
  gap:6px;
  font-size:14px;
}

.right{
  flex:1;
  font-size:14px;
}

.forecast{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:10px;
}
.day-card{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:rgba(255,255,255,0.06);
  padding:10px;
  border-radius:16px;
  text-align:center;
}
.day-name{font-weight:bold;margin-bottom:5px;}
.temp-range{font-size:14px;}
</style>
</head>

<body>

<div id="bg-animation"></div>

<div class="container">

<div class="card current">
  <div class="version">1.6.6</div>
  <div class="left">
    <div class="left-top">
      <img id="icon" title="--">
      <div class="temp" id="temp">--°</div>
    </div>
    <div class="feels">
      <div id="feels">Känns som --°</div>
      <div class="wind-arrow" id="windArrow">↑</div>
    </div>
  </div>

  <div class="middle">
    <div>Vind: <span id="wind">--</span></div>
    <div>Luftfuktighet: <span id="humidity">--</span></div>
    <div>Tryck: <span id="pressure">--</span></div>
    <div>Nederbörd (1h): <span id="precip">--</span></div>
  </div>

  <div class="right">
    <div id="date"></div>
    <div id="updated"></div>
  </div>
</div>

<div class="card">
  <h3>5-dygnsprognos</h3>
  <div class="forecast" id="forecast"></div>
</div>

</div>

<script>
const lat = 57.123;
const lon = 13.952;
const smhiStation = 97490;
let currentWind = 0;

/* ===== SKAPA SUBTILA MOLN ===== */
function createClouds(){
  const bg=document.getElementById("bg-animation");
  bg.innerHTML="";
  for(let i=0;i<6;i++){
    const cloud=document.createElement("div");
    cloud.className="cloud";
    cloud.style.width=200+Math.random()*200+"px";
    cloud.style.height=80+Math.random()*60+"px";
    cloud.style.top=Math.random()*80+"%";
    cloud.style.animationDuration=50+Math.random()*40+"s";
    bg.appendChild(cloud);
  }
}
createClouds();
/* ===== SLUT MOLN ===== */

function feelsLike(t, ws){
  const kmh = ws*3.6;
  if(t<=10 && kmh>4.8){
    return Math.round(13.12 + 0.6215*t - 11.37*Math.pow(kmh,0.16) + 0.3965*t*Math.pow(kmh,0.16));
  }
  return Math.round(t);
}

function getISOWeek(date) {
  const tmpDate = new Date(date.getTime());
  tmpDate.setHours(0,0,0,0);
  tmpDate.setDate(tmpDate.getDate() + 3 - (tmpDate.getDay() + 6) % 7);
  const week1 = new Date(tmpDate.getFullYear(), 0, 4);
  return 1 + Math.round(((tmpDate - week1) / 86400000 - 3 + (week1.getDay() + 6) % 7) / 7);
}

async function updateWeather(){
  try{
    const wsRes = await fetch(`https://opendata-download-metobs.smhi.se/api/version/latest/parameter/1/station/${smhiStation}/period/latest-month/data.json`);
    const wsData = await wsRes.json();
    const latest = wsData.value[wsData.value.length-1];
    currentWind = latest ? latest.value : 0;

    wind.textContent=currentWind.toFixed(1)+" m/s ("+Math.round(currentWind*3.6)+" km/h)";
    windArrow.style.transform=`rotate(${latest.direction||0}deg)`;
  } catch(e){
    currentWind=0;
    wind.textContent="0 m/s (0 km/h)";
  }

  try{
    const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&hourly=temperature_2m,precipitation,pressure_msl,relativehumidity_2m&daily=temperature_2m_max,temperature_2m_min,weathercode&timezone=Europe/Stockholm`;
    const res = await fetch(url);
    const data = await res.json();

    const t = data.current_weather.temperature;
    temp.textContent = Math.round(t)+"°";
    feels.textContent = "Känns som "+feelsLike(t,currentWind)+"°";
    humidity.textContent = data.hourly.relativehumidity_2m[0]+" %";
    pressure.textContent = data.hourly.pressure_msl[0]+" hPa";
    precip.textContent = data.hourly.precipitation[0]+" mm";

    const now = new Date();
    updated.textContent = "Uppdaterad: "+now.toLocaleTimeString("sv-SE",{hour:"2-digit",minute:"2-digit"});

    forecast.innerHTML="";
    const daily = data.daily || {};
    const days = ["Sön","Mån","Tis","Ons","Tor","Fre","Lör"];

    for(let i=1;i<=5;i++){
      const day = new Date();
      day.setDate(day.getDate()+i);
      const weekday = days[day.getDay()];
      const tempMax = Math.round(daily.temperature_2m_max[i]||0);
      const tempMin = Math.round(daily.temperature_2m_min[i]||0);

      const card = document.createElement("div");
      card.className="day-card";
      card.innerHTML=`
        <div class="day-name">${weekday}</div>
        <div class="temp-range">${tempMin}° / ${tempMax}°</div>
      `;
      forecast.appendChild(card);
    }

    icon.src=`https://cdn-icons-png.flaticon.com/512/414/414825.png`;
    icon.title = `${t.toFixed(1)}°`;

  } catch(e){
    updated.textContent="Uppdateras…";
  }
}

function init(){
  const now=new Date();
  const weekNum = getISOWeek(now);
  date.textContent=now.toLocaleDateString("sv-SE",{weekday:"long",day:"numeric",month:"long",year:"numeric"}) + " ( V " + weekNum + " )";
  updateWeather();
  setInterval(updateWeather,600000);
}

init();
</script>
</body>
</html>

<!-- Komplett kod: Väder 1.6 - Stabil, Open-Meteo för gårdag, textikoner prognos -->
<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VÄDER</title>
<link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/869/869869.png" sizes="32x32">

<style>
body{
  font-family: Arial, sans-serif;
  background: linear-gradient(to right,#141e30,#243b55);
  color:white;
  margin:0;
  padding:30px;
}
.container{max-width:900px;margin:auto;}

.card{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(12px);
  border-radius:20px;
  padding:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
  margin-bottom:25px;
  position:relative;
}

.version{
  position:absolute;
  top:10px;
  right:15px;
  font-size:12px;
  color:gold;
  font-weight:bold;
}

.current{
  display:flex;
  gap:25px;
  align-items:center;
}

.left{
  flex:1.5;
  display:flex;
  flex-direction:column;
  gap:10px;
}
.left-top{
  display:flex;
  align-items:center;
  gap:15px;
}
.left img{width:80px; cursor:pointer;}
.temp{font-size:52px;font-weight:bold;}
.feels{display:flex;align-items:center;gap:10px;}
.wind-arrow{
  font-size:32px;
  display:inline-block;
}

.middle{
  flex:1;
  display:flex;
  flex-direction:column;
  gap:6px;
  font-size:14px;
}

.right{
  flex:1;
  font-size:14px;
}

.forecast{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:10px;
}
.day-card{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:rgba(255,255,255,0.06);
  padding:8px;
  border-radius:16px;
  text-align:center;
  font-size:14px;
}
.day-name{font-weight:bold;margin-bottom:5px;}
.temp-range{font-size:14px;}

#updated{
  font-weight:bold;
}
</style>
</head>

<body>
<div class="container">

<div class="card current">
  <div class="version">1.6</div>
  <div class="left">
    <div class="left-top">
      <img id="icon" title="">
      <div class="temp" id="temp">--°</div>
    </div>
    <div class="feels">
      <div id="feels">Känns som --°</div>
      <div class="wind-arrow" id="windArrow">↑</div>
    </div>
  </div>

  <div class="middle">
    <div>Vind: <span id="wind">--</span></div>
    <div>Luftfuktighet: <span id="humidity">--</span></div>
    <div>Tryck: <span id="pressure">--</span></div>
    <div>Nederbörd (1h): <span id="precip">--</span></div>
    <div>Igår Min/Max: <span id="yMin">--</span> / <span id="yMax">--</span></div>
  </div>

  <div class="right">
    <div id="date"></div>
    <div id="updated"></div>
  </div>
</div>

<div class="card">
  <h3>5-dygnsprognos (start imorgon)</h3>
  <div class="forecast" id="forecast"></div>
</div>

</div>

<script>
const lat = 57.123;
const lon = 13.952;

// ---------- FEELS LIKE ----------
function feelsLike(t, ws){
  const kmh = ws*3.6;
  if(t<=10 && kmh>4.8){
    return Math.round(
      13.12 + 0.6215*t - 11.37*Math.pow(kmh,0.16)
      + 0.3965*t*Math.pow(kmh,0.16)
    );
  }
  return Math.round(t);
}

// ---------- ISO VECKONUMMER ----------
function getISOWeek(date) {
  const tmpDate = new Date(date.getTime());
  tmpDate.setHours(0,0,0,0);
  tmpDate.setDate(tmpDate.getDate() + 3 - (tmpDate.getDay() + 6) % 7);
  const week1 = new Date(tmpDate.getFullYear(), 0, 4);
  return 1 + Math.round(((tmpDate - week1) / 86400000 - 3 + (week1.getDay() + 6) % 7) / 7);
}

// ---------- HÄMTA NU (Open-Meteo) ----------
async function loadNow(){
  const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&hourly=relativehumidity_2m,precipitation,pressure_msl&timezone=Europe/Stockholm`;
  try{
    const res=await fetch(url);
    const data=await res.json();
    const nowData = data.current_weather;
    temp.textContent = Math.round(nowData.temperature)+"°";
    feels.textContent = "Känns som "+feelsLike(nowData.temperature, nowData.windspeed)+"°";
    wind.textContent = nowData.windspeed.toFixed(1)+" m/s (" + Math.round(nowData.windspeed*3.6) + " km/h)";
    windArrow.style.transform=`rotate(${nowData.winddirection}deg)`;
    humidity.textContent = data.hourly.relativehumidity_2m[0]+" %";
    pressure.textContent = data.hourly.pressure_msl[0]+" hPa";
    precip.textContent = data.hourly.precipitation[0]+" mm";
    icon.src = nowData.weathercode != null ? `https://cdn-icons-png.flaticon.com/512/414/414825.png` : "";
    icon.title = "Just nu: "+nowData.temperature+"°";
    updated.textContent = "Uppdaterad: "+new Date().toLocaleTimeString("sv-SE",{hour:"2-digit",minute:"2-digit"});
    updated.style.color="white";
  } catch(e){
    console.error("Now fetch error", e);
    updated.textContent="Uppdateras…";
    updated.style.color="orange";
  }
}

// ---------- HÄMTA GÅRDAGENS MIN/MAX (Open-Meteo Historical) ----------
async function loadYesterday(){
  const yesterday = new Date();
  yesterday.setDate(yesterday.getDate()-1);
  const yyyy = yesterday.getFullYear();
  const mm = String(yesterday.getMonth()+1).padStart(2,'0');
  const dd = String(yesterday.getDate()).padStart(2,'0');
  const url = `https://archive-api.open-meteo.com/v1/archive?latitude=${lat}&longitude=${lon}&start_date=${yyyy}-${mm}-${dd}&end_date=${yyyy}-${mm}-${dd}&daily=temperature_2m_min,temperature_2m_max&timezone=Europe/Stockholm`;
  try{
    const res = await fetch(url);
    const data = await res.json();
    yMin.textContent = Math.round(data.daily.temperature_2m_min[0])+"°";
    yMax.textContent = Math.round(data.daily.temperature_2m_max[0])+"°";
  } catch(e){
    console.error("Yesterday fetch error", e);
  }
}

// ---------- 5-DYGNS PROGNOS (Open-Meteo) ----------
async function loadForecast(){
  const today = new Date();
  const yyyy = today.getFullYear();
  const mm = String(today.getMonth()+1).padStart(2,'0');
  const dd = String(today.getDate()).padStart(2,'0');
  const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=Europe/Stockholm`;
  try{
    const res=await fetch(url);
    const data=await res.json();
    forecast.innerHTML="";
    for(let i=1;i<=5;i++){ // start från imorgon
      const d = new Date(data.daily.time[i]);
      const dayName = d.toLocaleDateString("sv-SE",{weekday:"short"});
      const card = document.createElement("div");
      card.className="day-card";
      const weatherText = weatherCodeToText(data.daily.weathercode[i]);
      card.innerHTML = `
        <div class="day-name">${dayName}</div>
        <div>${weatherText}</div>
        <div class="temp-range">${Math.round(data.daily.temperature_2m_max[i])}° / ${Math.round(data.daily.temperature_2m_min[i])}°</div>
      `;
      forecast.appendChild(card);
    }
  } catch(e){
    console.error("Forecast fetch error", e);
  }
}

// ---------- OMVANDLA WEATHER CODE TILL TEXT ----------
function weatherCodeToText(code){
  const map = {
    0: "Klart",
    1: "Delvis molnigt",
    2: "Molnigt",
    3: "Dimma",
    45: "Dimma",
    48: "Dimma",
    51: "Duggregn",
    53: "Duggregn",
    55: "Duggregn",
    56: "Snöblandat regn",
    57: "Snöblandat regn",
    61: "Regn",
    63: "Regn",
    65: "Regn",
    66: "Snöblandat regn",
    67: "Snöblandat regn",
    71: "Snö",
    73: "Snö",
    75: "Snö",
    77: "Snö",
    80: "Regnskurar",
    81: "Regnskurar",
    82: "Regnskurar",
    85: "Snöskurar",
    86: "Snöskurar",
    95: "Åska",
    96: "Åska med hagel",
    99: "Åska med hagel"
  };
  return map[code] || "Okänt";
}

// ---------- INIT ----------
function init(){
  const now=new Date();
  const weekNum = getISOWeek(now);
  date.textContent=now.toLocaleDateString("sv-SE",{weekday:"long",day:"numeric",month:"long",year:"numeric"}) + " ( V " + weekNum + " )";

  loadNow();
  loadYesterday();
  loadForecast();

  // Auto-refresh var 10:e minut
  setInterval(()=>{
    loadNow();
    loadYesterday();
    loadForecast();
  },600000);
}
init();
</script>

</body>
</html>

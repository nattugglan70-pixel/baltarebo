<!-- Komplett kod: VÄDER 1.5.3 - Snabb ikonu, hover-text och Åminne + närmaste stationer -->
<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VÄDER</title>
<link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/869/869869.png" sizes="32x32">

<style>
body{
  font-family: Arial, sans-serif;
  background: linear-gradient(to right,#141e30,#243b55);
  color:white;
  margin:0;
  padding:30px;
}
.container{max-width:900px;margin:auto;}

.card{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(12px);
  border-radius:20px;
  padding:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
  margin-bottom:25px;
  position:relative;
}

.version{
  position:absolute;
  top:10px;
  right:15px;
  font-size:12px;
  color:gold;
  font-weight:bold;
}

.current{
  display:flex;
  gap:25px;
  align-items:center;
}

.left{
  flex:1.5;
  display:flex;
  flex-direction:column;
  gap:10px;
}
.left-top{
  display:flex;
  align-items:center;
  gap:15px;
}
.left img{width:80px;}
.temp{font-size:52px;font-weight:bold;}
.feels{display:flex;align-items:center;gap:10px;}
.wind-arrow{
  font-size:32px;
  display:inline-block;
}

.middle{
  flex:1;
  display:flex;
  flex-direction:column;
  gap:6px;
  font-size:14px;
}

.right{
  flex:1;
  font-size:14px;
}

.forecast{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:15px;
}
.day-card{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:rgba(255,255,255,0.06);
  padding:15px;
  border-radius:16px;
  text-align:center;
}
.day-card img{width:45px;}
.day-name{font-weight:bold;margin-bottom:5px;}
.temp-range{font-size:14px;}

#updated{
  font-weight:bold;
}
</style>
</head>

<body>
<div class="container">

<div class="card current">
  <div class="version">1.5.2 → 1.5.3</div>
  <div class="left">
    <div class="left-top">
      <img id="icon" title="">
      <div class="temp" id="temp">--°</div>
    </div>
    <div class="feels">
      <div id="feels">Känns som --°</div>
      <div class="wind-arrow" id="windArrow">↑</div>
    </div>
  </div>

  <div class="middle">
    <div>Vind: <span id="wind">--</span></div>
    <div>Luftfuktighet: <span id="humidity">--</span></div>
    <div>Tryck: <span id="pressure">--</span></div>
    <div>Nederbörd (1h): <span id="precip">--</span></div>
    <div>Igår samma tid: <span id="ySame">--</span></div>
    <div>Igår Min/Max: <span id="yMin">--</span> / <span id="yMax">--</span></div>
  </div>

  <div class="right">
    <div id="date"></div>
    <div id="updated"></div>
  </div>
</div>

<div class="card">
  <h3>5-dygnsprognos</h3>
  <div class="forecast" id="forecast"></div>
</div>

</div>

<script>
const lat = 57.123;
const lon = 13.952;
const stations = [97490, 97492, 97485]; // Åminne + närmaste stationer

// ---------- FEELS LIKE ----------
function feelsLike(t, ws){
  const kmh = ws*3.6;
  if(t<=10 && kmh>4.8){
    return Math.round(
      13.12 + 0.6215*t - 11.37*Math.pow(kmh,0.16)
      + 0.3965*t*Math.pow(kmh,0.16)
    );
  }
  return Math.round(t);
}

// ---------- ISO VECKONUMMER ----------
function getISOWeek(date) {
  const tmpDate = new Date(date.getTime());
  tmpDate.setHours(0,0,0,0);
  tmpDate.setDate(tmpDate.getDate() + 3 - (tmpDate.getDay() + 6) % 7);
  const week1 = new Date(tmpDate.getFullYear(), 0, 4);
  return 1 + Math.round(((tmpDate - week1) / 86400000 - 3 + (week1.getDay() + 6) % 7) / 7);
}

// ---------- HÄMTA PROGNOS (NU + 5 DYGN) ----------
async function loadForecast(){
  const url = `https://opendata-download-metfcst.smhi.se/api/category/pmp3g/version/2/geotype/point/lon/${lon}/lat/${lat}/data.json`;
  try{
    const res = await fetch(url);
    const data = await res.json();
    const series = data.timeSeries;

    const now = new Date();
    const current = series.find(ts => new Date(ts.validTime) >= now) || series[0];

    const params = {};
    current.parameters.forEach(p=>params[p.name]=p.values[0]);

    const t = params.t;
    const ws = params.ws;
    const wd = params.wd;
    const wSymbol = params.Wsymb2; // symbol för ikon

    temp.textContent = Math.round(t)+"°";
    feels.textContent = "Känns som "+feelsLike(t,ws)+"°";
    wind.textContent = ws.toFixed(1)+" m/s (" + Math.round(ws*3.6) + " km/h)";
    humidity.textContent = params.r+" %";
    pressure.textContent = params.msl+" hPa";
    precip.textContent = params.pmean+" mm";
    windArrow.style.transform=`rotate(${wd}deg)`;

    // Ikon + hover
    let iconURL = "https://cdn-icons-png.flaticon.com/512/414/414825.png"; // standard molnigt
    let iconTitle = "Molnigt";

    switch(wSymbol){
      case 1: iconURL="https://cdn-icons-png.flaticon.com/512/1163/1163661.png"; iconTitle="Klart"; break;
      case 2: iconURL="https://cdn-icons-png.flaticon.com/512/1163/1163685.png"; iconTitle="Delvis molnigt"; break;
      case 3: iconURL="https://cdn-icons-png.flaticon.com/512/1163/1163686.png"; iconTitle="Molnigt"; break;
      case 4: iconURL="https://cdn-icons-png.flaticon.com/512/1163/1163687.png"; iconTitle="Duggregn"; break;
      case 5: iconURL="https://cdn-icons-png.flaticon.com/512/1163/1163688.png"; iconTitle="Regn"; break;
      // lägg till fler symboler vid behov
    }

    icon.src = iconURL;
    icon.title = iconTitle;

    updated.textContent="Uppdaterad: "+now.toLocaleTimeString("sv-SE",{hour:"2-digit",minute:"2-digit"});
    updated.style.color="white";

    // DAGLIG SUMMERING
    const daily = {};
    series.forEach(ts=>{
      const d = ts.validTime.split("T")[0];
      if(!daily[d]) daily[d]=[];
      daily[d].push(ts);
    });

    forecast.innerHTML="";
    Object.keys(daily).slice(1,6).forEach(d=>{
      const arr=daily[d];
      const temps=arr.map(x=>{
        const p={};x.parameters.forEach(a=>p[a.name]=a.values[0]);
        return p.t;
      });
      const max=Math.max(...temps);
      const min=Math.min(...temps);

      const card=document.createElement("div");
      card.className="day-card";
      card.innerHTML=`
        <div class="day-name">
          ${new Date(d).toLocaleDateString("sv-SE",{weekday:"short"})}
        </div>
        <img src="https://cdn-icons-png.flaticon.com/512/414/414825.png" title="Molnigt">
        <div class="temp-range">${Math.round(max)}° / ${Math.round(min)}°</div>
      `;
      forecast.appendChild(card);
    });

  } catch(e){
    console.error("Forecast fetch error", e);
    updated.textContent="Uppdateras…";
    updated.style.color="orange";
  }
}

// ---------- HÄMTA IGÅR ----------
async function loadYesterday(){
  let found=false;
  const now = new Date();
  const yesterday = new Date(now.getTime()-86400000);

  for(let station of stations){
    try{
      const res=await fetch(`https://opendata-download-metobs.smhi.se/api/version/latest/parameter/1/station/${station}/period/latest-month/data.json`);
      const data=await res.json();
      const values=data.value;

      const yVals=values.filter(v=>{
        const d=new Date(v.date);
        return d.getDate()===yesterday.getDate() &&
               d.getMonth()===yesterday.getMonth();
      });

      if(yVals.length){
        const temps=yVals.map(v=>v.value);
        yMin.textContent=Math.round(Math.min(...temps))+"°";
        yMax.textContent=Math.round(Math.max(...temps))+"°";

        const same=yVals.reduce((prev,curr)=>{
          const h=new Date(curr.date).getHours();
          return Math.abs(h-now.getHours())<
                 Math.abs(new Date(prev.date).getHours()-now.getHours())
                 ?curr:prev;
        });
        ySame.textContent=Math.round(same.value)+"°";
        found=true;
        break; // vi har hittat data, hoppa ur loop
      }
    } catch(e){
      console.warn("Station fetch error for "+station, e);
    }
  }

  if(!found){
    ySame.textContent=yMin.textContent=yMax.textContent="--";
    updated.textContent="Uppdateras…";
    updated.style.color="orange";
  }
}

// ---------- INIT ----------
function init(){
  const now=new Date();
  const weekNum = getISOWeek(now);
  date.textContent=now.toLocaleDateString("sv-SE",{weekday:"long",day:"numeric",month:"long",year:"numeric"}) + " ( V " + weekNum + " )";

  loadForecast();
  loadYesterday();

  // Auto-refresh var 10:e minut
  setInterval(()=>{
    loadForecast();
    loadYesterday();
  },600000);
}
init();
</script>

</body>
</html>

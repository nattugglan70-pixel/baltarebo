<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Väderdashboard</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(to right, #141e30, #243b55);
  color: white;
  margin: 0;
  padding: 30px;
}
.container {
  max-width: 900px;
  margin: auto;
}

/* ===== DAGENS VÄDERBLOCK ===== */
.card {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  border-radius: 20px;
  padding: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
  margin-bottom: 25px;
  position: relative;
}

/* HUVUDBLOCK */
.current-weather {
  display: flex;
  gap: 20px;
}

/* VÄNSTER: ICON + TEMP + FEELS LIKE + VINDPIL */
.weather-left {
  display: flex;
  align-items: center;
  gap: 15px;
  flex: 1.5;
}
.weather-left img {
  width: 80px;
}
.temp-feels {
  display: flex;
  flex-direction: column;
}
.temp {
  font-size: 52px;
  font-weight: bold;
}
.feels-like-container {
  display: flex;
  align-items: center;
  gap: 10px;
}
.feels-like {
  opacity: 0.8;
}
/* Vindpil */
.wind-arrow {
  font-size: 14px; /* Samma som datum/senast uppdaterad */
  transform: rotate(0deg);
  display: inline-block;
  transition: transform 0.3s ease;
}

/* MITTEN: ÖVRIG INFO */
.weather-middle {
  flex: 1.2;
  display: flex;
  flex-direction: column;
  gap: 5px;
  font-size: 14px;
  justify-content: center;
}

/* HÖGER: DATUM & SENAST UPPDATERAD */
.weather-right {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 5px;
  font-size: 14px;
  justify-content: center;
}

/* 5 DAGARS PROGNOS */
.forecast {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 15px;
}
.day-card {
  background: rgba(255,255,255,0.06);
  padding: 15px;
  border-radius: 16px;
  text-align: center;
  transition: transform 0.2s ease;
}
.day-card:hover {
  transform: translateY(-4px);
}
.day-card img {
  width: 45px;
}
.day-name {
  font-weight: bold;
  margin-bottom: 5px;
}
.temp-range {
  font-size: 14px;
}

/* DATUM/VECKA + SENAST UPPDATERAD */
.date-week {
  font-size: 14px;
  opacity: 0.8;
  margin-bottom: 5px;
}
</style>
</head>
<body>

<div class="container">

<!-- DAGENS VÄDER -->
<div class="card current-weather">
  <!-- VÄNSTER -->
  <div class="weather-left">
    <img id="weatherIcon" src="">
    <div class="temp-feels">
      <div class="temp" id="temperature">--°</div>
      <div class="feels-like-container">
        <div class="feels-like" id="feelsLike">Känns som --°</div>
        <div class="wind-arrow" id="windArrow">↑</div>
      </div>
    </div>
  </div>

  <!-- MITTEN -->
  <div class="weather-middle">
    <div>Vind: <span id="wind">--</span></div>
    <div>Luftfuktighet: <span id="humidity">--</span></div>
    <div>Tryck: <span id="pressure">--</span></div>
    <div>Nederbörd (1h): <span id="precip">--</span></div>
    <div>Igår samma tid: <span id="tempYesterday">--°</span></div>
    <div>Igår – Min: <span id="yesterdayMin">--°</span> / Max: <span id="yesterdayMax">--°</span></div>
  </div>

  <!-- HÖGER -->
  <div class="weather-right">
    <div class="date-week" id="dateWeek">--</div>
    <div>Senast uppdaterad: <span id="updatedTime">--:--</span></div>
  </div>
</div>

<!-- 5-DYGN -->
<div class="card">
  <h3>5-dygnsprognos</h3>
  <div class="forecast" id="forecast"></div>
</div>

</div>

<script>
// ===== CONFIG / FALLBACK =====
const fallback = { lat: 57.173, lon: 14.040, name: "Bor" };

// ===== DATUM + VECKA =====
function updateDateWeek() {
  const now = new Date();
  const dayNum = now.getDay() || 7;
  const date = new Date(now);
  const yearStart = new Date(date.getFullYear(),0,1);
  const week = Math.ceil((((date - yearStart)/86400000 + 1)/7));
  document.getElementById("dateWeek").innerText =
    now.toLocaleDateString('sv-SE', { weekday:'long', day:'numeric', month:'long', year:'numeric'}) + " | Vecka " + week;
}

// ===== WEATHER FETCH =====
async function getWeather(lat, lon) {
  updateDateWeek();
  const now = new Date();

  const urlCurrent = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,apparent_temperature,weather_code,wind_speed_10m,wind_direction_10m,relative_humidity_2m,surface_pressure,precipitation&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=Europe/Stockholm&forecast_days=6`;
  const res = await fetch(urlCurrent);
  const data = await res.json();

  const c = data.current_weather || data.current;
  
  // ===== Temperatur & Feels Like (med korrekt beräkning) =====
  const temp = c.temperature_2m;
  const windSpeed = c.wind_speed_10m;
  const feels = c.apparent_temperature; // redan korrekt
  temperature.textContent = Math.round(temp)+"°";
  feelsLike.textContent = "Känns som " + Math.round(feels)+"°";

  // ===== Vind =====
  wind.textContent = windSpeed + " m/s";

  // ===== Vindriktning (pilen) =====
  const deg = c.wind_direction_10m; // 0-360 grader
  const arrow = document.getElementById("windArrow");
  arrow.style.transform = `rotate(${deg}deg)`;

  // ===== Övrig info =====
  humidity.textContent = c.relative_humidity_2m + " %";
  pressure.textContent = c.surface_pressure + " hPa";
  precip.textContent = (c.precipitation || 0) + " mm";
  
  weatherIcon.src = weatherCodeToIcon(c.weather_code);

  // ===== Femdygnsprognos =====
  forecast.innerHTML = "";
  for(let i=1;i<=5;i++){
    const date = new Date(data.daily.time[i]);
    const dayName = date.toLocaleDateString("sv-SE",{weekday:'short'});
    const card = document.createElement("div");
    card.className = "day-card";
    card.innerHTML = `
      <div class="day-name">${dayName}</div>
      <img src="${weatherCodeToIcon(data.daily.weather_code[i])}">
      <div class="temp-range">
        ${Math.round(data.daily.temperature_2m_max[i])}° / ${Math.round(data.daily.temperature_2m_min[i])}°
      </div>`;
    forecast.appendChild(card);
  }

  // ===== Historiskt: Igår =====
  const yesterdayDate = new Date(now.getTime() - 86400000);
  const start = yesterdayDate.toISOString().split('T')[0];
  const urlHistory = `https://archive-api.open-meteo.com/v1/archive?latitude=${lat}&longitude=${lon}&start_date=${start}&end_date=${start}&hourly=temperature_2m&timezone=Europe/Stockholm`;
  const resH = await fetch(urlHistory);
  const dataH = await resH.json();
  let temps = dataH.hourly.temperature_2m;
  let times = dataH.hourly.time.map(t=>new Date(t));
  let minY=999,maxY=-999,sameHourTemp=null;
  const nowHour = now.getHours();
  for(let i=0;i<temps.length;i++){
    const d = times[i];
    if(temps[i]<minY) minY=temps[i];
    if(temps[i]>maxY) maxY=temps[i];
    if(d.getHours()===nowHour) sameHourTemp = temps[i];
  }
  tempYesterday.textContent = sameHourTemp !== null ? Math.round(sameHourTemp)+"°" : "--";
  yesterdayMin.textContent = Math.round(minY);
  yesterdayMax.textContent = Math.round(maxY);

  updatedTime.textContent = now.toLocaleTimeString('sv-SE',{hour:'2-digit',minute:'2-digit'});
}

// ===== GPS =====
if(navigator.geolocation){
  navigator.geolocation.getCurrentPosition(
    pos => getWeather(pos.coords.latitude,pos.coords.longitude),
    () => getWeather(fallback.lat,fallback.lon)
  );
} else {
  getWeather(fallback.lat,fallback.lon);
}

// ===== WEATHER CODE =====
function weatherCodeToIcon(code){
  if(code===0)return "https://cdn-icons-png.flaticon.com/512/869/869869.png";
  if([1,2].includes(code))return "https://cdn-icons-png.flaticon.com/512/1163/1163624.png";
  if(code===3)return "https://cdn-icons-png.flaticon.com/512/414/414825.png";
  if([61,80].includes(code))return "https://cdn-icons-png.flaticon.com/512/1163/1163657.png";
  if([71,85].includes(code))return "https://cdn-icons-png.flaticon.com/512/642/642102.png";
  return "https://cdn-icons-png.flaticon.com/512/1163/1163661.png";
}
</script>
</body>
</html>

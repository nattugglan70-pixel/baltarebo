<!-- Komplett kod: Väder 1.6 - SMHI-vind, hover-ikon med väderbeskrivning, femdygnsprognos med text -->
<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VÄDER</title>
<link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/869/869869.png" sizes="32x32">

<style>
body{
  font-family: Arial, sans-serif;
  background: linear-gradient(to right,#141e30,#243b55);
  color:white;
  margin:0;
  padding:30px;
}
.container{max-width:900px;margin:auto;}

.card{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(12px);
  border-radius:20px;
  padding:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
  margin-bottom:25px;
  position:relative;
}

.version{
  position:absolute;
  top:10px;
  right:15px;
  font-size:12px;
  color:gold;
  font-weight:bold;
}

.current{
  display:flex;
  gap:25px;
  align-items:center;
}

.left{
  flex:1.5;
  display:flex;
  flex-direction:column;
  gap:10px;
}
.left-top{
  display:flex;
  align-items:center;
  gap:15px;
}
.left img{width:80px;}
.temp{font-size:52px;font-weight:bold;}
.feels{display:flex;align-items:center;gap:10px;}
.wind-arrow{
  font-size:32px;
  display:inline-block;
}

.middle{
  flex:1;
  display:flex;
  flex-direction:column;
  gap:6px;
  font-size:14px;
}

.right{
  flex:1;
  font-size:14px;
}

.forecast{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:10px;
}
.day-card{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:rgba(255,255,255,0.06);
  padding:10px;
  border-radius:16px;
  text-align:center;
  font-size:14px;
}
.day-name{font-weight:bold;margin-bottom:3px;}
.temp-range{font-size:13px;}
#updated{
  font-weight:bold;
}
</style>
</head>

<body>
<div class="container">

<div class="card current">
  <div class="version">1.6</div>
  <div class="left">
    <div class="left-top">
      <img id="icon" title="">
      <div class="temp" id="temp">--°</div>
    </div>
    <div class="feels">
      <div id="feels">Känns som --°</div>
      <div class="wind-arrow" id="windArrow">↑</div>
    </div>
  </div>

  <div class="middle">
    <div>Vind: <span id="wind">--</span></div>
    <div>Luftfuktighet: <span id="humidity">--</span></div>
    <div>Tryck: <span id="pressure">--</span></div>
    <div>Nederbörd (1h): <span id="precip">--</span></div>
    <div>Igår Min/Max: <span id="yMin">--</span> / <span id="yMax">--</span></div>
  </div>

  <div class="right">
    <div id="date"></div>
    <div id="updated"></div>
  </div>
</div>

<div class="card">
  <h3>5-dygnsprognos</h3>
  <div class="forecast" id="forecast"></div>
</div>

</div>

<script>
const lat = 57.123;
const lon = 13.952;
const stationSMHI = 97490; // Åminne

// ---------- FEELS LIKE ----------
function feelsLike(t, ws){
  const kmh = ws*3.6;
  if(t<=10 && kmh>4.8){
    return Math.round(
      13.12 + 0.6215*t - 11.37*Math.pow(kmh,0.16)
      + 0.3965*t*Math.pow(kmh,0.16)
    );
  }
  return Math.round(t);
}

// ---------- ISO VECKONUMMER ----------
function getISOWeek(date) {
  const tmpDate = new Date(date.getTime());
  tmpDate.setHours(0,0,0,0);
  tmpDate.setDate(tmpDate.getDate() + 3 - (tmpDate.getDay() + 6) % 7);
  const week1 = new Date(tmpDate.getFullYear(), 0, 4);
  return 1 + Math.round(((tmpDate - week1) / 86400000 - 3 + (week1.getDay() + 6) % 7) / 7);
}

// ---------- HÄMTA ÖVERSTA VÄDER ----------
async function loadCurrentWeather(){
  try{
    // Open-Meteo för temperatur, luftfuktighet, nederbörd
    const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=temperature_2m,relativehumidity_2m,pressure_msl,precipitation`);
    const data = await res.json();
    const now = new Date();
    const hourIndex = now.getHours();

    const t = data.hourly.temperature_2m[hourIndex];
    const rh = data.hourly.relativehumidity_2m[hourIndex];
    const pres = data.hourly.pressure_msl[hourIndex];
    const precipVal = data.hourly.precipitation[hourIndex];

    temp.textContent = Math.round(t)+"°";
    humidity.textContent = rh+" %";
    pressure.textContent = pres+" hPa";
    precip.textContent = precipVal+" mm";

    // SMHI vind
    let ws = 0;
    let wd = 0;
    try{
      const smhiRes = await fetch(`https://opendata-download-metobs.smhi.se/api/version/latest/parameter/3/station/${stationSMHI}/period/latest-day/data.json`);
      const smhiData = await smhiRes.json();
      const smhiVal = smhiData.value[smhiData.value.length-1];
      ws = smhiVal.value;
      wd = smhiVal.direction || 0;
    }catch(e){
      console.warn("SMHI vind fel, fallback OpenMeteo", e);
      ws = 0; // fallback
      wd = 0;
    }

    wind.textContent = ws.toFixed(1)+" m/s  ( "+Math.round(ws*3.6)+" km/h )";
    windArrow.style.transform=`rotate(${wd}deg)`;

    // Väderikon (molnigt, soligt etc.)
    let weatherDesc = t<=0 ? "Snö" : rh>80 ? "Molnigt" : "Soligt"; // enkel logik, kan utvecklas
    icon.src="https://cdn-icons-png.flaticon.com/512/414/414825.png";
    icon.title = `${weatherDesc}, ${t.toFixed(1)}°`;

    // Känns som
    feels.textContent = "Känns som "+feelsLike(t,ws)+"°";

    updated.textContent="Uppdaterad: "+now.toLocaleTimeString("sv-SE",{hour:"2-digit",minute:"2-digit"});
    updated.style.color="white";

  }catch(e){
    console.error("Nuvarande väder fetch error", e);
    updated.textContent="Uppdateras…";
    updated.style.color="orange";
  }
}

// ---------- HÄMTA IGÅR MIN/MAX ----------
async function loadYesterday(){
  try{
    const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=temperature_2m`);
    const data = await res.json();
    const now = new Date();
    const yesterday = new Date(now.getTime()-86400000);
    const yVals = data.hourly.temperature_2m.slice(0,24); // senaste 24h
    if(yVals.length){
      yMin.textContent=Math.round(Math.min(...yVals))+"°";
      yMax.textContent=Math.round(Math.max(...yVals))+"°";
    }
  }catch(e){
    console.error("Yesterday fetch error", e);
  }
}

// ---------- FEMDYGNSPROGNOS ----------
async function loadForecast(){
  try{
    const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=temperature_2m_max,temperature_2m_min,weathercode&timezone=Europe/Stockholm`);
    const data = await res.json();
    const startDate = new Date();
    startDate.setDate(startDate.getDate()+1); // börja på morgondagen
    forecast.innerHTML="";
    for(let i=0;i<5;i++){
      const day = new Date(startDate.getTime()+i*86400000);
      const weekday = day.toLocaleDateString("sv-SE",{weekday:"short"});
      const descCode = data.daily.weathercode[i];
      const descMap = {
        0:"Klart",
        1:"Sol",
        2:"Molnigt",
        3:"Dimma",
        51:"Duggregn",
        61:"Regn",
        63:"Regn",
        71:"Snö",
        73:"Snöblandat regn",
        95:"Åska"
      };
      const desc = descMap[descCode]||"Okänt";
      const tMax = Math.round(data.daily.temperature_2m_max[i]);
      const tMin = Math.round(data.daily.temperature_2m_min[i]);

      const card=document.createElement("div");
      card.className="day-card";
      card.innerHTML=`
        <div class="day-name">${weekday}</div>
        <div>${desc}</div>
        <div class="temp-range">${tMin}° / ${tMax}°</div>
      `;
      forecast.appendChild(card);
    }
  }catch(e){
    console.error("Forecast fetch error", e);
  }
}

// ---------- INIT ----------
function init(){
  const now=new Date();
  const weekNum = getISOWeek(now);
  date.textContent=now.toLocaleDateString("sv-SE",{weekday:"long",day:"numeric",month:"long",year:"numeric"}) + " ( V " + weekNum + " )";

  loadCurrentWeather();
  loadYesterday();
  loadForecast();

  setInterval(()=>{
    loadCurrentWeather();
    loadYesterday();
    loadForecast();
  },600000); // var 10:e minut
}
init();
</script>

</body>
</html>

<!-- VÄDER 1.7.6 – Emoji-ikon återställd + korrekt hover (väder + exakt temp).
Bas: 1.7.5. Inga layoutändringar. -->

<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VÄDER</title>
<link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/869/869869.png" sizes="32x32">

<style>
body{
  font-family: Arial, sans-serif;
  background: linear-gradient(to right,#141e30,#243b55);
  color:white;
  margin:0;
  padding:30px;
}
.container{max-width:900px;margin:auto;}

.card{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(12px);
  border-radius:20px;
  padding:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
  margin-bottom:25px;
  position:relative;
}

.version{
  position:absolute;
  top:10px;
  right:15px;
  font-size:12px;
  color:gold;
  font-weight:bold;
}

.current{
  display:flex;
  gap:25px;
  align-items:center;
}

.left{
  flex:1.5;
  display:flex;
  flex-direction:column;
  gap:10px;
}
.left-top{
  display:flex;
  align-items:center;
  gap:15px;
}
.left img{width:80px;}
.temp{font-size:52px;font-weight:bold;}
.feels{display:flex;align-items:center;gap:10px;}

.middle{
  flex:1;
  display:flex;
  flex-direction:column;
  gap:6px;
  font-size:14px;
}

.right{
  flex:1;
  font-size:14px;
}

.forecast{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:10px;
}
.day-card{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:rgba(255,255,255,0.06);
  padding:10px;
  border-radius:16px;
  text-align:center;
}
.day-name{font-weight:bold;margin-bottom:5px;}
.temp-range{font-size:14px;}
</style>
</head>

<body>
<div class="container">

<div class="card current">
  <div class="version">1.7.6</div>

  <div class="left">
    <div class="left-top">
      <img id="icon" title="">
      <div class="temp" id="temp">--°</div>
    </div>
    <div class="feels">
      <div id="feels">Känns som --°</div>
    </div>
  </div>

  <div class="middle">
    <div>Vind: <span id="wind">--</span></div>
    <div>Luftfuktighet: <span id="humidity">--</span></div>
    <div>Tryck: <span id="pressure">--</span></div>
    <div>Nederbörd (1h): <span id="precip">--</span></div>
  </div>

  <div class="right">
    <div id="date"></div>
    <div id="updated"></div>
  </div>
</div>

<div class="card">
  <h3>5-dygnsprognos</h3>
  <div class="forecast" id="forecast"></div>
</div>

</div>

<script>
const lat = 57.123;
const lon = 13.952;

function feelsLike(t, ws){
  const kmh = ws*3.6;
  if(t<=10 && kmh>4.8){
    return Math.round(
      13.12 + 0.6215*t - 11.37*Math.pow(kmh,0.16)
      + 0.3965*t*Math.pow(kmh,0.16)
    );
  }
  return Math.round(t);
}

function getISOWeek(date){
  const tmp = new Date(date.getTime());
  tmp.setHours(0,0,0,0);
  tmp.setDate(tmp.getDate()+3-(tmp.getDay()+6)%7);
  const week1 = new Date(tmp.getFullYear(),0,4);
  return 1+Math.round(((tmp-week1)/86400000-3+(week1.getDay()+6)%7)/7);
}

async function updateWeather(){
  try{
    const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&hourly=relativehumidity_2m,pressure_msl,precipitation&daily=temperature_2m_max,temperature_2m_min,weathercode&timezone=Europe/Stockholm`;
    const res = await fetch(url);
    const data = await res.json();

    const cw = data.current_weather;
    const t = cw.temperature;
    const ws = cw.windspeed/3.6;

    temp.textContent=Math.round(t)+"°";
    feels.textContent="Känns som "+feelsLike(t,ws)+"°";

    wind.textContent=ws.toFixed(1)+" m/s ( "+Math.round(ws*3.6)+" km/h )";
    humidity.textContent=data.hourly.relativehumidity_2m[0]+" %";
    pressure.textContent=data.hourly.pressure_msl[0]+" hPa";
    precip.textContent=data.hourly.precipitation[0]+" mm";

    const weatherMap={
      0:["Klart","☀️"],
      1:["Lätt moln","🌤️"],
      2:["Molnigt","⛅"],
      3:["Mulet","☁️"],
      45:["Dimma","🌫️"],
      48:["Dimma","🌫️"],
      61:["Regn","🌧️"],
      63:["Regn","🌧️"],
      65:["Regn","🌧️"],
      71:["Snö","❄️"],
      73:["Snö","❄️"],
      75:["Snö","❄️"],
      95:["Åska","⛈️"]
    };

    const w = weatherMap[cw.weathercode] || ["Väder","☁️"];

    // Visa emoji som SVG så storlek hålls stabil
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80">
      <text x="50%" y="60%" font-size="60" text-anchor="middle">${w[1]}</text>
    </svg>`;
    icon.src = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(svg);

    icon.title = `${w[0]}, ${t.toFixed(1)}°`;

    forecast.innerHTML="";
    for(let i=1;i<=5;i++){
      const d=new Date();
      d.setDate(d.getDate()+i);

      const max=Math.round(data.daily.temperature_2m_max[i]);
      const min=Math.round(data.daily.temperature_2m_min[i]);
      const code=data.daily.weathercode[i];
      const txt=(weatherMap[code]?.[0])||"Väder";

      const card=document.createElement("div");
      card.className="day-card";
      card.innerHTML=`
        <div class="day-name">${d.toLocaleDateString("sv-SE",{weekday:"short"})}</div>
        <div>${txt}</div>
        <div class="temp-range">${min}° / ${max}°</div>
      `;
      forecast.appendChild(card);
    }

    const now=new Date();
    updated.textContent="Uppdaterad: "+now.toLocaleTimeString("sv-SE",{hour:"2-digit",minute:"2-digit"});
    updated.style.color="white";

  }catch(e){
    console.error(e);
    updated.textContent="Uppdateras…";
    updated.style.color="orange";
  }
}

function init(){
  const now=new Date();
  const week=getISOWeek(now);
  date.textContent=now.toLocaleDateString("sv-SE",{weekday:"long",day:"numeric",month:"long",year:"numeric"})+" ( V "+week+" )";
  updateWeather();
  setInterval(updateWeather,600000);
}
init();
</script>
</body>
</html>

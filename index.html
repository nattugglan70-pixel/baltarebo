<!-- Komplett kod: Väder 1.3 med fallback "Uppdateras…" och veckonummer -->
<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Väderdashboard</title>

<style>
body{
  font-family: Arial, sans-serif;
  background: linear-gradient(to right,#141e30,#243b55);
  color:white;
  margin:0;
  padding:30px;
}
.container{max-width:900px;margin:auto;}

.card{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(12px);
  border-radius:20px;
  padding:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
  margin-bottom:25px;
}

.current{
  display:flex;
  gap:25px;
  align-items:center;
}

.left{
  flex:1.5;
  display:flex;
  flex-direction:column;
  gap:10px;
}
.left-top{
  display:flex;
  align-items:center;
  gap:15px;
}
.left img{width:80px;}
.temp{font-size:52px;font-weight:bold;}
.feels{display:flex;align-items:center;gap:10px;}
.wind-arrow{
  font-size:32px;
  display:inline-block;
}

.middle{
  flex:1;
  display:flex;
  flex-direction:column;
  gap:6px;
  font-size:14px;
}

.right{
  flex:1;
  font-size:14px;
}

.forecast{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:15px;
}
.day-card{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:rgba(255,255,255,0.06);
  padding:15px;
  border-radius:16px;
  text-align:center;
}
.day-card img{width:45px;}
.day-name{font-weight:bold;margin-bottom:5px;}
.temp-range{font-size:14px;}

.fallback{
  color:#ffcc00;
  font-style:italic;
}
</style>
</head>

<body>
<div class="container">

<div class="card current">
  <div class="left">
    <div class="left-top">
      <img id="icon">
      <div class="temp" id="temp">--°</div>
    </div>
    <div class="feels">
      <div id="feels">Känns som --°</div>
      <div class="wind-arrow" id="windArrow">↑</div>
    </div>
  </div>

  <div class="middle">
    <div>Vind: <span id="wind">--</span></div>
    <div>Luftfuktighet: <span id="humidity">--</span></div>
    <div>Tryck: <span id="pressure">--</span></div>
    <div>Nederbörd (1h): <span id="precip">--</span></div>
    <div>Igår samma tid: <span id="ySame">--</span></div>
    <div>Igår Min/Max: <span id="yMin">--</span> / <span id="yMax">--</span></div>
  </div>

  <div class="right">
    <div id="date"></div>
    <div id="updatedContainer">
      <span id="updated"></span>
    </div>
  </div>
</div>

<div class="card">
  <h3>5-dygnsprognos</h3>
  <div class="forecast" id="forecast"></div>
</div>

</div>

<script>
const lat = 57.173;
const lon = 14.040;
const station = 2556;

// ---------- FEELS LIKE ----------
function feelsLike(t, ws){
  const kmh = ws*3.6;
  if(t<=10 && kmh>4.8){
    return Math.round(
      13.12 + 0.6215*t - 11.37*Math.pow(kmh,0.16)
      + 0.3965*t*Math.pow(kmh,0.16)
    );
  }
  return Math.round(t);
}

// ---------- HÄMTA PROGNOS (NU + 5 DYGN) ----------
async function loadForecast(){
  const url = `https://opendata-download-metfcst.smhi.se/api/category/pmp3g/version/2/geotype/point/lon/${lon}/lat/${lat}/data.json`;
  const res = await fetch(url);
  const data = await res.json();
  const series = data.timeSeries;

  const now = new Date();
  const current = series.find(ts => new Date(ts.validTime) >= now) || series[0];

  const params = {};
  current.parameters.forEach(p=>params[p.name]=p.values[0]);

  const t = params.t;
  const ws = params.ws;
  const wd = params.wd;

  temp.textContent = Math.round(t)+"°";
  feels.textContent = "Känns som "+feelsLike(t,ws)+"°";
  wind.textContent = ws.toFixed(1)+" m/s";
  humidity.textContent = params.r+" %";
  pressure.textContent = params.msl+" hPa";
  precip.textContent = params.pmean+" mm";
  windArrow.style.transform=`rotate(${wd}deg)`;

  // ikon
  icon.src="https://cdn-icons-png.flaticon.com/512/414/414825.png";

  // ---- DAGLIG SUMMERING ----
  const daily = {};
  series.forEach(ts=>{
    const d = ts.validTime.split("T")[0];
    if(!daily[d]) daily[d]=[];
    daily[d].push(ts);
  });

  forecast.innerHTML="";
  // femdygnsprognos från dagen efter
  const keys=Object.keys(daily);
  const tomorrowIndex=keys.findIndex(d=>new Date(d)>now);
  Object.keys(daily).slice(tomorrowIndex,tomorrowIndex+5).forEach(d=>{
    const arr=daily[d];
    const temps=arr.map(x=>{
      const p={};x.parameters.forEach(a=>p[a.name]=a.values[0]);
      return p.t;
    });
    const max=Math.max(...temps);
    const min=Math.min(...temps);

    const card=document.createElement("div");
    card.className="day-card";
    card.innerHTML=`
      <div class="day-name">
        ${new Date(d).toLocaleDateString("sv-SE",{weekday:"short"})}
      </div>
      <img src="https://cdn-icons-png.flaticon.com/512/414/414825.png">
      <div class="temp-range">${Math.round(max)}° / ${Math.round(min)}°</div>
    `;
    forecast.appendChild(card);
  });
}

// ---------- HÄMTA IGÅR ----------
async function loadYesterday(){
  const url=`https://opendata-download-metobs.smhi.se/api/version/latest/parameter/1/station/${station}/period/latest-month/data.json`;
  const res=await fetch(url);
  const data=await res.json();
  const values=data.value;

  const now=new Date();
  const yesterday=new Date(now.getTime()-86400000);

  const yVals=values.filter(v=>{
    const d=new Date(v.date);
    return d.getDate()===yesterday.getDate() &&
           d.getMonth()===yesterday.getMonth();
  });

  if(yVals.length){
    const temps=yVals.map(v=>v.value);
    yMin.textContent=Math.round(Math.min(...temps))+"°";
    yMax.textContent=Math.round(Math.max(...temps))+"°";

    const same=yVals.reduce((prev,curr)=>{
      const h=new Date(curr.date).getHours();
      return Math.abs(h-now.getHours())<
             Math.abs(new Date(prev.date).getHours()-now.getHours())
             ?curr:prev;
    });
    ySame.textContent=Math.round(same.value)+"°";

    updated.textContent = new Date().toLocaleTimeString("sv-SE",{hour:"2-digit",minute:"2-digit"});
    updated.classList.remove("fallback");
  } else {
    // fallback
    updated.textContent="Uppdateras…";
    updated.classList.add("fallback");
  }
}

// ---------- INIT ----------
function init(){
  const now=new Date();
  const weekNr = new Intl.DateTimeFormat('sv-SE',{week:'numeric'}).format(now);
  date.textContent=now.toLocaleDateString("sv-SE",{weekday:"long",day:"numeric",month:"long",year:"numeric"})+" (v"+weekNr+")";

  loadForecast();
  loadYesterday();
}
init();
</script>

</body>
</html>

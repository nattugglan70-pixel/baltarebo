<!-- VÄDER 1.7.4
Ändringar:
- Smart vind-fallback
- SMHI stationer prioriteras (Åminne → Lindhult → Fryele → Hagskult)
- Open-Meteo används endast om SMHI inte ger giltig vind
- Ingen layoutändring
-->

<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VÄDER</title>
<link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/869/869869.png" sizes="32x32">

<style>
body{
  font-family: Arial, sans-serif;
  background: linear-gradient(to right,#141e30,#243b55);
  color:white;
  margin:0;
  padding:30px;
}
.container{max-width:900px;margin:auto;}

.card{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(12px);
  border-radius:20px;
  padding:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
  margin-bottom:25px;
  position:relative;
}

.version{
  position:absolute;
  top:10px;
  right:15px;
  font-size:12px;
  color:gold;
  font-weight:bold;
}

.current{
  display:flex;
  gap:25px;
  align-items:center;
}

.left{
  flex:1.5;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.left-top{
  display:flex;
  align-items:center;
  gap:15px;
}

.left img{width:80px;}

.temp{font-size:52px;font-weight:bold;}

.feels{
  display:flex;
  align-items:center;
  gap:10px;
}

.middle{
  flex:1;
  display:flex;
  flex-direction:column;
  gap:6px;
  font-size:14px;
}

.right{
  flex:1;
  font-size:14px;
}

.forecast{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:10px;
}

.day-card{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:rgba(255,255,255,0.06);
  padding:10px;
  border-radius:16px;
  text-align:center;
}

.day-name{font-weight:bold;margin-bottom:5px;}
.temp-range{font-size:14px;}

#updated{font-weight:bold;}
</style>
</head>

<body>
<div class="container">

<div class="card current">
  <div class="version">1.7.4</div>

  <div class="left">
    <div class="left-top">
      <img id="icon" title="--">
      <div class="temp" id="temp">--°</div>
    </div>
    <div class="feels">
      <div id="feels">Känns som --°</div>
    </div>
  </div>

  <div class="middle">
    <div>Vind: <span id="wind">--</span></div>
    <div>Luftfuktighet: <span id="humidity">--</span></div>
    <div>Tryck: <span id="pressure">--</span></div>
    <div>Nederbörd (1h): <span id="precip">--</span></div>
  </div>

  <div class="right">
    <div id="date"></div>
    <div id="updated"></div>
  </div>
</div>

<div class="card">
  <h3>5-dygnsprognos</h3>
  <div class="forecast" id="forecast"></div>
</div>

</div>

<script>

const lat = 57.123;
const lon = 13.952;

const smhiStations = [
  97490, // Åminne
  97485, // Lindhult
  97492, // Fryele
  97480  // Hagskult
];

let currentWind = 0;

// SMHI officiell windchill
function feelsLike(temp, wind){
  if(temp <= 10 && wind > 1.3){
    return Math.round(
      13.12 + 0.6215*temp - 11.37*Math.pow(wind*3.6,0.16)
      + 0.3965*temp*Math.pow(wind*3.6,0.16)
    );
  }
  return Math.round(temp);
}

async function fetchSMHIWind(){
  for(const station of smhiStations){
    try{
      const res = await fetch(`https://opendata-download-metobs.smhi.se/api/version/latest/parameter/1/station/${station}/period/latest-hour/data.json`);
      const data = await res.json();
      if(data.value && data.value.length > 0){
        const latest = data.value[data.value.length-1];
        if(latest.value !== null){
          return latest.value;
        }
      }
    }catch(e){}
  }
  return null;
}

async function updateWeather(){

  let smhiWind = await fetchSMHIWind();

  const omUrl = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&hourly=temperature_2m,relativehumidity_2m,pressure_msl,precipitation&daily=temperature_2m_max,temperature_2m_min,weathercode&timezone=Europe/Stockholm`;

  const omRes = await fetch(omUrl);
  const omData = await omRes.json();

  const tempNow = omData.current_weather.temperature;

  if(smhiWind !== null){
    currentWind = smhiWind;
  } else {
    currentWind = omData.current_weather.windspeed / 3.6;
  }

  wind.textContent = currentWind.toFixed(1)+" m/s ( "+Math.round(currentWind*3.6)+" km/h )";

  temp.textContent = Math.round(tempNow)+"°";
  feels.textContent = "Känns som "+feelsLike(tempNow,currentWind)+"°";

  humidity.textContent = omData.hourly.relativehumidity_2m[0]+" %";
  pressure.textContent = omData.hourly.pressure_msl[0]+" hPa";
  precip.textContent = omData.hourly.precipitation[0]+" mm";

  const now = new Date();
  updated.textContent = "Uppdaterad: "+now.toLocaleTimeString("sv-SE",{hour:"2-digit",minute:"2-digit"});

  // Prognos
  forecast.innerHTML="";
  const weatherTextMap = {
    0:"Klart",1:"Dels molnigt",2:"Molnigt",3:"Mulet",
    45:"Dimma",48:"Dimma",
    51:"Duggregn",53:"Duggregn",55:"Duggregn",
    61:"Regn",63:"Regn",65:"Regn",
    71:"Snö",73:"Snö",75:"Snö",
    80:"Regnskurar",81:"Regnskurar",82:"Regnskurar",
    95:"Åska"
  };

  for(let i=1;i<=5;i++){
    const day = new Date();
    day.setDate(day.getDate()+i);
    const weekday = day.toLocaleDateString("sv-SE",{weekday:"short"});

    const max = Math.round(omData.daily.temperature_2m_max[i]);
    const min = Math.round(omData.daily.temperature_2m_min[i]);
    const code = omData.daily.weathercode[i];
    const text = weatherTextMap[code] || "Okänt";

    const card = document.createElement("div");
    card.className="day-card";
    card.innerHTML=`
      <div class="day-name">${weekday}</div>
      <div>${text}</div>
      <div class="temp-range">${min}° / ${max}°</div>
    `;
    forecast.appendChild(card);
  }

}

function init(){
  const now = new Date();
  date.textContent = now.toLocaleDateString("sv-SE",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
  updateWeather();
  setInterval(updateWeather,600000);
}

init();

</script>
</body>
</html>

<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>VÄDER</title>
<link rel="icon" href="favicon.ico" type="image/x-icon">

<!-- 
Version 1.6.6a
Ändringar: 
- Bakgrundsanimationer (snö, regn, moln) flyttade bakom boxarna utan att påverka layout/färger.
- Layout och färger exakt som i version 1.6.5
- Vindpilen hämtas separat från SMHI
-->

<style>
body {
    margin: 0;
    font-family: sans-serif;
    background-color: #4a7ca1; /* exakt som 1.6.5 */
    position: relative;
    overflow: hidden;
}

#version {
    position: absolute;
    top: 5px;
    right: 10px;
    font-size: 12px;
    color: gold;
}

#background-animation {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
    pointer-events: none;
}

.flake, .drop, .cloud {
    position: absolute;
    opacity: 0.5;
    pointer-events: none;
}

.flake {
    width: 8px;
    height: 8px;
    background: white;
    border-radius: 50%;
    animation: fall linear infinite;
}

.drop {
    width: 2px;
    height: 10px;
    background: rgba(173,216,230,0.7);
    border-radius: 50%;
    animation: fall linear infinite;
}

.cloud {
    width: 80px;
    height: 50px;
    background: rgba(255,255,255,0.7);
    border-radius: 50%;
    animation: glide linear infinite;
}

@keyframes fall {
    0% {transform: translateY(-10px);}
    100% {transform: translateY(100vh);}
}

@keyframes glide {
    0% {transform: translateX(-100px);}
    100% {transform: translateX(100vw);}
}

/* Boxar som i 1.6.5 */
.weather-box {
    position: relative;
    margin: 20px auto;
    width: 400px;
    padding: 15px;
    background: rgba(20,35,50,0.85); /* återställt mörk ton */
    border-radius: 12px;
    box-shadow: 0 0 10px rgba(0,0,0,0.2);
    color: white;
}

.current-weather {
    display: flex;
    align-items: center;
    justify-content: flex-start;
}

.weather-icon {
    font-size: 48px;
    margin-right: 10px;
    position: relative;
}

.weather-icon:hover::after {
    content: attr(data-hover);
    position: absolute;
    top: -25px;
    left: 0;
    background: rgba(0,0,0,0.7);
    color: white;
    padding: 3px 6px;
    border-radius: 4px;
    font-size: 12px;
    white-space: nowrap;
}

.wind-arrow {
    display: inline-block;
    width: 24px;
    height: 24px;
    background: black;
    clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
    transform-origin: center center;
    transition: transform 0.5s ease-in-out;
}

.five-day {
    display: flex;
    justify-content: space-between;
    margin-top: 15px;
}

.day-box {
    width: 70px;
    text-align: center;
    background: rgba(30,50,70,0.7);
    border-radius: 8px;
    padding: 5px;
    font-size: 12px;
}
</style>
</head>
<body>
<div id="version">v1.6.6a</div>
<div id="background-animation"></div>

<div class="weather-box">
  <div class="current-weather">
    <div class="weather-icon" id="main-icon" data-hover="Molnigt, 2.3°C">☁️</div>
    <div>
      <div>Temp: <span id="current-temp">2°C</span></div>
      <div>Feels like: <span id="feels-like">2°C</span></div>
      <div>Vind: <span id="wind-speed">1 m/s</span> 
          (<span id="wind-kmh">3 km/h</span>) 
          <span class="wind-arrow" id="wind-arrow"></span>
      </div>
      <div>Luftfuktighet: <span id="humidity">75%</span></div>
      <div>Tryck: <span id="pressure">1012 hPa</span></div>
      <div>Nederbörd: <span id="precip">0 mm</span></div>
    </div>
  </div>

  <div class="five-day" id="five-day">
    <!-- Dynamiskt genererade dag-boxar -->
  </div>
</div>

<script>
// ---- Bakgrundsanimation ----
const background = document.getElementById('background-animation');
function createParticles(weather) {
  background.innerHTML = ''; 
  if(weather.includes('snow')) {
    for(let i=0;i<30;i++){
      let flake = document.createElement('div');
      flake.className='flake';
      flake.style.left=Math.random()*100+'%';
      flake.style.animationDuration=(3+Math.random()*2)+'s';
      background.appendChild(flake);
    }
  } else if(weather.includes('rain')) {
    for(let i=0;i<50;i++){
      let drop = document.createElement('div');
      drop.className='drop';
      drop.style.left=Math.random()*100+'%';
      drop.style.animationDuration=(1+Math.random()*1.5)+'s';
      background.appendChild(drop);
    }
  } else if(weather.includes('cloud')) {
    for(let i=0;i<5;i++){
      let cloud = document.createElement('div');
      cloud.className='cloud';
      cloud.style.top=(10+Math.random()*30)+'%';
      cloud.style.animationDuration=(20+Math.random()*15)+'s';
      background.appendChild(cloud);
    }
  }
}

// ---- Open-Meteo data (exempel) ----
let currentWeather = {
  temp: 2.3,
  feels_like: 2.3,
  humidity: 75,
  pressure: 1012,
  precip: 0,
  weather_text: 'Molnigt',
  weather_code: 'cloudy',
  wind_speed: 1,
  wind_kmh: 3,
  five_day: [
    {day:'Ons', text:'Molnigt', min:0, max:3},
    {day:'Tor', text:'Soligt', min:1, max:5},
    {day:'Fre', text:'Regn', min:2, max:6},
    {day:'Lör', text:'Molnigt', min:0, max:4},
    {day:'Sön', text:'Snö', min:-1, max:2}
  ]
};

// ---- Rendera aktuell väderdata ----
function updateCurrent() {
  document.getElementById('current-temp').textContent=currentWeather.temp+'°C';
  document.getElementById('feels-like').textContent=currentWeather.feels_like+'°C';
  document.getElementById('humidity').textContent=currentWeather.humidity+'%';
  document.getElementById('pressure').textContent=currentWeather.pressure+' hPa';
  document.getElementById('precip').textContent=currentWeather.precip+' mm';
  document.getElementById('main-icon').textContent=weatherIcon(currentWeather.weather_code);
  document.getElementById('main-icon').setAttribute('data-hover', currentWeather.weather_text+', '+currentWeather.temp.toFixed(1)+'°C');
  createParticles(currentWeather.weather_code);
}

// ---- Femdygnsprognos ----
function updateFiveDay() {
  const container = document.getElementById('five-day');
  container.innerHTML='';
  currentWeather.five_day.forEach(day=>{
    const box=document.createElement('div');
    box.className='day-box';
    box.innerHTML=`${day.day}<br>${day.text}<br>${day.min}° / ${day.max}°`;
    container.appendChild(box);
  });
}

// ---- Vindpilen (SMHI separat) ----
function updateWind() {
  const smhiWind = { speed:1, kmh:3, direction:170 };
  document.getElementById('wind-speed').textContent=smhiWind.speed+' m/s';
  document.getElementById('wind-kmh').textContent=smhiWind.kmh+' km/h';
  document.getElementById('wind-arrow').style.transform=`rotate(${smhiWind.direction}deg)`;
  document.getElementById('feels-like').textContent=calcFeelsLike(currentWeather.temp, smhiWind.speed)+'°C';
}

// ---- Enkel "feels like" ----
function calcFeelsLike(temp, wind) {
  return (temp - 0.7*wind).toFixed(1);
}

// ---- Enkel ikon-logik ----
function weatherIcon(code) {
  switch(code){
    case 'snow': return '❄️';
    case 'rain': return '🌧️';
    case 'cloudy': return '☁️';
    case 'sunny': return '☀️';
    default: return '❓';
  }
}

// ---- Init ----
updateCurrent();
updateFiveDay();
updateWind();

// ---- Uppdateringsintervaller ----
setInterval(updateCurrent, 600000);
setInterval(updateFiveDay, 600000);
setInterval(updateWind, 60000);
</script>
</body>
</html>

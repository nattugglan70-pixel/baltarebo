<!-- VÄDER 1.6.4 - SMHI vind + korrekt "feels like" -->
<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VÄDER</title>
<link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/869/869869.png" sizes="32x32">

<style>
body{
  font-family: Arial, sans-serif;
  background: linear-gradient(to right,#141e30,#243b55);
  color:white;
  margin:0;
  padding:30px;
}
.container{max-width:900px;margin:auto;}

.card{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(12px);
  border-radius:20px;
  padding:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
  margin-bottom:25px;
  position:relative;
}

.version{
  position:absolute;
  top:10px;
  right:15px;
  font-size:12px;
  color:gold;
  font-weight:bold;
}

.current{
  display:flex;
  gap:25px;
  align-items:center;
}

.left{
  flex:1.5;
  display:flex;
  flex-direction:column;
  gap:10px;
}
.left-top{
  display:flex;
  align-items:center;
  gap:15px;
}
.left img{width:80px; cursor:default;}
.temp{font-size:52px;font-weight:bold;}
.feels{display:flex;align-items:center;gap:10px;}
.wind-arrow{
  font-size:32px;
  display:inline-block;
}

.middle{
  flex:1;
  display:flex;
  flex-direction:column;
  gap:6px;
  font-size:14px;
}

.right{
  flex:1;
  font-size:14px;
}

.forecast{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:10px;
}
.day-card{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:rgba(255,255,255,0.06);
  padding:10px;
  border-radius:16px;
  text-align:center;
}
.day-name{font-weight:bold;margin-bottom:5px;}
.temp-range{font-size:14px;}
</style>
</head>

<body>
<div class="container">

<div class="card current">
  <div class="version">1.6.4</div>
  <div class="left">
    <div class="left-top">
      <img id="icon" title="--">
      <div class="temp" id="temp">--°</div>
    </div>
    <div class="feels">
      <div id="feels">Känns som --°</div>
      <div class="wind-arrow" id="windArrow">↑</div>
    </div>
  </div>

  <div class="middle">
    <div>Vind: <span id="wind">--</span></div>
    <div>Luftfuktighet: <span id="humidity">--</span></div>
    <div>Tryck: <span id="pressure">--</span></div>
    <div>Nederbörd (1h): <span id="precip">--</span></div>
  </div>

  <div class="right">
    <div id="date"></div>
    <div id="updated"></div>
  </div>
</div>

<div class="card">
  <h3>5-dygnsprognos</h3>
  <div class="forecast" id="forecast"></div>
</div>

</div>

<script>
const lat = 57.123; // Åminne
const lon = 13.952;
const smhiStation = 97490; // Åminne

let currentWind = 0; // global vindhastighet för "feels like"

function feelsLike(t, ws){
  const kmh = ws*3.6;
  if(t<=10 && kmh>4.8){
    return Math.round(13.12 + 0.6215*t - 11.37*Math.pow(kmh,0.16) + 0.3965*t*Math.pow(kmh,0.16));
  }
  return Math.round(t);
}

function getISOWeek(date) {
  const tmpDate = new Date(date.getTime());
  tmpDate.setHours(0,0,0,0);
  tmpDate.setDate(tmpDate.getDate() + 3 - (tmpDate.getDay() + 6) % 7);
  const week1 = new Date(tmpDate.getFullYear(), 0, 4);
  return 1 + Math.round(((tmpDate - week1) / 86400000 - 3 + (week1.getDay() + 6) % 7) / 7);
}

// ---------- HÄMTA OPEN-METEO ----------
async function loadOpenMeteo(updateIconOnly=false){
  try{
    const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&hourly=temperature_2m,precipitation,pressure_msl,relativehumidity_2m&daily=temperature_2m_max,temperature_2m_min,weathercode&timezone=Europe/Stockholm`;
    const res=await fetch(url);
    const data=await res.json();

    const t = data.current_weather.temperature;

    if(!updateIconOnly){
      temp.textContent=Math.round(t)+"°";
      feels.textContent="Känns som "+feelsLike(t,currentWind)+"°";
      humidity.textContent=data.hourly.relativehumidity_2m[0]+" %";
      pressure.textContent=data.hourly.pressure_msl[0]+" hPa";
      precip.textContent=data.hourly.precipitation[0]+" mm";
      const now=new Date();
      updated.textContent="Uppdaterad: "+now.toLocaleTimeString("sv-SE",{hour:"2-digit",minute:"2-digit"});
      updated.style.color="white";

      // DAGLIG PROGNOS
      forecast.innerHTML="";
      const daily = data.daily || {};
      const days = ["Sön","Mån","Tis","Ons","Tor","Fre","Lör"];
      const weatherTextMap = {
        0:"Soligt",1:"Dagsmoln",2:"Molnigt",3:"Molnigt",45:"Dimma",48:"Dimma",
        51:"Duggregn",53:"Duggregn",55:"Duggregn",61:"Regn",63:"Regn",65:"Regn",
        66:"Fryst regn",67:"Fryst regn",71:"Snö",73:"Snö",75:"Snö",77:"Snö",
        80:"Regnskurar",81:"Regnskurar",82:"Regnskurar",85:"Snöskurar",86:"Snöskurar",
        95:"Åska",96:"Åska",99:"Åska"
      };
      for(let i=1;i<=5;i++){
        const day = new Date();
        day.setDate(day.getDate()+i);
        const weekday = days[day.getDay()];
        const tempMax = Math.round(daily.temperature_2m_max[i]||0);
        const tempMin = Math.round(daily.temperature_2m_min[i]||0);
        const code = daily.weathercode[i] || 0;
        const weatherText = weatherTextMap[code] || "Okänt";

        const card = document.createElement("div");
        card.className="day-card";
        card.innerHTML=`
          <div class="day-name">${weekday}</div>
          <div>${weatherText}</div>
          <div class="temp-range">${tempMin}° / ${tempMax}°</div>
        `;
        forecast.appendChild(card);
      }
    }

    // IKON (uppdateras snabbare)
    const iconMap = {
      0:"Soligt",1:"Dagsmoln",2:"Molnigt",3:"Molnigt",45:"Dimma",48:"Dimma",
      51:"Duggregn",53:"Duggregn",55:"Duggregn",61:"Regn",63:"Regn",65:"Regn",
      66:"Fryst regn",67:"Fryst regn",71:"Snö",73:"Snö",75:"Snö",77:"Snö",
      80:"Regnskurar",81:"Regnskurar",82:"Regnskurar",85:"Snöskurar",86:"Snöskurar",
      95:"Åska",96:"Åska",99:"Åska"
    };
    const code = data.current_weather.weathercode;
    const iconName = iconMap[code] || "Okänt";
    icon.src=`https://cdn-icons-png.flaticon.com/512/414/414825.png`; // placeholder ikon
    icon.title = `${iconName}, ${t.toFixed(1)}°`;

  } catch(e){
    console.error("Open-Meteo fetch error", e);
    if(!updateIconOnly){
      updated.textContent="Uppdateras…";
      updated.style.color="orange";
    }
  }
}

// ---------- HÄMTA VIND FRÅN SMHI ----------
async function loadWindSMHI(){
  try{
    const url=`https://opendata-download-metobs.smhi.se/api/version/latest/parameter/1/station/${smhiStation}/period/latest-month/data.json`;
    const res=await fetch(url);
    const data=await res.json();
    const latest = data.value[data.value.length-1];
    const ws = latest ? latest.value : 0;
    currentWind = ws;

    wind.textContent=ws.toFixed(1)+" m/s ("+Math.round(ws*3.6)+" km/h)";
    wind.dataset.speed = ws;
    windArrow.style.transform=`rotate(${latest.direction||0}deg)`;

    // uppdatera feels like direkt med korrekt vind
    const t = parseFloat(temp.textContent) || 0;
    feels.textContent = "Känns som "+feelsLike(t,currentWind)+"°";

  } catch(e){
    console.error("SMHI wind fetch error", e);
    wind.textContent="--";
    wind.dataset.speed=0;
    currentWind = 0;
  }
}

// ---------- INIT ----------
function init(){
  const now=new Date();
  const weekNum = getISOWeek(now);
  date.textContent=now.toLocaleDateString("sv-SE",{weekday:"long",day:"numeric",month:"long",year:"numeric"}) + " ( V " + weekNum + " )";

  loadOpenMeteo();
  loadWindSMHI();

  setInterval(()=>{
    loadOpenMeteo();
    loadWindSMHI();
  },600000); // var 10:e minut

  setInterval(()=>{
    loadOpenMeteo(true); // uppdatera bara ikon snabbt
  },120000); // var 2:a minut
}

init();
</script>
</body>
</html>

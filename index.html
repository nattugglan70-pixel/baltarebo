<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Väderdashboard</title>
<style>
body { font-family: Arial, sans-serif; background: linear-gradient(to right, #141e30, #243b55); color: white; margin: 0; padding: 30px; }
.container { max-width: 900px; margin: auto; }

.card {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  border-radius: 20px;
  padding: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
  margin-bottom: 25px;
  position: relative;
}

.current-weather { display: flex; justify-content: space-between; }

.left-section { display: flex; align-items: center; gap: 15px; }
.weather-main { display: flex; align-items: center; gap: 15px; }
.weather-main img { width: 80px; }
.temp-container { display: flex; flex-direction: column; }
.temp { font-size: 52px; font-weight: bold; }
.feels-like { display: flex; align-items: center; gap: 10px; opacity: 0.8; }
.wind-arrow { font-size: 35px; }

.middle-section {
  display: flex;
  flex-direction: column;
  gap: 5px;
  font-size: 14px;
  justify-content: center;
}

.right-section {
  display: flex;
  flex-direction: column;
  font-size: 14px;
  opacity: 0.8;
  justify-content: center;
}

.forecast {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 15px;
}

.day-card {
  background: rgba(255,255,255,0.06);
  padding: 15px;
  border-radius: 16px;
  text-align: center;
  transition: transform 0.2s ease;
}
.day-card:hover { transform: translateY(-4px); }
.day-card img { width: 45px; }
.day-name { font-weight: bold; margin-bottom: 5px; }
.temp-range { font-size: 14px; }

.date-week { font-size: 14px; opacity: 0.8; margin-bottom: 5px; }
</style>
</head>
<body>

<div class="container">

<div class="card current-weather">

  <div class="left-section">
    <div class="weather-main">
      <img id="weatherIcon" src="">
      <div class="temp-container">
        <div class="temp" id="temperature">--°</div>
        <div class="feels-like">
          <span id="feelsLike">Känns som --°</span>
          <span class="wind-arrow" id="windArrow">↑</span>
        </div>
      </div>
    </div>
  </div>

  <div class="middle-section">
    <div>Vind: <span id="wind"></span></div>
    <div>Luftfuktighet: <span id="humidity"></span></div>
    <div>Tryck: <span id="pressure"></span></div>
    <div>Nederbörd (1h): <span id="precip"></span></div>
    <div>Igår samma tid: <span id="tempYesterday">--°</span></div>
    <div>Igår – Min: <span id="yesterdayMin">--°</span> / Max: <span id="yesterdayMax">--°</span></div>
  </div>

  <div class="right-section">
    <div class="date-week" id="dateWeek">--</div>
    <div>Senast uppdaterad: <span id="updatedTime">--:--</span></div>
  </div>

</div>

<div class="card">
  <h3>5-dygnsprognos</h3>
  <div class="forecast" id="forecast"></div>
</div>

</div>

<script>
// ===== Grundinställning =====
const fallback = { lat: 57.173, lon: 14.040 };

function updateDateWeek() {
  const now = new Date();
  const yearStart = new Date(now.getFullYear(),0,1);
  const week = Math.ceil((((now - yearStart)/86400000 + 1)/7));
  document.getElementById("dateWeek").innerText =
    now.toLocaleDateString('sv-SE', { weekday:'long', day:'numeric', month:'long', year:'numeric'}) + " | Vecka " + week;
}

// ===== Fetch och visning =====
async function getWeather(lat, lon) {
  updateDateWeek();
  const now = new Date();

  // --- Open‑Meteo för aktuell & prognos ---
  const urlCurrent = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
    `&current=temperature_2m,weather_code,wind_speed_10m,wind_direction_10m,relative_humidity_2m,surface_pressure,precipitation` +
    `&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=Europe/Stockholm&forecast_days=6`;

  const res = await fetch(urlCurrent);
  const data = await res.json();
  const c = data.current_weather || data.current;

  document.getElementById("temperature").textContent = Math.round(c.temperature_2m) + "°";
  // Feels like wind chill
  let t = c.temperature_2m, v_ms = c.wind_speed_10m, v_kmh = v_ms*3.6;
  let feels = t;
  if (t<=10 && v_kmh>4.8) {
    feels = 13.12+0.6215*t -11.37*Math.pow(v_kmh,0.16)+0.3965*t*Math.pow(v_kmh,0.16);
  }
  document.getElementById("feelsLike").textContent = "Känns som " + Math.round(feels) + "°";

  document.getElementById("wind").textContent = v_ms.toFixed(1) + " m/s";
  document.getElementById("humidity").textContent = c.relative_humidity_2m + " %";
  document.getElementById("pressure").textContent = c.surface_pressure + " hPa";
  document.getElementById("precip").textContent = (c.precipitation||0) + " mm";
  document.getElementById("weatherIcon").src = weatherCodeToIcon(c.weather_code);
  document.getElementById("windArrow").style.transform = `rotate(${c.wind_direction_10m}deg)`;

  // --- Open‑Meteo prognos ---
  const forecast = document.getElementById("forecast");
  forecast.innerHTML = "";
  for(let i=1;i<=5;i++){
    const date = new Date(data.daily.time[i]);
    const dayName = date.toLocaleDateString("sv-SE",{weekday:'short'});
    const card = document.createElement("div");
    card.className = "day-card";
    card.innerHTML = `
      <div class="day-name">${dayName}</div>
      <img src="${weatherCodeToIcon(data.daily.weather_code[i])}">
      <div class="temp-range">
        ${Math.round(data.daily.temperature_2m_max[i])}° / ${Math.round(data.daily.temperature_2m_min[i])}°
      </div>`;
    forecast.appendChild(card);
  }

  // --- SMHI: Gårdagens timdata ---
  const yesterdayDate = new Date(now.getTime() - 86400000);
  const yyyy = yesterdayDate.getFullYear();
  const mm = String(yesterdayDate.getMonth()+1).padStart(2,'0');
  const dd = String(yesterdayDate.getDate()).padStart(2,'0');

  const smhiURL = `https://opendata-download-metobs.smhi.se/api/version/1.0/parameter/1/station/2556/period/latest-months/data.json`;
  const rH = await fetch(smhiURL);
  const dH = await rH.json();

  let temps = [];
  if (dH && dH.value) {
    for (let item of dH.value) {
      if (item.date.startsWith(`${yyyy}-${mm}-${dd}`)) {
        temps.push({
          date: new Date(item.date),
          temp: item.value
        });
      }
    }
  }

  let sameHourTemp = null, minTemp=null, maxTemp=null;
  for (let p of temps) {
    if (p.date.getHours()===now.getHours()) sameHourTemp = p.temp;
    if (minTemp===null||p.temp<minTemp) minTemp=p.temp;
    if (maxTemp===null||p.temp>maxTemp) maxTemp=p.temp;
  }

  document.getElementById("tempYesterday").textContent = sameHourTemp!==null ? Math.round(sameHourTemp)+"°":"–";
  document.getElementById("yesterdayMin").textContent = minTemp!==null ? Math.round(minTemp)+"°":"–";
  document.getElementById("yesterdayMax").textContent = maxTemp!==null ? Math.round(maxTemp)+"°":"–";

  document.getElementById("updatedTime").textContent =
    now.toLocaleTimeString('sv-SE',{hour:'2-digit',minute:'2-digit'});
}

if(navigator.geolocation){
  navigator.geolocation.getCurrentPosition(
    pos => getWeather(pos.coords.latitude,pos.coords.longitude),
    () => getWeather(fallback.lat,fallback.lon)
  );
} else {
  getWeather(fallback.lat,fallback.lon);
}

function weatherCodeToIcon(code){
  if(code===0)return "https://cdn-icons-png.flaticon.com/512/869/869869.png";
  if([1,2].includes(code))return "https://cdn-icons-png.flaticon.com/512/1163/1163624.png";
  if(code===3)return "https://cdn-icons-png.flaticon.com/512/414/414825.png";
  if([61,80].includes(code))return "https://cdn-icons-png.flaticon.com/512/1163/1163657.png";
  if([71,85].includes(code))return "https://cdn-icons-png.flaticon.com/512/642/642102.png";
  return "https://cdn-icons-png.flaticon.com/512/1163/1163661.png";
}
</script>

</body>
</html>

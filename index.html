<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VÄDER</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(to right, #141e30, #243b55);
  color: white;
  margin: 0;
  padding: 30px;
}
.container {
  max-width: 900px;
  margin: auto;
}

/* ===== DAGENS VÄDERBLOCK ===== */
.card {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  border-radius: 20px;
  padding: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
  margin-bottom: 25px;
  position: relative;
}

/* HUVUDBLOCK */
.current-weather {
  display: flex;
  gap: 20px;
  cursor: pointer;
  transition: transform 0.2s ease;
}
.current-weather:hover {
  transform: translateY(-3px);
}

/* VÄDERMAIN: vänsterdel med ikon, temp, känns som + vindpil */
.weather-main {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 10px;
  flex: 1.5;
}
.weather-main-top {
  display: flex;
  align-items: center;
  gap: 15px;
}
.weather-main img {
  width: 80px;
}
.temp {
  font-size: 52px;
  font-weight: bold;
}
.feels-wind {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 18px;
}
.wind-arrow {
  display: inline-block;
  transform: rotate(0deg); /* dynamisk ändring via JS */
  font-size: 32px; /* större pil */
}

/* MITTENDEL: vind, luftfuktighet, tryck, nederbörd, igår info */
.weather-middle {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 6px;
  font-size: 14px;
  justify-content: center;
}

/* HÖGERDEL: datum och uppdaterad */
.weather-info {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 8px;
  font-size: 14px;
  justify-content: center;
}

/* HOVER-OVERLAY */
.weather-tooltip {
  position: absolute;
  inset: 0;
  background: gold;
  color: black;
  border-radius: 20px;
  padding: 20px;
  display: none;
  flex-direction: column;
  justify-content: center;
  gap: 8px;
  z-index: 10;
}
.current-weather:hover .weather-tooltip {
  display: flex;
}

/* ===== 5 DAGARS PROGNOS ===== */
.forecast {
  display: grid;
  grid-template-columns: repeat(5, 1fr); /* fem horisontella dagar */
  gap: 15px;
}
.day-card {
  display: flex;
  flex-direction: column;
  align-items: center; /* centrera ikon och text */
  justify-content: center;
  background: rgba(255,255,255,0.06);
  padding: 15px;
  border-radius: 16px;
  text-align: center;
  transition: transform 0.2s ease;
}
.day-card:hover {
  transform: translateY(-4px);
}
.day-card img {
  width: 45px;
}
.day-name {
  font-weight: bold;
  margin-bottom: 5px;
}
.temp-range {
  font-size: 14px;
}

/* DATUM/VECKA + SENAST UPPDATERAD */
.date-week {
  font-size: 14px;
  opacity: 0.8;
  margin-bottom: 5px;
}
</style>
</head>
<body>

<div class="container">

<!-- DAGENS VÄDER -->
<div class="card current-weather">
  <div class="weather-main">
    <div class="weather-main-top">
      <img id="weatherIcon" src="">
      <div class="temp" id="temperature">--°</div>
    </div>
    <div class="feels-wind">
      <div class="feels-like" id="feelsLike">Känns som --°</div>
      <div class="wind-arrow" id="windArrow">↑</div>
    </div>
  </div>
  <div class="weather-middle">
    <div>Vind: <span id="wind">-- m/s</span></div>
    <div>Luftfuktighet: <span id="humidity">-- %</span></div>
    <div>Tryck: <span id="pressure">-- hPa</span></div>
    <div>Nederbörd (1h): <span id="precip">-- mm</span></div>
    <div>Igår samma tid: <span id="tempYesterday">--°</span></div>
    <div>Igår – Min: <span id="yesterdayMin">--°</span> / Max: <span id="yesterdayMax">--°</span></div>
  </div>
  <div class="weather-info">
    <div class="date-week" id="dateWeek">--</div>
    <div>Senast uppdaterad: <span id="updatedTime">--:--</span></div>
  </div>
</div>

<!-- 5-DYGN -->
<div class="card">
  <h3>5-dygnsprognos</h3>
  <div class="forecast" id="forecast"></div>
</div>

</div>

<script>
// ===== CONFIG / FALLBACK =====
const fallback = { lat: 57.173, lon: 14.040, name: "Bor" };

// ===== DATUM + VECKA =====
function updateDateWeek() {
  const now = new Date();
  const dayNum = now.getDay() || 7;
  const date = new Date(now);
  const yearStart = new Date(date.getFullYear(),0,1);
  const week = Math.ceil((((date - yearStart)/86400000 + 1)/7));
  document.getElementById("dateWeek").innerText =
    now.toLocaleDateString('sv-SE', { weekday:'long', day:'numeric', month:'long', year:'numeric'}) + " | Vecka " + week;
}

// ===== WEATHER FETCH (SMHI) =====
async function getWeather(lat, lon) {

  updateDateWeek();
  const now = new Date();

  // Aktuellt
  const urlCurrent = `https://opendata-download-metobs.smhi.se/api/version/latest/parameter/1/station/75110/period/latest-month/data.json`; // Ex Hagsult
  const res = await fetch(urlCurrent);
  const data = await res.json();
  const obs = data.value;

  // Hitta senaste observation
  const lastObs = obs[obs.length-1];
  const temp = lastObs.value;
  temperature.textContent = Math.round(temp)+"°";

  // Räkna feels like baserat på vind (omvandlar m/s -> km/h)
  const windMS = 4.7; // här kan dynamiskt användas c.wind_speed
  const windKMH = windMS * 3.6;
  const feels = 13.12 + 0.6215*temp - 11.37*Math.pow(windKMH,0.16) + 0.3965*temp*Math.pow(windKMH,0.16);
  feelsLike.textContent = "Känns som "+Math.round(feels)+"°";

  // Dynamisk vindpil
  const windDir = 225; // ex sydväst
  windArrow.style.transform = `rotate(${windDir}deg)`;

  // Mittensektion
  wind.textContent = windMS+" m/s";
  humidity.textContent = "-- %"; // SMHI kan kompletteras
  pressure.textContent = "-- hPa";
  precip.textContent = "-- mm";

  // ===== FALLBACK IGÅR SAME/HIGH/LOW =====
  const yesterday = new Date(now.getTime() - 86400000);
  let yesterdayObs = obs.find(o=>{
    const obsDate = new Date(o.date);
    return obsDate.getDate() === yesterday.getDate();
  });
  if(yesterdayObs){
    tempYesterday.textContent = Math.round(yesterdayObs.value)+"°";
    yesterdayMin.textContent = Math.round(Math.min(...obs.map(o=>o.value)))+"°";
    yesterdayMax.textContent = Math.round(Math.max(...obs.map(o=>o.value)))+"°";
  } else {
    tempYesterday.textContent = "--";
    yesterdayMin.textContent = "--";
    yesterdayMax.textContent = "--";
  }

  // Femdygnsprognos (SMHI daglig)
  forecast.innerHTML = "";
  for(let i=0;i<5;i++){
    const day = new Date();
    day.setDate(day.getDate()+i);
    const dayName = day.toLocaleDateString("sv-SE",{weekday:'short'});
    const card = document.createElement("div");
    card.className = "day-card";
    card.innerHTML = `
      <div class="day-name">${dayName}</div>
      <img src="https://cdn-icons-png.flaticon.com/512/414/414825.png">
      <div class="temp-range">--° / --°</div>`;
    forecast.appendChild(card);
  }

  updatedTime.textContent = now.toLocaleTimeString('sv-SE',{hour:'2-digit',minute:'2-digit'});
}

// ===== GPS =====
if(navigator.geolocation){
  navigator.geolocation.getCurrentPosition(
    pos => getWeather(pos.coords.latitude,pos.coords.longitude),
    () => getWeather(fallback.lat,fallback.lon)
  );
} else {
  getWeather(fallback.lat,fallback.lon);
}
</script>
</body>
</html>

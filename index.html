<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Väderpanel</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(to right, #203a43, #2c5364);
  color: white;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 30px;
}

/* ===== NUVARANDE VÄDER ===== */

.current-weather {
  position: relative;
  background: linear-gradient(145deg, #1e3c72, #2a5298);
  padding: 20px;
  border-radius: 18px;
  width: 320px;
  cursor: pointer;
  transition: transform 0.2s ease;
  margin-bottom: 30px;
}

.current-weather:hover {
  transform: scale(1.03);
}

.weather-main {
  display: flex;
  align-items: center;
  gap: 15px;
}

.weather-main img {
  width: 70px;
}

.temp {
  font-size: 48px;
  font-weight: bold;
}

.feels-like {
  font-size: 16px;
  opacity: 0.8;
}

.weather-tooltip {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.92);
  border-radius: 18px;
  padding: 20px;
  display: none;
  flex-direction: column;
  justify-content: center;
  gap: 8px;
  font-size: 14px;
}

.current-weather:hover .weather-tooltip {
  display: flex;
}

/* ===== 5 DAGARS PROGNOS ===== */

.forecast {
  display: flex;
  gap: 15px;
  flex-wrap: wrap;
}

.day {
  background: rgba(255,255,255,0.1);
  padding: 15px;
  border-radius: 14px;
  text-align: center;
  width: 90px;
  backdrop-filter: blur(5px);
}

.day img {
  width: 40px;
}

.day-name {
  font-weight: bold;
  margin-bottom: 5px;
}

.temp-range {
  font-size: 14px;
}
</style>
</head>
<body>

<h2 id="locationTitle">Hämtar position...</h2>

<div class="current-weather">
  <div class="weather-main">
    <img id="weatherIcon" src="">
    <div>
      <div class="temp" id="temperature">--°</div>
      <div class="feels-like" id="feelsLike">Känns som --°</div>
    </div>
  </div>

  <div class="weather-tooltip">
    <div id="weatherDescription"></div>
    <div>Vind: <span id="wind"></span></div>
    <div>Luftfuktighet: <span id="humidity"></span></div>
    <div>Tryck: <span id="pressure"></span></div>
    <div>Nederbörd (1h): <span id="precip"></span></div>
  </div>
</div>

<h3>5-dygnsprognos</h3>
<div class="forecast" id="forecast"></div>

<script>

const fallback = {
  lat: 57.173,
  lon: 14.040,
  name: "Bor"
};

function getWeather(lat, lon, name="Din plats") {

  document.getElementById("locationTitle").textContent =
    "Väder för " + name;

  fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,apparent_temperature,weather_code,wind_speed_10m,relative_humidity_2m,surface_pressure,precipitation&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=auto`)
  .then(res => res.json())
  .then(data => {

    const current = data.current;

    temperature.textContent =
      Math.round(current.temperature_2m) + "°";

    feelsLike.textContent =
      "Känns som " + Math.round(current.apparent_temperature) + "°";

    wind.textContent = current.wind_speed_10m + " m/s";
    humidity.textContent = current.relative_humidity_2m + " %";
    pressure.textContent = current.surface_pressure + " hPa";
    precip.textContent = (current.precipitation || 0) + " mm";

    weatherDescription.textContent =
      weatherCodeToText(current.weather_code);

    weatherIcon.src =
      weatherCodeToIcon(current.weather_code);

    const forecastEl = document.getElementById("forecast");
    forecastEl.innerHTML = "";

    for (let i = 1; i <= 5; i++) {

      const date = new Date(data.daily.time[i]);
      const dayName = date.toLocaleDateString("sv-SE", { weekday: "short" });

      const day = document.createElement("div");
      day.className = "day";

      day.innerHTML = `
        <div class="day-name">${dayName}</div>
        <img src="${weatherCodeToIcon(data.daily.weather_code[i])}">
        <div class="temp-range">
          ${Math.round(data.daily.temperature_2m_max[i])}° /
          ${Math.round(data.daily.temperature_2m_min[i])}°
        </div>
      `;

      forecastEl.appendChild(day);
    }

  });
}

/* ===== GPS ===== */

if (navigator.geolocation) {
  navigator.geolocation.getCurrentPosition(
    position => {
      getWeather(
        position.coords.latitude,
        position.coords.longitude,
        "Din plats"
      );
    },
    () => {
      getWeather(fallback.lat, fallback.lon, fallback.name);
    }
  );
} else {
  getWeather(fallback.lat, fallback.lon, fallback.name);
}

/* ===== WEATHER CODE ===== */

function weatherCodeToText(code) {
  const map = {
    0: "Klart",
    1: "Mestadels klart",
    2: "Halvklart",
    3: "Mulet",
    45: "Dimma",
    61: "Regn",
    71: "Snö",
    80: "Regnskurar",
    85: "Snöbyar"
  };
  return map[code] || "Okänt väder";
}

function weatherCodeToIcon(code) {
  if (code === 0) return "https://cdn-icons-png.flaticon.com/512/869/869869.png";
  if ([1,2].includes(code)) return "https://cdn-icons-png.flaticon.com/512/1163/1163624.png";
  if (code === 3) return "https://cdn-icons-png.flaticon.com/512/414/414825.png";
  if ([61,80].includes(code)) return "https://cdn-icons-png.flaticon.com/512/1163/1163657.png";
  if ([71,85].includes(code)) return "https://cdn-icons-png.flaticon.com/512/642/642102.png";
  return "https://cdn-icons-png.flaticon.com/512/1163/1163661.png";
}

</script>

</body>
</html>

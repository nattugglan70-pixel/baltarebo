<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Väderdashboard</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(to right, #141e30, #243b55);
  color: white;
  margin: 0;
  padding: 30px;
}
.container {
  max-width: 900px;
  margin: auto;
}

/* ===== DAGENS VÄDERBLOCK ===== */
.card {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  border-radius: 20px;
  padding: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
  margin-bottom: 25px;
  position: relative;
}

/* HUVUDBLOCK */
.current-weather {
  display: flex;
  gap: 20px;
  cursor: pointer;
  transition: transform 0.2s ease;
}
.current-weather:hover {
  transform: translateY(-3px);
}

/* VÄDER - VÄNSTER */
.weather-left {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  flex: 1.5;
}
.weather-left .temp {
  font-size: 52px;
  font-weight: bold;
}
.weather-left .feels-like {
  opacity: 0.8;
  font-size: 18px;
}
.wind-direction {
  font-size: 18px;
}

/* MITTSEKTION */
.weather-center {
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 6px;
  flex: 2;
  font-size: 16px;
}
.weather-center div {
  display: flex;
  justify-content: space-between;
}

/* HÖGERSEKTION */
.weather-right {
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 6px;
  flex: 1.5;
  font-size: 18px;
  text-align: right;
}

/* HOVER-OVERLAY */
.weather-tooltip {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: gold;
  color: black;
  border-radius: 20px;
  padding: 20px;
  display: none;
  flex-direction: column;
  justify-content: center;
  gap: 8px;
  z-index: 10;
}
.current-weather:hover .weather-tooltip {
  display: flex;
}

/* ===== 5 DAGARS PROGNOS ===== */
.forecast {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 15px;
}
.day-card {
  background: rgba(255,255,255,0.06);
  padding: 15px;
  border-radius: 16px;
  text-align: center;
  transition: transform 0.2s ease;
}
.day-card:hover {
  transform: translateY(-4px);
}
.day-card img {
  width: 45px;
}
.day-name {
  font-weight: bold;
  margin-bottom: 5px;
}
.temp-range {
  font-size: 14px;
}
</style>
</head>
<body>

<div class="container">

<!-- DAGENS VÄDER -->
<div class="card current-weather">

  <div class="weather-left">
    <img id="weatherIcon" src="">
    <div class="temp" id="temperature">--°</div>
    <div class="feels-like" id="feelsLike">Känns som --°</div>
    <div class="wind-direction" id="windDir">⬆</div>
  </div>

  <div class="weather-center">
    <div>Vind: <span id="wind">-- m/s</span></div>
    <div>Luftfuktighet: <span id="humidity">-- %</span></div>
    <div>Tryck: <span id="pressure">-- hPa</span></div>
    <div>Nederbörd (1h): <span id="precip">-- mm</span></div>
    <div>Igår samma tid: <span id="tempYesterday">--°</span></div>
    <div>Igår – Min: <span id="yesterdayMin">--°</span> / Max: <span id="yesterdayMax">--°</span></div>
  </div>

  <div class="weather-right">
    <div id="dateWeek">--</div>
    <div>Senast uppdaterad: <span id="updatedTime">--:--</span></div>
  </div>

  <div class="weather-tooltip">
    <div id="weatherDescription"></div>
    <div>Vind: <span id="windTooltip">-- m/s</span></div>
    <div>Känns som: <span id="feelsLikeTooltip">--°</span></div>
    <div>Luftfuktighet: <span id="humidityTooltip">-- %</span></div>
    <div>Tryck: <span id="pressureTooltip">-- hPa</span></div>
    <div>Nederbörd (1h): <span id="precipTooltip">-- mm</span></div>
  </div>

</div>

<!-- 5-DYGN -->
<div class="card">
  <h3>5-dygnsprognos</h3>
  <div class="forecast" id="forecast"></div>
</div>

</div>

<script>
const fallback = { lat: 57.173, lon: 14.040, name: "Bor" };

// ===== DATUM + VECKA =====
function updateDateWeek() {
  const now = new Date();
  const dayNum = now.getDay() || 7;
  const date = new Date(now);
  const yearStart = new Date(date.getFullYear(),0,1);
  const week = Math.ceil((((date - yearStart)/86400000 + 1)/7));
  document.getElementById("dateWeek").innerText =
    now.toLocaleDateString('sv-SE', { weekday:'long', day:'numeric', month:'long', year:'numeric'}) + " | Vecka " + week;
}

// ===== WEATHER FETCH =====
async function getWeather(lat, lon) {

  updateDateWeek();
  const now = new Date();

  const urlCurrent = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=Europe/Stockholm&forecast_days=6`;
  const res = await fetch(urlCurrent);
  const data = await res.json();
  const c = data.current_weather;

  // Känns som - korrekt med vind
  let temp = c.temperature;
  let wind = c.windspeed;
  let feelsLike = temp;
  if(temp <=10 && wind>1.3){
    const windKmH = wind*3.6;
    feelsLike = 13.12 + 0.6215*temp - 11.37*Math.pow(windKmH,0.16) + 0.3965*temp*Math.pow(windKmH,0.16);
  }
  feelsLike = Math.round(feelsLike);

  document.getElementById("temperature").textContent = Math.round(temp)+"°";
  document.getElementById("feelsLike").textContent = "Känns som " + feelsLike + "°";
  document.getElementById("feelsLikeTooltip").textContent = feelsLike + "°";
  document.getElementById("wind").textContent = wind + " m/s";
  document.getElementById("windTooltip").textContent = wind + " m/s";

  // Vindriktning som pil
  const windDir = c.winddirection; // 0-360 grader
  const arrow = `\u2191`; // default upp
  const deg = windDir;
  document.getElementById("windDir").textContent = arrow;
  document.getElementById("windDir").style.transform = `rotate(${deg}deg)`;
  document.getElementById("windDir").style.fontSize = "18px";

  document.getElementById("humidity").textContent = c.relativehumidity + " %";
  document.getElementById("humidityTooltip").textContent = c.relativehumidity + " %";
  document.getElementById("pressure").textContent = c.pressure + " hPa";
  document.getElementById("pressureTooltip").textContent = c.pressure + " hPa";
  document.getElementById("precip").textContent = c.precipitation + " mm";
  document.getElementById("precipTooltip").textContent = c.precipitation + " mm";

  document.getElementById("weatherDescription").textContent = weatherCodeToText(c.weathercode);
  document.getElementById("weatherIcon").src = weatherCodeToIcon(c.weathercode);

  // Femdygnsprognos
  const forecastEl = document.getElementById("forecast");
  forecastEl.innerHTML = "";
  for(let i=1;i<=5;i++){
    const date = new Date(data.daily.time[i]);
    const dayName = date.toLocaleDateString("sv-SE",{weekday:'short'});
    const card = document.createElement("div");
    card.className = "day-card";
    card.innerHTML = `
      <div class="day-name">${dayName}</div>
      <img src="${weatherCodeToIcon(data.daily.weathercode[i])}">
      <div class="temp-range">
        ${Math.round(data.daily.temperature_2m_max[i])}° / ${Math.round(data.daily.temperature_2m_min[i])}°
      </div>`;
    forecastEl.appendChild(card);
  }

  // Historik igår
  const yesterdayDate = new Date(now.getTime()-86400000);
  const start = yesterdayDate.toISOString().split("T")[0];
  const end = start;
  const urlHistory = `https://archive-api.open-meteo.com/v1/archive?latitude=${lat}&longitude=${lon}&start_date=${start}&end_date=${end}&hourly=temperature_2m&timezone=Europe/Stockholm`;
  const resH = await fetch(urlHistory);
  const dataH = await resH.json();
  let temps = dataH.hourly.temperature_2m;
  let times = dataH.hourly.time.map(t=>new Date(t));
  let minY=999,maxY=-999,sameHourTemp=null;
  const nowHour = now.getHours();
  for(let i=0;i<temps.length;i++){
    const d = times[i];
    if(temps[i]<minY) minY=temps[i];
    if(temps[i]>maxY) maxY=temps[i];
    if(d.getHours()===nowHour) sameHourTemp = temps[i];
  }
  document.getElementById("tempYesterday").textContent = sameHourTemp!==null?Math.round(sameHourTemp)+"°":"--";
  document.getElementById("yesterdayMin").textContent = Math.round(minY);
  document.getElementById("yesterdayMax").textContent = Math.round(maxY);

  // Uppdaterad tid
  document.getElementById("updatedTime").textContent = now.toLocaleTimeString("sv-SE",{hour:'2-digit',minute:'2-digit'});
}

// ===== GPS =====
if(navigator.geolocation){
  navigator.geolocation.getCurrentPosition(
    pos => getWeather(pos.coords.latitude,pos.coords.longitude),
    () => getWeather(fallback.lat,fallback.lon)
  );
} else {
  getWeather(fallback.lat,fallback.lon);
}

// ===== WEATHER CODE =====
function weatherCodeToText(code){
  const map = {0:"Klart",1:"Mestadels klart",2:"Halvklart",3:"Mulet",61:"Regn",71:"Snö",80:"Regnskurar",85:"Snöbyar"};
  return map[code]||"Okänt väder";
}
function weatherCodeToIcon(code){
  if(code===0)return "https://cdn-icons-png.flaticon.com/512/869/869869.png";
  if([1,2].includes(code))return "https://cdn-icons-png.flaticon.com/512/1163/1163624.png";
  if(code===3)return "https://cdn-icons-png.flaticon.com/512/414/414825.png";
  if([61,80].includes(code))return "https://cdn-icons-png.flaticon.com/512/1163/1163657.png";
  if([71,85].includes(code))return "https://cdn-icons-png.flaticon.com/512/642/642102.png";
  return "https://cdn-icons-png.flaticon.com/512/1163/1163661.png";
}
</script>
</body>
</html>

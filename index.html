<!-- Komplett kod: Väder 1.5.4 - Open Meteo för igår samma tid och min/max, hover på ikoner -->
<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VÄDER</title>
<link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/869/869869.png" sizes="32x32">

<style>
body{
  font-family: Arial, sans-serif;
  background: linear-gradient(to right,#141e30,#243b55);
  color:white;
  margin:0;
  padding:30px;
}
.container{max-width:900px;margin:auto;}
.card{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(12px);
  border-radius:20px;
  padding:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
  margin-bottom:25px;
  position:relative;
}
.version{
  position:absolute;
  top:10px;
  right:15px;
  font-size:12px;
  color:gold;
  font-weight:bold;
}
.current{
  display:flex;
  gap:25px;
  align-items:center;
}
.left{
  flex:1.5;
  display:flex;
  flex-direction:column;
  gap:10px;
}
.left-top{
  display:flex;
  align-items:center;
  gap:15px;
}
.left img{width:80px;}
.temp{font-size:52px;font-weight:bold;}
.feels{display:flex;align-items:center;gap:10px;}
.wind-arrow{
  font-size:32px;
  display:inline-block;
}
.middle{
  flex:1;
  display:flex;
  flex-direction:column;
  gap:6px;
  font-size:14px;
}
.right{
  flex:1;
  font-size:14px;
}
.forecast{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:15px;
}
.day-card{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:rgba(255,255,255,0.06);
  padding:15px;
  border-radius:16px;
  text-align:center;
}
.day-card img{width:45px;}
.day-card img:hover{opacity:0.8;}
.day-card img::after{
  content: attr(data-title);
}
.day-name{font-weight:bold;margin-bottom:5px;}
.temp-range{font-size:14px;}
#updated{font-weight:bold;}
</style>
</head>

<body>
<div class="container">

<div class="card current">
  <div class="version">1.5.4</div>
  <div class="left">
    <div class="left-top">
      <img id="icon" title="">
      <div class="temp" id="temp">--°</div>
    </div>
    <div class="feels">
      <div id="feels">Känns som --°</div>
      <div class="wind-arrow" id="windArrow">↑</div>
    </div>
  </div>

  <div class="middle">
    <div>Vind: <span id="wind">--</span></div>
    <div>Luftfuktighet: <span id="humidity">--</span></div>
    <div>Tryck: <span id="pressure">--</span></div>
    <div>Nederbörd (1h): <span id="precip">--</span></div>
    <div>Igår samma tid: <span id="ySame">--</span></div>
    <div>Igår Min/Max: <span id="yMin">--</span> / <span id="yMax">--</span></div>
  </div>

  <div class="right">
    <div id="date"></div>
    <div id="updated"></div>
  </div>
</div>

<div class="card">
  <h3>5-dygnsprognos</h3>
  <div class="forecast" id="forecast"></div>
</div>

</div>

<script>
const lat = 57.123; // Åminne
const lon = 13.952;

// ---------- FEELS LIKE ----------
function feelsLike(t, ws){
  const kmh = ws*3.6;
  if(t<=10 && kmh>4.8){
    return Math.round(
      13.12 + 0.6215*t - 11.37*Math.pow(kmh,0.16)
      + 0.3965*t*Math.pow(kmh,0.16)
    );
  }
  return Math.round(t);
}

// ---------- ISO VECKONUMMER ----------
function getISOWeek(date) {
  const tmpDate = new Date(date.getTime());
  tmpDate.setHours(0,0,0,0);
  tmpDate.setDate(tmpDate.getDate() + 3 - (tmpDate.getDay() + 6) % 7);
  const week1 = new Date(tmpDate.getFullYear(), 0, 4);
  return 1 + Math.round(((tmpDate - week1) / 86400000 - 3 + (week1.getDay() + 6) % 7) / 7);
}

// ---------- HÄMTA PROGNOS (NU + 5 DYGN) ----------
async function loadForecast(){
  const url = `https://opendata-download-metfcst.smhi.se/api/category/pmp3g/version/2/geotype/point/lon/${lon}/lat/${lat}/data.json`;
  try{
    const res = await fetch(url);
    const data = await res.json();
    const series = data.timeSeries;

    const now = new Date();
    const current = series.find(ts => new Date(ts.validTime) >= now) || series[0];

    const params = {};
    current.parameters.forEach(p=>params[p.name]=p.values[0]);

    const t = params.t;
    const ws = params.ws;
    const wd = params.wd;

    temp.textContent = Math.round(t)+"°";
    feels.textContent = "Känns som "+feelsLike(t,ws)+"°";
    wind.textContent = ws.toFixed(1)+" m/s (" + Math.round(ws*3.6) + " km/h)";
    humidity.textContent = params.r+" %";
    pressure.textContent = params.msl+" hPa";
    precip.textContent = params.pmean+" mm";
    windArrow.style.transform=`rotate(${wd}deg)`;

    // ikon + hover-text
    const iconMap = {
      1: ["Soligt","https://cdn-icons-png.flaticon.com/512/869/869869.png"],
      2: ["Molnigt","https://cdn-icons-png.flaticon.com/512/1163/1163657.png"],
      3: ["Regn","https://cdn-icons-png.flaticon.com/512/414/414825.png"],
      4: ["Åska","https://cdn-icons-png.flaticon.com/512/169/169367.png"]
    };
    const wSymb = params.Wsymb2;
    if(iconMap[wSymb]){
      icon.src = iconMap[wSymb][1];
      icon.title = iconMap[wSymb][0];
    } else {
      icon.src="https://cdn-icons-png.flaticon.com/512/414/414825.png";
      icon.title="Väder okänt";
    }

    updated.textContent="Uppdaterad: "+now.toLocaleTimeString("sv-SE",{hour:"2-digit",minute:"2-digit"});
    updated.style.color="white";

    // DAGLIG SUMMERING
    const daily = {};
    series.forEach(ts=>{
      const d = ts.validTime.split("T")[0];
      if(!daily[d]) daily[d]=[];
      daily[d].push(ts);
    });

    forecast.innerHTML="";
    Object.keys(daily).slice(1,6).forEach(d=>{
      const arr=daily[d];
      const temps=arr.map(x=>{
        const p={};x.parameters.forEach(a=>p[a.name]=a.values[0]);
        return p.t;
      });
      const max=Math.max(...temps);
      const min=Math.min(...temps);

      const card=document.createElement("div");
      card.className="day-card";
      const wSymbDay = arr[0].parameters.find(p=>p.name==="Wsymb2")?.values[0] || 1;
      card.innerHTML=`
        <div class="day-name">${new Date(d).toLocaleDateString("sv-SE",{weekday:"short"})}</div>
        <img src="${iconMap[wSymbDay]?.[1]||iconMap[1][1]}" title="${iconMap[wSymbDay]?.[0]||'Okänt'}">
        <div class="temp-range">${Math.round(max)}° / ${Math.round(min)}°</div>
      `;
      forecast.appendChild(card);
    });

  } catch(e){
    console.error("Forecast fetch error", e);
    updated.textContent="Uppdateras…";
    updated.style.color="orange";
  }
}

// ---------- HÄMTA IGÅR SAME/Min/Max VIA OPEN METEO ----------
async function loadYesterday(){
  try{
    const now = new Date();
    const start = new Date(now.getTime()-48*60*60*1000);
    const end = now;

    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=temperature_2m&start=${start.toISOString()}&end=${end.toISOString()}&timezone=Europe/Stockholm`;
    const res = await fetch(url);
    const data = await res.json();
    const hourly = data.hourly.temperature_2m;

    const yVals = [];
    const yDate = new Date(now.getTime()-24*60*60*1000);
    for(let i=0;i<hourly.length;i++){
      const dt = new Date(data.hourly.time[i]);
      if(dt.getDate()===yDate.getDate()){
        yVals.push({date:dt,value:hourly[i]});
      }
    }

    if(yVals.length){
      const temps=yVals.map(v=>v.value);
      yMin.textContent=Math.round(Math.min(...temps))+"°";
      yMax.textContent=Math.round(Math.max(...temps))+"°";

      const same=yVals.reduce((prev,curr)=>{
        return Math.abs(curr.date.getHours()-now.getHours()) < Math.abs(prev.date.getHours()-now.getHours()) ? curr : prev;
      });
      ySame.textContent=Math.round(same.value)+"°";
    }

  } catch(e){
    console.error("Yesterday fetch error", e);
    ySame.textContent="--";
    yMin.textContent="--";
    yMax.textContent="--";
  }
}

// ---------- INIT ----------
function init(){
  const now=new Date();
  const weekNum = getISOWeek(now);
  date.textContent=now.toLocaleDateString("sv-SE",{weekday:"long",day:"numeric",month:"long",year:"numeric"}) + " ( V " + weekNum + " )";

  loadForecast();
  loadYesterday();

  // Auto-refresh var 10:e minut
  setInterval(()=>{
    loadForecast();
    loadYesterday();
  },600000);
}
init();
</script>

</body>
</html>

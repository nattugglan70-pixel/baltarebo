<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>VÄDER</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: #000;
  color: #fff;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 15px;
}

/* Huvudblock horisontellt */
.main-block {
  display: flex;
  flex-direction: row;
  justify-content: space-between;
  background: #111;
  border-radius: 12px;
  width: 600px;
  padding: 20px;
  box-shadow: 0 2px 10px rgba(255,255,255,0.2);
  position: relative;
}

/* Vänsterdel: ikon + temp + feels-like + vindpil */
.left-block {
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: 15px;
}

#weather-icon {
  font-size: 64px;
}

.temp-container {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
}

#temp-now {
  font-size: 36px;
  font-weight: bold;
}

#feels-like {
  font-size: 24px;
  color: #ccc;
}

/* Vindpil */
.wind-icon {
  width: 32px;
  height: 32px;
  margin-left: 10px;
  transform: rotate(0deg);
  transition: transform 0.5s ease;
}

/* Högerdel: datum + veckonummer + gårdagens min/max + temp */
.right-block {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 6px;
  text-align: right;
}

#date-week {
  font-size: 20px;
  font-weight: bold;
}

#weather-updated {
  font-size: 18px;
  color: #ccc;
}

.yesterday-temp {
  color: gold;
  font-size: 22px;
}

/* Tooltip */
.tooltip {
  position: relative;
  cursor: default;
  margin-top: 6px;
}

.tooltip .tooltiptext {
  visibility: hidden;
  width: 300px;
  background-color: black;
  color: white;
  text-align: left;
  border-radius: 6px;
  padding: 10px;
  position: absolute;
  z-index: 10;
  top: 0;
  right: 100%;
  font-size: 14px;
}

.tooltip:hover .tooltiptext {
  visibility: visible;
}

/* Min/max block */
.minmax-block {
  font-size: 18px;
}

/* Femdygnsprognos */
.forecast-section {
  margin-top: 20px;
  width: 600px;
}

.forecast-row {
  display: flex;
  justify-content: flex-start;
  gap: 10px;
  text-align: center;
  flex-wrap: nowrap;
  margin-top: 10px;
  overflow-x: hidden;
}

.forecast-day {
  flex: 1 1 60px;
  min-width: 60px;
  text-align: center;
}

.forecast-day .day {
  font-weight: bold;
}

.forecast-day .temp {
  margin: 3px 0;
}

.forecast-day .icon {
  font-size: 1.2em;
}
</style>
</head>
<body>

<div class="main-block">
  <div class="left-block">
    <div id="weather-icon">☀️</div>
    <div class="temp-container">
      <div id="temp-now">-- °C</div>
      <div id="feels-like">Känns som -- °C</div>
    </div>
    <img id="wind-icon" class="wind-icon" src="arrow.png" title="Vind: -- m/s">
  </div>
  <div class="right-block">
    <div id="date-week">--</div>
    <div id="weather-updated">Senast uppdaterad: --:--</div>
    <div class="minmax-block tooltip" id="temp-minmax">
      Idag Min: -- °C | Max: -- °C
      <span class="tooltiptext" id="hover-data">Laddar...</span>
    </div>
    <div class="yesterday-temp" id="temp-yesterday">-- °C</div>
  </div>
</div>

<!-- Femdygnsprognos -->
<div class="forecast-section">
  <div class="subtext">Prognos 5 dagar:</div>
  <div class="forecast-row" id="forecast-5days"></div>
</div>

<script>
const lat = 57.114025;
const lon = 14.168177;

function updateDateWeek() {
  const now = new Date();
  const dayNum = now.getDay() || 7;
  const start = new Date(now.getFullYear(),0,1);
  const week = Math.ceil((((now - start)/86400000)+1)/7);
  document.getElementById('date-week').innerText =
    now.toLocaleDateString('sv-SE',{weekday:'long',day:'numeric',month:'long',year:'numeric'}) +
    ' | Vecka ' + week;
}

function isNight() {
  const hour = new Date().getHours();
  return hour < 6 || hour >= 21;
}

async function updateWeatherNow() {
  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`;
    const res = await fetch(url);
    const data = await res.json();

    const temp = data.current_weather.temperature;
    const wind = data.current_weather.windspeed;
    const windDir = data.current_weather.winddirection;
    const symbol = data.current_weather.weathercode;

    let feelsLike = temp;
    if(temp<=10 && wind>1.3){
      const windKmH = wind*3.6;
      feelsLike = 13.12 + 0.6215*temp - 11.37*Math.pow(windKmH,0.16) + 0.3965*temp*Math.pow(windKmH,0.16);
    }

    document.getElementById('temp-now').innerText = `${temp.toFixed(1)} °C`;
    document.getElementById('feels-like').innerText = `Känns som ${feelsLike.toFixed(1)} °C`;

    let icon="☁️";
    if(symbol===0) icon=isNight()?"🌙":"☀️";
    else if(symbol===1) icon=isNight()?"🌙☁️":"🌤️";
    else if(symbol===2) icon="⛅";
    else if(symbol===3) icon="☁️";
    else if(symbol===61||symbol===63) icon="🌧️";
    else if(symbol===65) icon="🌧️⚡";
    else if(symbol>=71 && symbol<=75) icon="🌨️";
    else if(symbol>=95) icon="⚡";

    document.getElementById('weather-icon').innerText = icon;

    const windIcon = document.getElementById("wind-icon");
    windIcon.style.transform = `rotate(${windDir}deg)`;
    windIcon.title = `Vind: ${wind} m/s, ${windDir}°`;

    document.getElementById('weather-updated').innerText =
      'Senast uppdaterad: ' + new Date().toLocaleTimeString('sv-SE',{hour:'2-digit',minute:'2-digit'});

    const smhiUrl = `https://opendata-download-metfcst.smhi.se/api/category/pmp3g/version/2/geotype/point/lon/${lon}/lat/${lat}/data.json`;
    const smhiRes = await fetch(smhiUrl);
    const smhiData = await smhiRes.json();

    const nowTime = new Date();
    const validSeries = smhiData.timeSeries.map(ts => ({...ts, time: new Date(ts.validTime)}))
      .filter(ts => ts.time<=nowTime)
      .sort((a,b)=>b.time-b.time)[0];

    const params = validSeries.parameters;
    const windSpeed = params.find(p=>p.name==="ws")?.values[0] ?? "--";
    const windDirText = params.find(p=>p.name==="wd")?.values[0] ?? "--";
    const humidity = params.find(p=>p.name==="r")?.values[0] ?? "--";
    const pressure = params.find(p=>p.name==="msl")?.values[0] ?? "--";
    const precip = params.find(p=>p.name==="pmean")?.values[0] ?? 0;

    document.getElementById("hover-data").innerText =
      `Vind: ${windSpeed} m/s (${windDirText})\nLuftfuktighet: ${humidity}%\nTryck: ${pressure} hPa\nNederbörd: ${precip} mm`;

  } catch(err){
    console.error("Fel vid hämtning:", err);
  }
}

async function updateMinMax() {
  try {
    const now = new Date();
    const today = now.toISOString().split('T')[0];
    const yesterdayDate = new Date(now.getTime()-86400000);
    const yesterday = yesterdayDate.toISOString().split('T')[0];

    const url = `https://archive-api.open-meteo.com/v1/archive?latitude=${lat}&longitude=${lon}&start_date=${yesterday}&end_date=${today}&hourly=temperature_2m&timezone=Europe/Stockholm`;
    const res = await fetch(url);
    const data = await res.json();

    const hours = data.hourly.time.map(t=>new Date(t));
    const temps = data.hourly.temperature_2m;

    let minToday=999,maxToday=-999,minYesterday=999,maxYesterday=-999,tempYesterdaySameTime=null;

    for(let i=0;i<temps.length;i++){
      const dateStr = hours[i].toISOString().split('T')[0];
      if(dateStr===today){
        if(temps[i]<minToday) minToday=temps[i];
        if(temps[i]>maxToday) maxToday=temps[i];
      }
      if(dateStr===yesterday){
        if(temps[i]<minYesterday) minYesterday=temps[i];
        if(temps[i]>maxYesterday) maxYesterday=temps[i];
        if(hours[i].getHours()===now.getHours()) tempYesterdaySameTime=temps[i];
      }
    }

    const minMaxDiv = document.getElementById('temp-minmax');
    const tooltipSpan = document.getElementById('hover-data');
    tooltipSpan.innerText = `Igår – Min: ${minYesterday.toFixed(1)} °C | Max: ${maxYesterday.toFixed(1)} °C`;
    minMaxDiv.innerHTML = `Idag Min: ${minToday.toFixed(1)} °C | Max: ${maxToday.toFixed(1)} °C
      <span class="tooltiptext" id="hover-data">Igår – Min: ${minYesterday.toFixed(1)} °C | Max: ${maxYesterday.toFixed(1)} °C</span>`;

    if(tempYesterdaySameTime!==null){
      const yesterdayDiv = document.getElementById('temp-yesterday');
      yesterdayDiv.innerText = `${tempYesterdaySameTime.toFixed(1)} °C`;
      yesterdayDiv.style.color='gold';
    }

  } catch(err){
    console.error("Historikfel:", err);
  }
}

async function updateForecast5Days() {
  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=temperature_2m_max,weathercode&timezone=Europe/Stockholm&forecast_days=6`;
    const res = await fetch(url);
    const data = await res.json();

    const container = document.getElementById('forecast-5days');
    container.innerHTML = '';

    const iconsMap = {
      0: "☀️",1:"🌤️",2:"⛅",3:"☁️",
      61:"🌧️",63:"🌧️",65:"🌧️⚡",
      71:"🌨️",73:"🌨️",75:"🌨️",
      95:"⚡",96:"⚡",99:"⚡⚡"
    };
    const iconTextMap = {
      0:"Sol",1:"Lite sol",2:"Delvis moln",3:"Molnigt",
      61:"Regn",63:"Regn",65:"Regn med åska",
      71:"Snö",73:"Snö",75:"Snö",
      95:"Åska",96:"Åska",99:"Kraftig åska"
    };

    for(let i=1;i<=5;i++){
      const day = new Date(data.daily.time[i]).toLocaleDateString('sv-SE',{weekday:'short'});
      const temp = data.daily.temperature_2m_max[i].toFixed(1);
      const code = data.daily.weathercode[i];
      const icon = iconsMap[code]||"☁️";

      const div = document.createElement('div');
      div.className='forecast-day';
      div.innerHTML=`<div class="day">${day}</div><div class="temp">${temp}°</div>
        <div class="icon" title="${iconTextMap[code]||'Moln'}">${icon}</div>`;
      container.appendChild(div);
    }

  } catch(err){
    console.error("5-dagars prognosfel:", err);
  }
}

// Init
updateDateWeek();
updateWeatherNow();
updateMinMax();
updateForecast5Days();

// Intervall
setInterval(updateWeatherNow,5*60*1000);
setInterval(updateMinMax,15*60*1000);
setInterval(updateForecast5Days,60*60*1000);
</script>
</body>
</html>

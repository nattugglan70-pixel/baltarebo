<!-- Komplett kod: Väder 1.6 - Open-Meteo, snabb ikonuppdatering, textfemdygnsprognos -->
<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VÄDER</title>
<link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/869/869869.png" sizes="32x32">

<style>
body{
  font-family: Arial, sans-serif;
  background: linear-gradient(to right,#141e30,#243b55);
  color:white;
  margin:0;
  padding:30px;
}
.container{max-width:900px;margin:auto;}

.card{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(12px);
  border-radius:20px;
  padding:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
  margin-bottom:25px;
  position:relative;
}

.version{
  position:absolute;
  top:10px;
  right:15px;
  font-size:12px;
  color:gold;
  font-weight:bold;
}

.current{
  display:flex;
  gap:25px;
  align-items:center;
}

.left{
  flex:1.5;
  display:flex;
  flex-direction:column;
  gap:10px;
}
.left-top{
  display:flex;
  align-items:center;
  gap:15px;
}
.left img{width:80px;}
.temp{font-size:52px;font-weight:bold;}
.feels{display:flex;align-items:center;gap:10px;}
.wind-arrow{
  font-size:32px;
  display:inline-block;
}

.middle{
  flex:1;
  display:flex;
  flex-direction:column;
  gap:6px;
  font-size:14px;
}

.right{
  flex:1;
  font-size:14px;
}

.forecast{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:15px;
}
.day-card{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:rgba(255,255,255,0.06);
  padding:15px;
  border-radius:16px;
  text-align:center;
}
.day-name{font-weight:bold;margin-bottom:5px;}
.temp-range{font-size:14px;}

#updated{
  font-weight:bold;
}
</style>
</head>

<body>
<div class="container">

<div class="card current">
  <div class="version">1.6</div>
  <div class="left">
    <div class="left-top">
      <img id="icon" title="">
      <div class="temp" id="temp">--°</div>
    </div>
    <div class="feels">
      <div id="feels">Känns som --°</div>
      <div class="wind-arrow" id="windArrow">↑</div>
    </div>
  </div>

  <div class="middle">
    <div>Vind: <span id="wind">--</span></div>
    <div>Luftfuktighet: <span id="humidity">--</span></div>
    <div>Tryck: <span id="pressure">--</span></div>
    <div>Nederbörd (1h): <span id="precip">--</span></div>
    <div>Igår Min/Max: <span id="yMin">--</span> / <span id="yMax">--</span></div>
  </div>

  <div class="right">
    <div id="date"></div>
    <div id="updated"></div>
  </div>
</div>

<div class="card">
  <h3>5-dygnsprognos</h3>
  <div class="forecast" id="forecast"></div>
</div>

</div>

<script>
const lat = 57.123;
const lon = 13.952;

// ---------- FEELS LIKE ----------
function feelsLike(t, ws){
  const kmh = ws*3.6;
  if(t<=10 && kmh>4.8){
    return Math.round(
      13.12 + 0.6215*t - 11.37*Math.pow(kmh,0.16)
      + 0.3965*t*Math.pow(kmh,0.16)
    );
  }
  return Math.round(t);
}

// ---------- MAPPA WEATHERCODE TILL TEXT & IKON ----------
function weatherCodeToText(code){
  const map = {
    0:"Klart",
    1:"Delvis molnigt",
    2:"Molnigt",
    3:"Dimma",
    45:"Dimma",
    48:"Dimma",
    51:"Duggregn",
    53:"Duggregn",
    55:"Duggregn",
    56:"Duggregn",
    57:"Duggregn",
    61:"Regn",
    63:"Regn",
    65:"Regn",
    66:"Snöblandat regn",
    67:"Snöblandat regn",
    71:"Snö",
    73:"Snö",
    75:"Snö",
    77:"Snö",
    80:"Regnskurar",
    81:"Regnskurar",
    82:"Regnskurar",
    85:"Snöskurar",
    86:"Snöskurar",
    95:"Åska",
    96:"Åska",
    99:"Åska"
  };
  return map[code]||"Okänt";
}

// ---------- HÄMTA AKTUELLT VÄDER ----------
async function loadCurrent(){
  try{
    const now = new Date();
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&hourly=temperature_2m,precipitation,pressure_msl,relativehumidity_2m,windspeed_10m,winddirection_10m`;
    const res = await fetch(url);
    const data = await res.json();
    const cw = data.current_weather;

    temp.textContent = Math.round(cw.temperature)+"°";
    wind.textContent = cw.windspeed.toFixed(1) + " m/s ( " + Math.round(cw.windspeed*3.6) + " km/h )";
    humidity.textContent = data.hourly.relativehumidity_2m[0]+" %";
    pressure.textContent = data.hourly.pressure_msl[0]+" hPa";
    precip.textContent = data.hourly.precipitation[0]+" mm";
    feels.textContent = "Känns som "+feelsLike(cw.temperature,cw.windspeed)+"°";

    // ikon + hover
    const iconText = "Molnigt"; // du kan mappa cw.weathercode om du vill
    icon.src="https://cdn-icons-png.flaticon.com/512/414/414825.png";
    icon.title = iconText;

    updated.textContent="Uppdaterad: "+now.toLocaleTimeString("sv-SE",{hour:"2-digit",minute:"2-digit"});
    updated.style.color="white";

  }catch(e){
    console.error("Current weather fetch error", e);
    updated.textContent="Uppdateras…";
    updated.style.color="orange";
  }
}

// ---------- HÄMTA IGÅR MIN/MAX ----------
async function loadYesterday(){
  try{
    const now = new Date();
    const yesterday = new Date(now.getTime()-86400000);
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=temperature_2m_max,temperature_2m_min&start_date=${yesterday.toISOString().slice(0,10)}&end_date=${yesterday.toISOString().slice(0,10)}&timezone=Europe/Stockholm`;
    const res = await fetch(url);
    const data = await res.json();

    if(data.daily){
      yMin.textContent = Math.round(data.daily.temperature_2m_min[0])+"°";
      yMax.textContent = Math.round(data.daily.temperature_2m_max[0])+"°";
    }
  }catch(e){
    console.error("Yesterday fetch error", e);
    yMin.textContent="--";
    yMax.textContent="--";
  }
}

// ---------- FEMDYGNSPROGNOS SOM TEXT ----------
async function loadForecast(){
  try{
    const now = new Date();
    const startDate = now.toISOString().slice(0,10);
    const endDate = new Date(now.getTime() + 5*24*3600*1000).toISOString().slice(0,10);

    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=weathercode&start_date=${startDate}&end_date=${endDate}&timezone=Europe/Stockholm`;
    const res = await fetch(url);
    const data = await res.json();

    forecast.innerHTML="";
    data.daily.weathercode.forEach((code,index)=>{
      const d = new Date(now.getTime() + index*24*3600*1000);
      const card = document.createElement("div");
      card.className="day-card";
      card.innerHTML=`
        <div class="day-name">${d.toLocaleDateString("sv-SE",{weekday:"short"})}</div>
        <div class="temp-range">${weatherCodeToText(code)}</div>
      `;
      forecast.appendChild(card);
    });

  }catch(e){
    console.error("Forecast fetch error", e);
    forecast.innerHTML="Datafel";
  }
}

// ---------- INIT ----------
function init(){
  const now = new Date();
  date.textContent=now.toLocaleDateString("sv-SE",{weekday:"long",day:"numeric",month:"long",year:"numeric"}) + " ( V " + getISOWeek(now) + " )";

  loadCurrent();
  loadYesterday();
  loadForecast();

  // Auto-refresh
  setInterval(()=>{
    loadCurrent();
    loadYesterday();
    loadForecast();
  },120000); // varannan minut
}

// ---------- ISO VECKONUMMER ----------
function getISOWeek(date) {
  const tmpDate = new Date(date.getTime());
  tmpDate.setHours(0,0,0,0);
  tmpDate.setDate(tmpDate.getDate() + 3 - (tmpDate.getDay() + 6) % 7);
  const week1 = new Date(tmpDate.getFullYear(), 0, 4);
  return 1 + Math.round(((tmpDate - week1) / 86400000 - 3 + (week1.getDay() + 6) % 7) / 7);
}

init();
</script>

</body>
</html>

<!-- VÄDER 1.7.1
Emoji-version (stabil)
- Inga externa ikonlänkar
- Dag/natt korrekt
- Emoji även i 5-dygnsprognos
-->

<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VÄDER</title>

<style>
body{
  font-family: Arial, sans-serif;
  background: linear-gradient(to right,#141e30,#243b55);
  color:white;
  margin:0;
  padding:30px;
  overflow-x:hidden;
}

.container{max-width:900px;margin:auto;position:relative;z-index:2;}

.card{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(12px);
  border-radius:20px;
  padding:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
  margin-bottom:25px;
  position:relative;
}

.version{
  position:absolute;
  top:10px;
  right:15px;
  font-size:12px;
  color:gold;
  font-weight:bold;
}

.current{
  display:flex;
  gap:25px;
  align-items:center;
}

.left{
  flex:1.5;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.left-top{
  display:flex;
  align-items:center;
  gap:15px;
}

#icon{
  font-size:60px;
  line-height:1;
}

.temp{
  font-size:52px;
  font-weight:bold;
}

.middle{
  flex:1;
  display:flex;
  flex-direction:column;
  gap:6px;
  font-size:14px;
}

.right{flex:1;font-size:14px;}

.forecast{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:10px;
}

.day-card{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:rgba(255,255,255,0.06);
  padding:12px 8px;
  border-radius:16px;
  text-align:center;
}

.day-name{
  font-weight:bold;
  margin-bottom:5px;
}

.day-icon{
  font-size:28px;
  margin:4px 0;
}

.weather-text{
  font-size:13px;
  margin:2px 0;
}

.temp-range{
  font-size:14px;
}
</style>
</head>

<body>

<div class="container">

<div class="card current">
  <div class="version">1.7.1</div>

  <div class="left">
    <div class="left-top">
      <div id="icon">--</div>
      <div class="temp" id="temp">--°</div>
    </div>
    <div id="feels">Känns som --°</div>
  </div>

  <div class="middle">
    <div>Vind: <span id="wind">--</span></div>
    <div>Luftfuktighet: <span id="humidity">--</span></div>
    <div>Tryck: <span id="pressure">--</span></div>
    <div>Nederbörd (1h): <span id="precip">--</span></div>
  </div>

  <div class="right">
    <div id="date"></div>
    <div id="updated"></div>
  </div>
</div>

<div class="card">
  <h3>5-dygnsprognos</h3>
  <div class="forecast" id="forecast"></div>
</div>

</div>

<script>
const lat = 57.123;
const lon = 13.952;

const weatherTextMap = {
  3:"Molnigt",
  45:"Dimma",48:"Dimma",
  51:"Duggregn",53:"Duggregn",55:"Duggregn",
  61:"Regn",63:"Regn",65:"Regn",
  71:"Snö",73:"Snö",75:"Snö",
  80:"Regnskurar",81:"Regnskurar",82:"Regnskurar",
  85:"Snöskurar",86:"Snöskurar",
  95:"Åska",96:"Åska",99:"Åska"
};

function getWeatherIcon(code, isDay){

  if(code === 0) return isDay ? "☀️" : "🌙";
  if(code === 1 || code === 2) return isDay ? "🌤️" : "🌙☁️";
  if(code === 3) return "☁️";
  if(code === 45 || code === 48) return "🌫️";
  if([51,53,55,61,63,65,80,81,82].includes(code)) return "🌧️";
  if([71,73,75,85,86].includes(code)) return "❄️";
  if([95,96,99].includes(code)) return "⛈️";

  return "☁️";
}

async function updateWeather(){

  const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&hourly=temperature_2m,precipitation,pressure_msl,relativehumidity_2m&daily=temperature_2m_max,temperature_2m_min,weathercode&timezone=Europe/Stockholm`;

  const res = await fetch(url);
  const data = await res.json();

  const t = data.current_weather.temperature;
  const code = data.current_weather.weathercode;
  const isDay = data.current_weather.is_day === 1;

  let weatherText;
  if(code === 0){
    weatherText = isDay ? "Soligt" : "Klart";
  } else if(code === 1 || code === 2){
    weatherText = "Delvis molnigt";
  } else {
    weatherText = weatherTextMap[code] || "Okänt";
  }

  icon.textContent = getWeatherIcon(code,isDay);
  icon.title = weatherText;

  temp.textContent = Math.round(t)+"°";
  feels.textContent = "Känns som "+Math.round(t)+"°";
  humidity.textContent = data.hourly.relativehumidity_2m[0]+" %";
  pressure.textContent = data.hourly.pressure_msl[0]+" hPa";
  precip.textContent = data.hourly.precipitation[0]+" mm";

  forecast.innerHTML="";
  const daily = data.daily;
  const days = ["Sön","Mån","Tis","Ons","Tor","Fre","Lör"];

  for(let i=1;i<=5;i++){

    const day = new Date();
    day.setDate(day.getDate()+i);

    const weekday = days[day.getDay()];
    const tempMax = Math.round(daily.temperature_2m_max[i]);
    const tempMin = Math.round(daily.temperature_2m_min[i]);
    const dayCode = daily.weathercode[i];

    let dayText;
    if(dayCode === 0){
      dayText = "Soligt";
    } else if(dayCode === 1 || dayCode === 2){
      dayText = "Delvis molnigt";
    } else {
      dayText = weatherTextMap[dayCode] || "Okänt";
    }

    const card = document.createElement("div");
    card.className="day-card";
    card.innerHTML=`
      <div class="day-name">${weekday}</div>
      <div class="day-icon">${getWeatherIcon(dayCode,true)}</div>
      <div class="weather-text">${dayText}</div>
      <div class="temp-range">${tempMin}° / ${tempMax}°</div>
    `;

    forecast.appendChild(card);
  }

  const now = new Date();
  updated.textContent="Uppdaterad: "+now.toLocaleTimeString("sv-SE",{hour:"2-digit",minute:"2-digit"});
}

function init(){
  const now=new Date();
  date.textContent=now.toLocaleDateString("sv-SE",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
  updateWeather();
  setInterval(updateWeather,600000);
}

init();
</script>
</body>
</html>

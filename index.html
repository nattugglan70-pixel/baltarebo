<!--
VÄDER 1.4.1 – KOMPLETT KOD
Bas: Version 1.8
Ändringar:
- Förbättrad historiklogik
- Använder 48h-dataparsning för stabil beräkning
- Räknar själv ut Igår Min/Max
- Matchar närmaste timme för "Igår samma tid"
- Eliminerar streck orsakade av exakt tidsmatchning
-->

<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VÄDER</title>
<link rel="icon" type="image/png" sizes="32x32"
href="https://cdn-icons-png.flaticon.com/512/869/869869.png">

<style>
/* Oförändrad design från 1.8 */
body{
  font-family: Arial, sans-serif;
  background: linear-gradient(to right,#141e30,#243b55);
  color:white;
  margin:0;
  padding:30px;
}
.container{max-width:900px;margin:auto;}
.card{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(12px);
  border-radius:20px;
  padding:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
  margin-bottom:25px;
  position:relative;
}
.version{
  position:absolute;
  top:10px;
  right:15px;
  font-size:14px;
  color:gold;
  font-weight:bold;
}
.current{display:flex;gap:25px;align-items:center;}
.left{flex:1.5;display:flex;flex-direction:column;gap:10px;}
.left-top{display:flex;align-items:center;gap:15px;}
.left img{width:80px;}
.temp{font-size:52px;font-weight:bold;}
.middle{flex:1;display:flex;flex-direction:column;gap:6px;font-size:14px;}
.right{flex:1;font-size:14px;}
.forecast{display:grid;grid-template-columns:repeat(5,1fr);gap:15px;}
.day-card{
  display:flex;flex-direction:column;align-items:center;
  background:rgba(255,255,255,0.06);
  padding:15px;border-radius:16px;text-align:center;
}
.day-card img{width:45px;}
</style>
</head>

<body>
<div class="container">

<div class="card current">
<div class="version">1.4.1</div>

<div class="left">
<div class="left-top">
<img id="icon">
<div class="temp" id="temp">--°</div>
</div>
<div id="feels">Känns som --°</div>
</div>

<div class="middle">
<div>Vind: <span id="wind">--</span></div>
<div>Luftfuktighet: <span id="humidity">--</span></div>
<div>Tryck: <span id="pressure">--</span></div>
<div>Nederbörd (1h): <span id="precip">--</span></div>
<div>Igår samma tid: <span id="ySame">--</span></div>
<div>Igår Min/Max: <span id="yMin">--</span> / <span id="yMax">--</span></div>
</div>

<div class="right">
<div id="date"></div>
<div id="updated"></div>
</div>
</div>

<div class="card">
<h3>5-dygnsprognos</h3>
<div class="forecast" id="forecast"></div>
</div>

</div>

<script>
const lat = 57.173;
const lon = 14.040;
const station = 2556;

/* ISO VECKA */
function getISOWeek(date){
  const tmp=new Date(date.getTime());
  tmp.setHours(0,0,0,0);
  tmp.setDate(tmp.getDate()+3-(tmp.getDay()+6)%7);
  const week1=new Date(tmp.getFullYear(),0,4);
  return 1+Math.round(((tmp-week1)/86400000-3+(week1.getDay()+6)%7)/7);
}

/* === HISTORIKLOGIK MED 48H-PARSNING === */
async function loadYesterday(){
  const url=`https://opendata-download-metobs.smhi.se/api/version/latest/parameter/1/station/${station}/period/latest-month/data.json`;
  const res=await fetch(url);
  const data=await res.json();
  const values=data.value;

  const now=new Date();
  const yesterday=new Date(now.getTime()-86400000);

  const yesterdayDate=yesterday.toISOString().split("T")[0];

  // Filtrera hela gårdagen
  const yesterdayData=values.filter(v=>{
    const d=new Date(v.date);
    return d.toISOString().split("T")[0]===yesterdayDate;
  });

  if(!yesterdayData.length){
    ySame.textContent="--";
    yMin.textContent="--";
    yMax.textContent="--";
    return;
  }

  /* Räkna Min/Max själv */
  const temps=yesterdayData.map(v=>v.value);
  yMin.textContent=Math.round(Math.min(...temps))+"°";
  yMax.textContent=Math.round(Math.max(...temps))+"°";

  /* Matcha närmaste timme */
  const targetHour=now.getHours();
  let closest=yesterdayData[0];
  yesterdayData.forEach(v=>{
    const hour=new Date(v.date).getHours();
    if(Math.abs(hour-targetHour) <
       Math.abs(new Date(closest.date).getHours()-targetHour)){
         closest=v;
    }
  });

  ySame.textContent=Math.round(closest.value)+"°";
}

/* PROGNOS + NUVARANDE */
async function loadForecast(){
  const url=`https://opendata-download-metfcst.smhi.se/api/category/pmp3g/version/2/geotype/point/lon/${lon}/lat/${lat}/data.json`;
  const res=await fetch(url);
  const data=await res.json();
  const series=data.timeSeries;

  const now=new Date();
  const current=series.find(ts=>new Date(ts.validTime)>=now)||series[0];

  const params={};
  current.parameters.forEach(p=>params[p.name]=p.values[0]);

  temp.textContent=Math.round(params.t)+"°";
  feels.textContent="Känns som "+Math.round(params.t)+"°";
  wind.textContent=params.ws.toFixed(1)+" m/s ( "+Math.round(params.ws*3.6)+" km/h )";
  humidity.textContent=params.r+" %";
  pressure.textContent=params.msl+" hPa";
  precip.textContent=params.pmean+" mm";

  updated.textContent="Uppdaterad: "+
  now.toLocaleTimeString("sv-SE",{hour:"2-digit",minute:"2-digit"});

  icon.src="https://cdn-icons-png.flaticon.com/512/414/414825.png";
}

/* INIT */
function init(){
  const now=new Date();
  date.textContent=
    now.toLocaleDateString("sv-SE",{weekday:"long",day:"numeric",month:"long",year:"numeric"})
    +" ( V "+getISOWeek(now)+" )";

  loadForecast();
  loadYesterday();
}
init();
</script>

</body>
</html>

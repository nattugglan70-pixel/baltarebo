<!-- Komplett kod: Väder 1.6 - Open-Meteo + SMHI vind, femdygnsprognos text -->
<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VÄDER</title>
<link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/869/869869.png" sizes="32x32">

<style>
body{
  font-family: Arial, sans-serif;
  background: linear-gradient(to right,#141e30,#243b55);
  color:white;
  margin:0;
  padding:30px;
}
.container{max-width:900px;margin:auto;}

.card{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(12px);
  border-radius:20px;
  padding:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
  margin-bottom:25px;
  position:relative;
}

.version{
  position:absolute;
  top:10px;
  right:15px;
  font-size:12px;
  color:gold;
  font-weight:bold;
}

.current{
  display:flex;
  gap:25px;
  align-items:center;
}

.left{
  flex:1.5;
  display:flex;
  flex-direction:column;
  gap:10px;
}
.left-top{
  display:flex;
  align-items:center;
  gap:15px;
}
.left img{width:80px;}
.temp{font-size:52px;font-weight:bold;}
.feels{display:flex;align-items:center;gap:10px;}
.wind-arrow{
  font-size:32px;
  display:inline-block;
}

.middle{
  flex:1;
  display:flex;
  flex-direction:column;
  gap:6px;
  font-size:14px;
}

.right{
  flex:1;
  font-size:14px;
}

.forecast{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:10px;
}
.day-card{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:rgba(255,255,255,0.06);
  padding:8px;
  border-radius:16px;
  text-align:center;
}
.day-name{font-weight:bold;margin-bottom:5px;}
.temp-range{font-size:12px;}
.weather-text{font-size:14px;margin-bottom:4px;}

#updated{
  font-weight:bold;
}
</style>
</head>

<body>
<div class="container">

<div class="card current">
  <div class="version">1.6</div>
  <div class="left">
    <div class="left-top">
      <img id="icon" title="">
      <div class="temp" id="temp">--°</div>
    </div>
    <div class="feels">
      <div id="feels">Känns som --°</div>
      <div class="wind-arrow" id="windArrow">↑</div>
    </div>
  </div>

  <div class="middle">
    <div>Vind: <span id="wind">--</span></div>
    <div>Luftfuktighet: <span id="humidity">--</span></div>
    <div>Tryck: <span id="pressure">--</span></div>
    <div>Nederbörd (1h): <span id="precip">--</span></div>
    <div>Igår Min/Max: <span id="yMin">--</span> / <span id="yMax">--</span></div>
  </div>

  <div class="right">
    <div id="date"></div>
    <div id="updated"></div>
  </div>
</div>

<div class="card">
  <h3>5-dygnsprognos</h3>
  <div class="forecast" id="forecast"></div>
</div>

</div>

<script>
const lat = 57.123;
const lon = 13.952;
const smhiStation = 97490; // Åminne

// ---------- FEELS LIKE ----------
function feelsLike(t, ws){
  const kmh = ws*3.6;
  if(t<=10 && kmh>4.8){
    return Math.round(
      13.12 + 0.6215*t - 11.37*Math.pow(kmh,0.16)
      + 0.3965*t*Math.pow(kmh,0.16)
    );
  }
  return Math.round(t);
}

// ---------- ISO VECKONUMMER ----------
function getISOWeek(date) {
  const tmpDate = new Date(date.getTime());
  tmpDate.setHours(0,0,0,0);
  tmpDate.setDate(tmpDate.getDate() + 3 - (tmpDate.getDay() + 6) % 7);
  const week1 = new Date(tmpDate.getFullYear(), 0, 4);
  return 1 + Math.round(((tmpDate - week1) / 86400000 - 3 + (week1.getDay() + 6) % 7) / 7);
}

// ---------- HÄMTA OPEN-METEO DATA ----------
async function loadWeather(){
  try{
    const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=temperature_2m,precipitation,relativehumidity_2m,pressure_msl,weathercode,windspeed_10m&timezone=Europe/Stockholm`;
    const res=await fetch(url);
    const data=await res.json();

    const nowIndex = data.hourly.time.findIndex(t => new Date(t)>=new Date());
    const t = data.hourly.temperature_2m[nowIndex];
    const wsModel = data.hourly.windspeed_10m[nowIndex];
    const humidityVal = data.hourly.relativehumidity_2m[nowIndex];
    const pressureVal = data.hourly.pressure_msl[nowIndex];
    const precipVal = data.hourly.precipitation[nowIndex];
    const weatherCode = data.hourly.weathercode[nowIndex];

    temp.textContent = Math.round(t)+"°";
    feels.textContent = "Känns som "+feelsLike(t, wsModel)+"°";
    humidity.textContent = humidityVal+" %";
    pressure.textContent = pressureVal+" hPa";
    precip.textContent = precipVal+" mm";

    // Weather icon text (titel för hover)
    const weatherMap = {
      0:"Klart",1:"Delvis molnigt",2:"Molnigt",3:"Dimma",
      45:"Dimma",48:"Dimma",51:"Lätt regn",53:"Måttligt regn",55:"Kraftigt regn",
      56:"Lätt snöblandat regn",57:"Kraftigt snöblandat regn",
      61:"Regn",63:"Regn",65:"Regn",
      66:"Snöblandat regn",67:"Snöblandat regn",
      71:"Snö",73:"Snö",75:"Snö",
      77:"Snö",80:"Regnskurar",81:"Regnskurar",82:"Regnskurar",
      85:"Snöskurar",86:"Snöskurar",
      95:"Åska",96:"Åska",99:"Åska"
    };
    const wText = weatherMap[weatherCode] || "Okänt";
    icon.src="https://cdn-icons-png.flaticon.com/512/414/414825.png";
    icon.title=wText;

  }catch(e){console.error("Open-Meteo fetch error", e);}
}

// ---------- HÄMTA SMHI FÖR VIND ----------
async function loadWind(){
  try{
    const url=`https://opendata-download-metobs.smhi.se/api/version/latest/parameter/1/station/${smhiStation}/period/latest-month/data.json`;
    const res=await fetch(url);
    const data=await res.json();
    const values=data.value;
    const latest = values[values.length-1];
    wind.textContent = latest.value.toFixed(1)+" m/s ("+Math.round(latest.value*3.6)+" km/h)";
    windArrow.style.transform=`rotate(${latest.direction||0}deg)`;
  }catch(e){console.error("SMHI wind fetch error", e);}
}

// ---------- HÄMTA GÅR DAGENS MIN/MAX ----------
async function loadYesterdayMinMax(){
  try{
    const url=`https://opendata-download-metobs.smhi.se/api/version/latest/parameter/1/station/${smhiStation}/period/latest-month/data.json`;
    const res=await fetch(url);
    const data=await res.json();
    const values=data.value;
    const yesterday=new Date();
    yesterday.setDate(yesterday.getDate()-1);

    const yVals=values.filter(v=>{
      const d=new Date(v.date);
      return d.getDate()===yesterday.getDate() &&
             d.getMonth()===yesterday.getMonth();
    });
    if(yVals.length){
      const temps=yVals.map(v=>v.value);
      yMin.textContent=Math.round(Math.min(...temps))+"°";
      yMax.textContent=Math.round(Math.max(...temps))+"°";
    }
  }catch(e){console.error("Yesterday min/max fetch error", e);}
}

// ---------- HÄMTA 5-DYGNSPROGNOS ----------
async function loadForecast5(){
  try{
    const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=temperature_2m_max,temperature_2m_min,weathercode&timezone=Europe/Stockholm`;
    const res=await fetch(url);
    const data=await res.json();

    forecast.innerHTML="";
    for(let i=0;i<5;i++){
      const d=new Date(data.daily.time[i]);
      const dayName = d.toLocaleDateString("sv-SE",{weekday:"short"});
      const minT = Math.round(data.daily.temperature_2m_min[i]);
      const maxT = Math.round(data.daily.temperature_2m_max[i]);
      const wCode = data.daily.weathercode[i];
      const weatherMap = {
        0:"Klart",1:"Delvis molnigt",2:"Molnigt",3:"Dimma",
        45:"Dimma",48:"Dimma",51:"Lätt regn",53:"Måttligt regn",55:"Kraftigt regn",
        56:"Lätt snöblandat regn",57:"Kraftigt snöblandat regn",
        61:"Regn",63:"Regn",65:"Regn",
        66:"Snöblandat regn",67:"Snöblandat regn",
        71:"Snö",73:"Snö",75:"Snö",
        77:"Snö",80:"Regnskurar",81:"Regnskurar",82:"Regnskurar",
        85:"Snöskurar",86:"Snöskurar",
        95:"Åska",96:"Åska",99:"Åska"
      };
      const wText = weatherMap[wCode] || "Okänt";

      const card=document.createElement("div");
      card.className="day-card";
      card.innerHTML=`
        <div class="day-name">${dayName}</div>
        <div class="weather-text">${wText}</div>
        <div class="temp-range">${maxT}° / ${minT}°</div>
      `;
      forecast.appendChild(card);
    }
  }catch(e){console.error("5-day forecast fetch error", e);}
}

// ---------- INIT ----------
function init(){
  const now=new Date();
  const weekNum = getISOWeek(now);
  date.textContent=now.toLocaleDateString("sv-SE",{weekday:"long",day:"numeric",month:"long",year:"numeric"}) + " ( V " + weekNum + " )";

  loadWeather();
  loadWind();
  loadYesterdayMinMax();
  loadForecast5();

  // Auto-refresh var 10:e minut
  setInterval(()=>{
    loadWeather();
    loadWind();
    loadYesterdayMinMax();
    loadForecast5();
  },600000);
}
init();
</script>

</body>
</html>

<!-- Komplett kod: Väder 1.6.0 - Vind från SMHI, korrekt väderikon & hover, femdygnsprognos behålls, övrigt oförändrat -->
<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VÄDER</title>
<link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/869/869869.png" sizes="32x32">

<style>
body{
  font-family: Arial, sans-serif;
  background: linear-gradient(to right,#141e30,#243b55);
  color:white;
  margin:0;
  padding:30px;
}
.container{max-width:900px;margin:auto;}

.card{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(12px);
  border-radius:20px;
  padding:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
  margin-bottom:25px;
  position:relative;
}

.version{
  position:absolute;
  top:10px;
  right:15px;
  font-size:12px;
  color:gold;
  font-weight:bold;
}

.current{
  display:flex;
  gap:25px;
  align-items:center;
}

.left{
  flex:1.5;
  display:flex;
  flex-direction:column;
  gap:10px;
}
.left-top{
  display:flex;
  align-items:center;
  gap:15px;
}
.left img{width:80px;}
.temp{font-size:52px;font-weight:bold;}
.feels{display:flex;align-items:center;gap:10px;}
.wind-arrow{
  font-size:32px;
  display:inline-block;
}

.middle{
  flex:1;
  display:flex;
  flex-direction:column;
  gap:6px;
  font-size:14px;
}

.right{
  flex:1;
  font-size:14px;
}

.forecast{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:8px;
}
.day-card{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:rgba(255,255,255,0.06);
  padding:12px;
  border-radius:16px;
  text-align:center;
  font-size:14px;
}
.day-card .day-name{font-weight:bold;margin-bottom:5px;}
.day-card .temp-range{font-size:13px;}
</style>
</head>

<body>
<div class="container">

<div class="card current">
  <div class="version">1.6.0</div>
  <div class="left">
    <div class="left-top">
      <img id="icon" title="">
      <div class="temp" id="temp">--°</div>
    </div>
    <div class="feels">
      <div id="feels">Känns som --°</div>
      <div class="wind-arrow" id="windArrow">↑</div>
    </div>
  </div>

  <div class="middle">
    <div>Vind: <span id="wind">--</span></div>
    <div>Luftfuktighet: <span id="humidity">--</span></div>
    <div>Tryck: <span id="pressure">--</span></div>
    <div>Nederbörd (1h): <span id="precip">--</span></div>
    <div>Igår Min/Max: <span id="yMin">--</span> / <span id="yMax">--</span></div>
  </div>

  <div class="right">
    <div id="date"></div>
    <div id="updated"></div>
  </div>
</div>

<div class="card">
  <h3>5-dygnsprognos</h3>
  <div class="forecast" id="forecast"></div>
</div>

</div>

<script>
const lat = 57.123;
const lon = 13.952;
const smhiStation = 97490; // Åminne närmaste station

// ---------- FEELS LIKE ----------
function feelsLike(t, ws){
  const kmh = ws*3.6;
  if(t<=10 && kmh>4.8){
    return Math.round(
      13.12 + 0.6215*t - 11.37*Math.pow(kmh,0.16)
      + 0.3965*t*Math.pow(kmh,0.16)
    );
  }
  return Math.round(t);
}

// ---------- ISO VECKONUMMER ----------
function getISOWeek(date) {
  const tmpDate = new Date(date.getTime());
  tmpDate.setHours(0,0,0,0);
  tmpDate.setDate(tmpDate.getDate() + 3 - (tmpDate.getDay() + 6) % 7);
  const week1 = new Date(tmpDate.getFullYear(), 0, 4);
  return 1 + Math.round(((tmpDate - week1) / 86400000 - 3 + (week1.getDay() + 6) % 7) / 7);
}

// ---------- HÄMTA NU + FÖRSTA 5 DYGN (Open-Meteo) ----------
async function loadForecast(){
  try{
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=temperature_2m,weathercode&daily=temperature_2m_max,temperature_2m_min,weathercode&timezone=Europe/Stockholm`;
    const res = await fetch(url);
    const data = await res.json();

    // Nuvarande timme
    const now = new Date();
    const hourIdx = data.hourly.time.findIndex(t=>new Date(t)>=now);
    const t = data.hourly.temperature_2m[hourIdx];
    const code = data.hourly.weathercode[hourIdx];

    temp.textContent = Math.round(t)+"°";
    feels.textContent = "Känns som "+feelsLike(t,0)+"°"; // vind räknas separat nedan

    // Ikon + hover text
    const weatherMap = {
      0:"Soligt",1:"Molnigt",2:"Molnigt",3:"Molnigt",45:"Dimma",48:"Dimma",
      51:"Duggregn",53:"Duggregn",55:"Duggregn",56:"Snöblandat regn",57:"Snöblandat regn",
      61:"Regn",63:"Regn",65:"Regn",66:"Snöblandat regn",67:"Snöblandat regn",
      71:"Snö",73:"Snö",75:"Snö",77:"Snö",80:"Regn",81:"Regn",82:"Regn",
      85:"Snöblandat regn",86:"Snöblandat regn",95:"Åska",96:"Åska",99:"Åska"
    };
    const desc = weatherMap[code]||"Okänt";
    icon.src=`https://open-meteo.com/images/weather-icons/${code}.png`;
    icon.title = `${desc}, ${t.toFixed(1)}°`;

    // Uppdateringstid
    updated.textContent = "Uppdaterad: "+now.toLocaleTimeString("sv-SE",{hour:"2-digit",minute:"2-digit"});
    updated.style.color="white";

    // Femdygnsprognos
    forecast.innerHTML="";
    for(let i=1;i<=5;i++){
      const day = new Date(data.daily.time[i]);
      const max = Math.round(data.daily.temperature_2m_max[i]);
      const min = Math.round(data.daily.temperature_2m_min[i]);
      const codeD = data.daily.weathercode[i];
      const descD = weatherMap[codeD]||"Okänt";

      const card=document.createElement("div");
      card.className="day-card";
      card.innerHTML=`
        <div class="day-name">${day.toLocaleDateString("sv-SE",{weekday:"short"})}</div>
        <div>${descD}</div>
        <div class="temp-range">${max}° / ${min}°</div>
      `;
      forecast.appendChild(card);
    }

  } catch(e){
    console.error("Forecast fetch error", e);
    updated.textContent="Uppdateras…";
    updated.style.color="orange";
  }
}

// ---------- HÄMTA VIND (SMHI) ----------
async function loadWind(){
  try{
    const url=`https://opendata-download-metobs.smhi.se/api/version/latest/parameter/1/station/${smhiStation}/period/latest-hour/data.json`;
    const res=await fetch(url);
    const data=await res.json();

    const windVal = data.value[data.value.length-1].value;
    const kmh = (windVal*3.6).toFixed(1);
    wind.textContent = `${windVal.toFixed(1)} m/s ( ${kmh} km/h )`;
    windArrow.style.transform=`rotate(${windVal*30}deg)`; // enkel visualisering

  } catch(e){
    console.error("Wind fetch error", e);
    wind.textContent="--";
  }
}

// ---------- HÄMTA GÅRDAGENS MIN/MAX ----------
async function loadYesterday(){
  try{
    const url=`https://opendata-download-metobs.smhi.se/api/version/latest/parameter/1/station/${smhiStation}/period/latest-month/data.json`;
    const res=await fetch(url);
    const data=await res.json();
    const values = data.value;

    const now = new Date();
    const yesterday = new Date(now.getTime()-86400000);

    const yVals = values.filter(v=>{
      const d = new Date(v.date);
      return d.getDate()===yesterday.getDate() && d.getMonth()===yesterday.getMonth();
    });

    if(yVals.length){
      const temps = yVals.map(v=>v.value);
      yMin.textContent = Math.round(Math.min(...temps))+"°";
      yMax.textContent = Math.round(Math.max(...temps))+"°";
    } else {
      yMin.textContent = "--";
      yMax.textContent = "--";
    }

  } catch(e){
    console.error("Yesterday fetch error", e);
    yMin.textContent = "--";
    yMax.textContent = "--";
  }
}

// ---------- INIT ----------
function init(){
  const now = new Date();
  const weekNum = getISOWeek(now);
  date.textContent = now.toLocaleDateString("sv-SE",{weekday:"long",day:"numeric",month:"long",year:"numeric"}) + " ( V " + weekNum + " )";

  loadForecast();
  loadWind();
  loadYesterday();

  setInterval(()=>{
    loadForecast();
    loadWind();
    loadYesterday();
  },600000);
}
init();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VÄDER</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(to right, #141e30, #243b55);
  color: white;
  margin: 0;
  padding: 30px;
}

/* WRAPPER */
.container {
  max-width: 900px;
  margin: auto;
}

/* ===== BLOCK-STIL ===== */

.card {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  border-radius: 20px;
  padding: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
  margin-bottom: 25px;
}

/* ===== NUVARANDE VÄDER ===== */

.current-weather {
  position: relative;
  cursor: pointer;
  transition: transform 0.2s ease;
}

.current-weather:hover {
  transform: translateY(-3px);
}

.weather-main {
  display: flex;
  align-items: center;
  gap: 20px;
}

.weather-main img {
  width: 80px;
}

.temp {
  font-size: 52px;
  font-weight: bold;
}

.feels-like {
  opacity: 0.8;
}

/* Hover overlay */
.weather-tooltip {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.9);
  border-radius: 20px;
  padding: 20px;
  display: none;
  flex-direction: column;
  justify-content: center;
  gap: 8px;
}

.current-weather:hover .weather-tooltip {
  display: flex;
}

/* ===== PROGNOS ===== */

.forecast {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 15px;
}

.day-card {
  background: rgba(255,255,255,0.06);
  padding: 15px;
  border-radius: 16px;
  text-align: center;
  transition: transform 0.2s ease;
}

.day-card:hover {
  transform: translateY(-4px);
}

.day-card img {
  width: 45px;
}

.day-name {
  font-weight: bold;
  margin-bottom: 5px;
}

.temp-range {
  font-size: 14px;
}
</style>
</head>
<body>

<div class="container">

<h2 id="locationTitle">Hämtar position...</h2>

<div class="card current-weather">
  <div class="weather-main">
    <img id="weatherIcon" src="">
    <div>
      <div class="temp" id="temperature">--°</div>
      <div class="feels-like" id="feelsLike">Känns som --°</div>
    </div>
  </div>

  <div class="weather-tooltip">
    <div id="weatherDescription"></div>
    <div>Vind: <span id="wind"></span></div>
    <div>Luftfuktighet: <span id="humidity"></span></div>
    <div>Tryck: <span id="pressure"></span></div>
    <div>Nederbörd (1h): <span id="precip"></span></div>
  </div>
</div>

<div class="card">
  <h3>5-dygnsprognos</h3>
  <div class="forecast" id="forecast"></div>
</div>

</div>

<script>

const fallback = { lat: 57.173, lon: 14.040, name: "Bor" };

function getWeather(lat, lon, name="Din plats") {

  document.getElementById("locationTitle").textContent =
    "Väder för " + name;

  fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,apparent_temperature,weather_code,wind_speed_10m,relative_humidity_2m,surface_pressure,precipitation&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=auto`)
  .then(res => res.json())
  .then(data => {

    const c = data.current;

    temperature.textContent = Math.round(c.temperature_2m) + "°";
    feelsLike.textContent = "Känns som " + Math.round(c.apparent_temperature) + "°";
    wind.textContent = c.wind_speed_10m + " m/s";
    humidity.textContent = c.relative_humidity_2m + " %";
    pressure.textContent = c.surface_pressure + " hPa";
    precip.textContent = (c.precipitation || 0) + " mm";

    weatherDescription.textContent = weatherCodeToText(c.weather_code);
    weatherIcon.src = weatherCodeToIcon(c.weather_code);

    forecast.innerHTML = "";

    for (let i = 1; i <= 5; i++) {

      const date = new Date(data.daily.time[i]);
      const dayName = date.toLocaleDateString("sv-SE", { weekday: "short" });

      const card = document.createElement("div");
      card.className = "day-card";

      card.innerHTML = `
        <div class="day-name">${dayName}</div>
        <img src="${weatherCodeToIcon(data.daily.weather_code[i])}">
        <div class="temp-range">
          ${Math.round(data.daily.temperature_2m_max[i])}° /
          ${Math.round(data.daily.temperature_2m_min[i])}°
        </div>
      `;

      forecast.appendChild(card);
    }

  });
}

/* GPS */

if (navigator.geolocation) {
  navigator.geolocation.getCurrentPosition(
    pos => getWeather(pos.coords.latitude, pos.coords.longitude),
    () => getWeather(fallback.lat, fallback.lon, fallback.name)
  );
} else {
  getWeather(fallback.lat, fallback.lon, fallback.name);
}

/* Weather code */

function weatherCodeToText(code) {
  const map = {
    0: "Klart",
    1: "Mestadels klart",
    2: "Halvklart",
    3: "Mulet",
    61: "Regn",
    71: "Snö",
    80: "Regnskurar",
    85: "Snöbyar"
  };
  return map[code] || "Okänt väder";
}

function weatherCodeToIcon(code) {
  if (code === 0) return "https://cdn-icons-png.flaticon.com/512/869/869869.png";
  if ([1,2].includes(code)) return "https://cdn-icons-png.flaticon.com/512/1163/1163624.png";
  if (code === 3) return "https://cdn-icons-png.flaticon.com/512/414/414825.png";
  if ([61,80].includes(code)) return "https://cdn-icons-png.flaticon.com/512/1163/1163657.png";
  if ([71,85].includes(code)) return "https://cdn-icons-png.flaticon.com/512/642/642102.png";
  return "https://cdn-icons-png.flaticon.com/512/1163/1163661.png";
}

</script>

</body>
</html>

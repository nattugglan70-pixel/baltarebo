<!-- Komplett kod: Väder 1.5.7 - Fix ikon, Igår korrekt, hover-text -->
<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VÄDER</title>
<link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/869/869869.png" sizes="32x32">
<style>
body{
  font-family: Arial, sans-serif;
  background: linear-gradient(to right,#141e30,#243b55);
  color:white;
  margin:0;
  padding:30px;
}
.container{max-width:900px;margin:auto;}
.card{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(12px);
  border-radius:20px;
  padding:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
  margin-bottom:25px;
  position:relative;
}
.version{
  position:absolute;
  top:10px;
  right:15px;
  font-size:12px;
  color:gold;
  font-weight:bold;
}
.current{
  display:flex;
  gap:25px;
  align-items:center;
}
.left{
  flex:1.5;
  display:flex;
  flex-direction:column;
  gap:10px;
}
.left-top{
  display:flex;
  align-items:center;
  gap:15px;
}
.left img{width:80px;}
.temp{font-size:52px;font-weight:bold;}
.feels{display:flex;align-items:center;gap:10px;}
.wind-arrow{
  font-size:32px;
  display:inline-block;
}
.middle{
  flex:1;
  display:flex;
  flex-direction:column;
  gap:6px;
  font-size:14px;
}
.right{
  flex:1;
  font-size:14px;
}
.forecast{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:15px;
}
.day-card{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:rgba(255,255,255,0.06);
  padding:15px;
  border-radius:16px;
  text-align:center;
}
.day-card img{width:45px;}
.day-name{font-weight:bold;margin-bottom:5px;}
.temp-range{font-size:14px;}
#updated{font-weight:bold;}
</style>
</head>

<body>
<div class="container">

<div class="card current">
  <div class="version">1.5.7</div>
  <div class="left">
    <div class="left-top">
      <img id="icon" title="">
      <div class="temp" id="temp">--°</div>
    </div>
    <div class="feels">
      <div id="feels">Känns som --°</div>
      <div class="wind-arrow" id="windArrow">↑</div>
    </div>
  </div>

  <div class="middle">
    <div>Vind: <span id="wind">--</span></div>
    <div>Luftfuktighet: <span id="humidity">--</span></div>
    <div>Tryck: <span id="pressure">--</span></div>
    <div>Nederbörd (1h): <span id="precip">--</span></div>
    <div>Igår samma tid: <span id="ySame">--</span></div>
    <div>Igår Min/Max: <span id="yMin">--</span> / <span id="yMax">--</span></div>
  </div>

  <div class="right">
    <div id="date"></div>
    <div id="updated"></div>
  </div>
</div>

<div class="card">
  <h3>5-dygnsprognos</h3>
  <div class="forecast" id="forecast"></div>
</div>

</div>

<script>
const lat = 57.123; // Åminne
const lon = 13.952;
const station = 97490; // Åminne

// ---------------- Feels Like ----------------
function feelsLike(t, ws){
  const kmh = ws*3.6;
  if(t<=10 && kmh>4.8){
    return Math.round(
      13.12 + 0.6215*t - 11.37*Math.pow(kmh,0.16)
      + 0.3965*t*Math.pow(kmh,0.16)
    );
  }
  return Math.round(t);
}

// ---------------- ISO VECKONUMMER ----------------
function getISOWeek(date) {
  const tmpDate = new Date(date.getTime());
  tmpDate.setHours(0,0,0,0);
  tmpDate.setDate(tmpDate.getDate() + 3 - (tmpDate.getDay() + 6) % 7);
  const week1 = new Date(tmpDate.getFullYear(), 0, 4);
  return 1 + Math.round(((tmpDate - week1) / 86400000 - 3 + (week1.getDay() + 6) % 7) / 7);
}

// ---------------- HÄMTA OBSERVATION (Åminne) ----------------
async function loadCurrent(){
  try{
    const url=`https://opendata-download-metobs.smhi.se/api/version/latest/parameter/1/station/${station}/period/latest-hour/data.json`;
    const res=await fetch(url);
    const data=await res.json();
    if(!data.value || !data.value.length) throw "Ingen data";
    const now = new Date();
    const latest = data.value[data.value.length-1];
    temp.textContent=Math.round(latest.value)+"°";
    feels.textContent="Känns som "+Math.round(latest.value)+"°";
    updated.textContent="Uppdaterad: "+now.toLocaleTimeString("sv-SE",{hour:"2-digit",minute:"2-digit"});
    updated.style.color="white";
    icon.src="https://cdn-icons-png.flaticon.com/512/1163/1163661.png"; // ex.vis sol
    icon.title="Molnigt"; // dynamiskt kan mappas senare
  }catch(e){
    console.error("Current fetch error",e);
    updated.textContent="Uppdateras…";
    updated.style.color="orange";
  }
}

// ---------------- HÄMTA IGÅR SAME TIME + MIN/MAX ----------------
async function loadYesterday(){
  try{
    const url=`https://opendata-download-metobs.smhi.se/api/version/latest/parameter/1/station/${station}/period/latest-month/data.json`;
    const res=await fetch(url);
    const data=await res.json();
    const now=new Date();
    const yesterday=new Date(now.getTime()-86400000);
    const yVals = data.value.filter(v=>{
      const d=new Date(v.date);
      return d.getDate()===yesterday.getDate() &&
             d.getMonth()===yesterday.getMonth();
    });
    if(yVals.length){
      const temps=yVals.map(v=>v.value);
      yMin.textContent=Math.round(Math.min(...temps))+"°";
      yMax.textContent=Math.round(Math.max(...temps))+"°";
      // närmaste timme till nu
      const closest=yVals.reduce((prev,curr)=>{
        const diffPrev=Math.abs(new Date(prev.date).getHours()-now.getHours());
        const diffCurr=Math.abs(new Date(curr.date).getHours()-now.getHours());
        return diffCurr<diffPrev?curr:prev;
      });
      ySame.textContent=Math.round(closest.value)+"°";
    }
  }catch(e){
    console.error("Yesterday fetch error", e);
  }
}

// ---------------- HÄMTA 5-DYGNSPROGNOS ----------------
async function loadForecast(){
  const url=`https://opendata-download-metfcst.smhi.se/api/category/pmp3g/version/2/geotype/point/lon/${lon}/lat/${lat}/data.json`;
  try{
    const res=await fetch(url);
    const data=await res.json();
    const series=data.timeSeries;
    const daily={};
    series.forEach(ts=>{
      const day=ts.validTime.split("T")[0];
      if(!daily[day]) daily[day]=[];
      daily[day].push(ts);
    });
    forecast.innerHTML="";
    Object.keys(daily).slice(1,6).forEach(d=>{
      const arr=daily[d];
      // median Wsymb2
      const wsymbArr=arr.map(x=>x.parameters.find(p=>p.name==="Wsymb2").values[0]);
      const wsymb = wsymbArr[Math.floor(wsymbArr.length/2)];
      const card=document.createElement("div");
      card.className="day-card";
      card.innerHTML=`
        <div class="day-name">${new Date(d).toLocaleDateString("sv-SE",{weekday:"short"})}</div>
        <img src="https://www.smhi.se/image/icons/small/w/${wsymb}.png" title="Väderkod ${wsymb}">
        <div class="temp-range">
          ${Math.round(Math.max(...arr.map(ts=>ts.parameters.find(p=>p.name==="t").values[0])))}° / 
          ${Math.round(Math.min(...arr.map(ts=>ts.parameters.find(p=>p.name==="t").values[0])))}°
        </div>
      `;
      forecast.appendChild(card);
    });
  }catch(e){
    console.error("Forecast fetch error", e);
    forecast.innerHTML="Prognos saknas";
  }
}

// ---------------- INIT ----------------
function init(){
  const now=new Date();
  const weekNum=getISOWeek(now);
  date.textContent=now.toLocaleDateString("sv-SE",{weekday:"long",day:"numeric",month:"long",year:"numeric"})+" ( V "+weekNum+" )";
  loadCurrent();
  loadYesterday();
  loadForecast();
  setInterval(()=>{
    loadCurrent();
    loadYesterday();
    loadForecast();
  },600000); // 10 min
}

init();
</script>
</body>
</html>

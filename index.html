VÄDER 1.7.1
ÄNDRINGAR:
- Tydlig versionsmärkning i HTML
- Synlig versionsetikett i layout
- Förenklad stabil logik
- Igår Min/Max = senaste ~48 mätpunkter
- Ingen datumfiltrering
- Ingen övermatchning av tider

<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VÄDER 1.7.1</title>

<style>
body{font-family:Arial;background:#1e2a38;color:white;padding:30px}
.container{max-width:900px;margin:auto}
.card{background:#2e3c4f;padding:20px;border-radius:20px;margin-bottom:20px;position:relative}
.version{
  position:absolute;
  top:10px;
  right:15px;
  font-size:12px;
  color:#ffd700;
  font-weight:bold;
}
.current{display:flex;gap:30px;align-items:center}
.temp{font-size:50px;font-weight:bold}
.forecast{display:grid;grid-template-columns:repeat(5,1fr);gap:15px;margin-top:20px}
.day{text-align:center;background:#3b4c61;padding:15px;border-radius:15px}
.day img{width:40px}
</style>
</head>

<body>

<div class="container">

<div class="card current">
  <div class="version">1.7.1</div>
  <img id="icon" width="80">
  <div>
    <div class="temp" id="temp">--°</div>
    <div>Vind: <span id="wind">--</span></div>
    <div>Fukt: <span id="humidity">--</span></div>
    <div>Tryck: <span id="pressure">--</span></div>
    <div>Igår Min/Max: <span id="yMin">--</span> / <span id="yMax">--</span></div>
    <div id="updated"></div>
  </div>
</div>

<div class="card">
  <div class="forecast" id="forecast"></div>
</div>

</div>

<script>
const lat = 57.185;
const lon = 14.040;
const station = 97490;

// ===== NUVARANDE =====
async function loadCurrent(){
  const res = await fetch(
  `https://opendata-download-metfcst.smhi.se/api/category/pmp3g/version/2/geotype/point/lon/${lon}/lat/${lat}/data.json`
  );
  const data = await res.json();

  const current = data.timeSeries[0];

  const p = {};
  current.parameters.forEach(x=>p[x.name]=x.values[0]);

  temp.textContent = Math.round(p.t)+"°";
  wind.textContent = p.ws+" m/s";
  humidity.textContent = p.r+" %";
  pressure.textContent = p.msl+" hPa";

  const w = p.Wsymb2 || 1;
  icon.src = `https://opendata-download-metfcst.smhi.se/static/images/icons/w/${w}.png`;

  updated.textContent = "Uppdaterad: "+
  new Date().toLocaleTimeString("sv-SE",{hour:"2-digit",minute:"2-digit"});

  buildForecast(data.timeSeries);
}

// ===== 5 DYGN =====
function buildForecast(series){
  const days = {};
  series.forEach(ts=>{
    const d = ts.validTime.split("T")[0];
    if(!days[d]) days[d]=[];
    days[d].push(ts);
  });

  forecast.innerHTML="";

  Object.keys(days).slice(1,6).forEach(d=>{
    const arr = days[d];

    const temps = arr.map(x=>{
      const p={};
      x.parameters.forEach(a=>p[a.name]=a.values[0]);
      return p.t;
    });

    const mid = arr[Math.floor(arr.length/2)];
    const midP={};
    mid.parameters.forEach(a=>midP[a.name]=a.values[0]);

    const w = midP.Wsymb2 || 1;

    const el=document.createElement("div");
    el.className="day";
    el.innerHTML=`
      <div>${new Date(d).toLocaleDateString("sv-SE",{weekday:"short"})}</div>
      <img src="https://opendata-download-metfcst.smhi.se/static/images/icons/w/${w}.png">
      <div>${Math.round(Math.max(...temps))}° / ${Math.round(Math.min(...temps))}°</div>
    `;
    forecast.appendChild(el);
  });
}

// ===== IGÅR =====
async function loadYesterday(){
  const res = await fetch(
  `https://opendata-download-metobs.smhi.se/api/version/latest/parameter/1/station/${station}/period/latest-month/data.json`
  );
  const data = await res.json();

  if(!data.value) return;

  const vals = data.value.slice(-48);

  const temps = vals.map(v=>v.value);

  yMin.textContent = Math.round(Math.min(...temps))+"°";
  yMax.textContent = Math.round(Math.max(...temps))+"°";
}

async function init(){
  try{
    await loadCurrent();
    await loadYesterday();
  }catch(e){
    updated.textContent="Datafel";
  }
}

init();
setInterval(init,600000);
</script>

</body>
</html>

<!-- Väder 1.0 – Komplett kod -->
<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Väderdashboard</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(to right, #141e30, #243b55);
  color: white;
  margin: 0;
  padding: 30px;
}
.container {
  max-width: 900px;
  margin: auto;
}

/* ===== DAGENS VÄDERBLOCK ===== */
.card {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  border-radius: 20px;
  padding: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
  margin-bottom: 25px;
  position: relative;
  display: flex;
  flex-direction: row;
  justify-content: space-between;
}

/* HUVUDBLOCK */
.left-section, .center-section, .right-section {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.left-section {
  flex: 1.2;
}
.center-section {
  flex: 1;
}
.right-section {
  flex: 0.8;
  text-align: right;
}

/* VÄDERMAIN */
.weather-main {
  display: flex;
  align-items: center;
  gap: 15px;
}
.weather-main img {
  width: 80px;
}
.temp {
  font-size: 52px;
  font-weight: bold;
}
.feels-like {
  opacity: 0.8;
  font-size: 18px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.wind-arrow {
  display: inline-block;
  font-size: 30px;
  transform: rotate(0deg);
}

/* INFO */
.info-item {
  font-size: 16px;
}

/* 5 DAGARS PROGNOS */
.forecast {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 15px;
}
.day-card {
  background: rgba(255,255,255,0.06);
  padding: 15px;
  border-radius: 16px;
  text-align: center;
  transition: transform 0.2s ease;
}
.day-card:hover {
  transform: translateY(-4px);
}
.day-card img {
  width: 45px;
}
.day-name {
  font-weight: bold;
  margin-bottom: 5px;
}
.temp-range {
  font-size: 14px;
}

/* DATUM/VECKA + SENAST UPPDATERAD */
.date-week {
  font-size: 14px;
  opacity: 0.8;
  margin-bottom: 5px;
}
</style>
</head>
<body>

<div class="container">

<!-- DAGENS VÄDER -->
<div class="card">
  <div class="left-section">
    <div class="weather-main">
      <img id="weatherIcon" src="">
      <div>
        <div class="temp" id="temperature">--°</div>
        <div class="feels-like">
          <span id="feelsLike">Känns som --°</span>
          <span class="wind-arrow" id="windArrow">↑</span>
        </div>
      </div>
    </div>
  </div>

  <div class="center-section">
    <div class="info-item">Vind: <span id="wind">-- m/s</span></div>
    <div class="info-item">Luftfuktighet: <span id="humidity">-- %</span></div>
    <div class="info-item">Tryck: <span id="pressure">-- hPa</span></div>
    <div class="info-item">Nederbörd (1h): <span id="precip">-- mm</span></div>
    <div class="info-item">Igår samma tid: <span id="tempYesterday">--°</span></div>
    <div class="info-item">Igår – Min: <span id="yesterdayMin">--°</span> / Max: <span id="yesterdayMax">--°</span></div>
  </div>

  <div class="right-section">
    <div class="date-week" id="dateWeek">--</div>
    <div>Senast uppdaterad: <span id="updatedTime">--:--</span></div>
  </div>
</div>

<!-- 5-DYGN -->
<div class="card">
  <h3>5-dygnsprognos</h3>
  <div class="forecast" id="forecast"></div>
</div>

</div>

<script>
// ===== CONFIG / FALLBACK =====
const lat = 57.173, lon = 14.040;
const smhiStationId = 2556;

// ===== DATUM + VECKA =====
function updateDateWeek() {
  const now = new Date();
  const dayNum = now.getDay() || 7;
  const date = new Date(now);
  const yearStart = new Date(date.getFullYear(),0,1);
  const week = Math.ceil((((date - yearStart)/86400000 + 1)/7));
  document.getElementById("dateWeek").innerText =
    now.toLocaleDateString('sv-SE', { weekday:'long', day:'numeric', month:'long', year:'numeric'}) + " | Vecka " + week;
}

// ===== FEELS LIKE (baserat på SMHI-formel, km/h) =====
function calculateFeelsLike(tempC, windMs) {
  const windKmH = windMs * 3.6;
  if (tempC >= 10) return tempC; // ingen justering över 10°C
  const feels = 13.12 + 0.6215*tempC - 11.37*Math.pow(windKmH,0.16) + 0.3965*tempC*Math.pow(windKmH,0.16);
  return Math.round(feels);
}

// ===== WEATHER FETCH (SMHI) =====
async function getWeather() {
  updateDateWeek();
  const now = new Date();

  // ==== Dagens väder från SMHI Observations API ====
  const obsUrl = `https://opendata-download-metobs.smhi.se/api/version/1.0/parameter/1/station/${smhiStationId}/period/latest-day/data.json`;
  const resObs = await fetch(obsUrl);
  const dataObs = await resObs.json();

  const times = dataObs.value.map(v=>new Date(v.date));
  const temps = dataObs.value.map(v=>v.value);
  const windSpeeds = dataObs.value.map(v=>v.wind_speed || 0);
  const humidity = dataObs.value.map(v=>v.humidity || 0);

  // Hitta närmast nu (A)
  let nearestIdx = 0;
  let minDiff = Infinity;
  for(let i=0;i<times.length;i++){
    let diff = Math.abs(now-times[i]);
    if(diff<minDiff){
      minDiff = diff;
      nearestIdx = i;
    }
  }

  const tempNow = temps[nearestIdx];
  const windNow = windSpeeds[nearestIdx];
  const humidityNow = humidity[nearestIdx];

  temperature.textContent = Math.round(tempNow)+"°";
  feelsLike.textContent = "Känns som "+calculateFeelsLike(tempNow, windNow)+"°";
  wind.textContent = windNow.toFixed(1)+" m/s";
  humidity.textContent = humidityNow+" %";
  pressure.textContent = "--"; // SMHI: kan läggas till om önskas
  precip.textContent = "--"; // SMHI: kan läggas till om önskas

  // Vindpilen
  const windDir = dataObs.value[nearestIdx].wind_direction || 0; // grader
  windArrow.style.transform = `rotate(${windDir}deg)`;

  // ===== Historiska värden igår (närmaste timme) ====
  const yesterday = new Date(now.getTime()-86400000);
  let minY = 999, maxY=-999, sameHour=null;
  for(let i=0;i<times.length;i++){
    if(times[i].getDate()===yesterday.getDate()){
      if(temps[i]<minY) minY = temps[i];
      if(temps[i]>maxY) maxY = temps[i];
      if(times[i].getHours()===now.getHours()) sameHour=temps[i];
    }
  }
  tempYesterday.textContent = sameHour!==null?Math.round(sameHour)+"°":"--";
  yesterdayMin.textContent = minY!==999?Math.round(minY)+"°":"--";
  yesterdayMax.textContent = maxY!==-999?Math.round(maxY)+"°":"--";

  // Uppdaterad tid
  updatedTime.textContent = now.toLocaleTimeString('sv-SE',{hour:'2-digit',minute:'2-digit'});

  // ==== Femdygnsprognos från SMHI (från nästa dag) ====
  const forecastUrl = `https://opendata-download-metfcst.smhi.se/api/category/pmp3g/version/2/geotype/point/lon/${lon}/lat/${lat}/data.json`;
  const resFc = await fetch(forecastUrl);
  const dataFc = await resFc.json();

  forecast.innerHTML = "";
  const today = new Date();
  let count = 0;
  for(let i=0;i<dataFc.timeSeries.length;i++){
    const ts = new Date(dataFc.timeSeries[i].validTime);
    if(ts.getDate() > today.getDate() && count<5){
      const tempMin = dataFc.timeSeries[i].parameters.find(p=>p.name==='t')?.values[0] || 0;
      const tempMax = tempMin; // SMHI: endast timvärden, max/min kan summeras via logik om man vill
      const card = document.createElement("div");
      card.className = "day-card";
      card.innerHTML = `
        <div class="day-name">${ts.toLocaleDateString("sv-SE",{weekday:'short'})}</div>
        <div class="temp-range">${Math.round(tempMax)}° / ${Math.round(tempMin)}°</div>`;
      forecast.appendChild(card);
      count++;
    }
  }
}

// ===== GPS fallback om önskas =====
if(navigator.geolocation){
  navigator.geolocation.getCurrentPosition(
    pos => getWeather(),
    () => getWeather()
  );
} else {
  getWeather();
}
</script>
</body>
</html>

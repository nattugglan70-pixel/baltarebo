<!-- Väder 1.1 – Komplett kod med fallback och senast uppmätt -->
<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Väderdashboard</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(to right,#141e30,#243b55);
  color:white;
  margin:0;
  padding:30px;
}
.container{max-width:900px;margin:auto;}
.card {
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(12px);
  border-radius:20px;
  padding:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
  margin-bottom:25px;
  display:flex;
  justify-content:space-between;
}
.left-section,.center-section,.right-section {
  display:flex;flex-direction:column;gap:8px;
}
.left-section{flex:1.2;}
.center-section{flex:1;}
.right-section{flex:0.8;text-align:right;}
.weather-main{display:flex;align-items:center;gap:15px;}
.weather-main img{width:80px;}
.temp{font-size:52px;font-weight:bold;}
.feels-like{opacity:0.8;font-size:18px;display:flex;align-items:center;gap:10px;}
.wind-arrow{font-size:32px;display:inline-block;transform:rotate(0deg);}
.info-item{font-size:16px;}
.forecast{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;}
.day-card{background:rgba(255,255,255,0.06);padding:15px;border-radius:16px;text-align:center;transition:transform 0.2s ease;}
.day-card:hover{transform:translateY(-4px);}
.day-card img{width:45px;}
.day-name{font-weight:bold;margin-bottom:5px;}
.temp-range{font-size:14px;}
.date-week{font-size:14px;opacity:0.8;margin-bottom:5px;}
.version-notice{
  text-align:center;
  margin-bottom:15px;
  font-size:16px;
  opacity:0.9;
}
</style>
</head>
<body>

<div class="version-notice">
  Väder 1.1 – fallback för gårdagens data och senast uppmätt
</div>

<div class="container">

<!-- DAGENS VÄDER -->
<div class="card">
  <div class="left-section">
    <div class="weather-main">
      <img id="weatherIcon" src="" alt="Väderikon">
      <div>
        <div class="temp" id="temperature">--°</div>
        <div class="feels-like">
          <span id="feelsLike">Känns som --°</span>
          <span class="wind-arrow" id="windArrow">↑</span>
        </div>
      </div>
    </div>
  </div>

  <div class="center-section">
    <div class="info-item">Vind: <span id="wind">-- m/s</span></div>
    <div class="info-item">Luftfuktighet: <span id="humidity">-- %</span></div>
    <div class="info-item">Tryck: <span id="pressure">-- hPa</span></div>
    <div class="info-item">Nederbörd (1h): <span id="precip">-- mm</span></div>
    <div class="info-item">Igår samma tid: <span id="tempYesterday">--°</span></div>
    <div class="info-item">Igår – Min: <span id="yesterdayMin">--°</span> / Max: <span id="yesterdayMax">--°</span></div>
  </div>

  <div class="right-section">
    <div class="date-week" id="dateWeek">--</div>
    <div>Senast uppdaterad: <span id="updatedTime">--:--</span></div>
    <div id="lastMeasured" style="font-size:12px;opacity:0.7;"></div>
  </div>
</div>

<!-- FIVE‑DAY FORECAST -->
<div class="card">
  <h3>5-dygnsprognos</h3>
  <div class="forecast" id="forecast"></div>
</div>

</div>

<script>
// ===== KONFIG =====
const lat = 57.173, lon = 14.040;
const smhiStationId = 2556;

// ===== DATUM & VECKA =====
function updateDateWeek(){
  const now = new Date();
  const week = Math.ceil( (((now - new Date(now.getFullYear(),0,1))/86400000)+1)/7 );
  document.getElementById("dateWeek").innerText =
    now.toLocaleDateString('sv-SE',{weekday:'long',day:'numeric',month:'long',year:'numeric'})+" | Vecka "+week;
}

// ===== “Feels Like” =====
function calculateFeelsLike(tempC, windMs){
  const windKmH = windMs*3.6;
  if(tempC<=10 && windKmH>4.8){
    return Math.round(13.12+0.6215*tempC -11.37*Math.pow(windKmH,0.16)+0.3965*tempC*Math.pow(windKmH,0.16));
  }
  return Math.round(tempC);
}

// ===== HÄMTA OBSERVATIONER =====
async function loadObservations(){
  const url = `https://opendata-download-metobs.smhi.se/api/version/1.0/parameter/1,3,4,6,8,9/station/${smhiStationId}/period/latest-month/data.json`;
  const res = await fetch(url);
  const data = await res.json();
  return data.value || [];
}

// ===== HÄMTA PROGNOS =====
async function loadForecastData(){
  const url = `https://opendata-download-metfcst.smhi.se/api/category/pmp3g/version/2/geotype/point/lon/${lon}/lat/${lat}/data.json`;
  const res = await fetch(url);
  return await res.json();
}

// ===== RENDER =====
async function renderWeather(){
  updateDateWeek();
  const now = new Date();

  // --- OBSERVATIONER ---
  const obs = await loadObservations();

  // --- SORTERA TIMME OCH SENAST UPPMÄTT ---
  let nearestIdx=null, nearestDiff=Infinity;
  obs.forEach((v,i)=>{
    const t=new Date(v.date);
    const diff=Math.abs(now-t);
    if(diff<nearestDiff){
      nearestDiff=diff;
      nearestIdx=i;
    }
  });

  // --- SENAST UPPMÄTT TID ---
  if(nearestIdx!==null){
    document.getElementById("lastMeasured")
      .innerText = "Senast uppmätt: "+new Date(obs[nearestIdx].date)
      .toLocaleTimeString('sv-SE',{hour:'2-digit',minute:'2-digit'});
  }

  // --- DAGENS VÄDER ---
  if(nearestIdx!==null){
    const current=obs[nearestIdx];
    document.getElementById("temperature").textContent = Math.round(current.value)+"°";
    document.getElementById("feelsLike").textContent =
      "Känns som "+calculateFeelsLike(current.value, current.wind_speed || 0)+"°";
    document.getElementById("wind").textContent = (current.wind_speed||0).toFixed(1)+" m/s";
    document.getElementById("humidity").textContent = (current.relative_humidity||0)+" %";
    document.getElementById("pressure").textContent = (current.air_pressure||0)+" hPa";
    document.getElementById("precip").textContent = (current.precipitation||0)+" mm";
    document.getElementById("windArrow").style.transform = `rotate(${current.wind_direction||0}deg)`;
    document.getElementById("weatherIcon").src="https://cdn-icons-png.flaticon.com/512/1163/1163624.png";
  }

  // --- IGÅR SAME + MIN/MAX ---
  let yTempSame=null, yMin=Infinity, yMax=-Infinity;
  obs.forEach(v=>{
    const t=new Date(v.date);
    const yesterday=new Date(now.getTime()-86400000);
    if(t.getDate()===yesterday.getDate()){
      yMin = Math.min(yMin, v.value);
      yMax = Math.max(yMax, v.value);
      if(yTempSame===null || Math.abs(t.getHours()-now.getHours())<Math.abs(new Date(yTempSame.date).getHours()-now.getHours())){
        yTempSame=v;
      }
    }
  });
  document.getElementById("tempYesterday").textContent = yTempSame?
    Math.round(yTempSame.value)+"°"+" (uppdateras...)":"-- (uppdateras...)";
  document.getElementById("yesterdayMin").textContent =
    yMin!==Infinity?Math.round(yMin)+"°":"-- (uppdateras...)";
  document.getElementById("yesterdayMax").textContent =
    yMax!==-Infinity?Math.round(yMax)+"°":"-- (uppdateras...)";

  // --- SENAST UPPDATERAD TID ---
  document.getElementById("updatedTime").innerText =
    now.toLocaleTimeString('sv-SE',{hour:'2-digit',minute:'2-digit'});

  // --- FEMDYGNSPROGNOS ---
  const fcData = await loadForecastData();
  const series = fcData.timeSeries || [];
  const dailyMap = {};
  series.forEach(ts=>{
    const date = ts.validTime.split("T")[0];
    if(!dailyMap[date]) dailyMap[date]=[];
    dailyMap[date].push(ts);
  });

  const todayStr = now.toISOString().split("T")[0];
  const keys = Object.keys(dailyMap).filter(d=>d>todayStr).slice(0,5);

  const fcEl = document.getElementById("forecast");
  fcEl.innerHTML="";
  keys.forEach(d=>{
    const arr = dailyMap[d];
    let minT=Infinity, maxT=-Infinity;
    arr.forEach(ts=>{
      ts.parameters.forEach(p=>{
        if(p.name==="t"){
          minT = Math.min(minT, p.values[0]);
          maxT = Math.max(maxT, p.values[0]);
        }
      });
    });
    const card=document.createElement("div");
    card.className="day-card";
    card.innerHTML = `
      <div class="day-name">${new Date(d).toLocaleDateString("sv-SE",{weekday:"short"})}</div>
      <img src="https://cdn-icons-png.flaticon.com/512/414/414825.png">
      <div class="temp-range">${Math.round(maxT)}° / ${Math.round(minT)}°</div>`;
    fcEl.appendChild(card);
  });
}

// ===== INIT =====
renderWeather();

</script>
</body>
</html>

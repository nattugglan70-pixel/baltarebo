<!--
VÄDER 1.4
Stabil basversion
Fungerar: Huvudikon, 5-dygnsprognos, Temperatur, Vind, Fukt, Tryck, Igår Min/Max
-->
<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VÄDER 1.4</title>
<link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/869/869869.png" sizes="32x32">

<style>
body { font-family: Arial, sans-serif; background: linear-gradient(to right,#141e30,#243b55); color:white; margin:0; padding:30px; }
.container { max-width: 900px; margin:auto; }
.card { background: rgba(255,255,255,0.08); backdrop-filter: blur(12px); border-radius:20px; padding:20px; margin-bottom:25px; position:relative; }
.version { position:absolute; top:10px; right:15px; font-size:12px; color:gold; font-weight:bold; }
.current { display:flex; gap:25px; align-items:center; }
.temp { font-size:52px; font-weight:bold; }
.forecast { display:grid; grid-template-columns:repeat(5,1fr); gap:15px; margin-top:20px; }
.day-card { display:flex; flex-direction:column; align-items:center; justify-content:center; background:rgba(255,255,255,0.06); padding:15px; border-radius:16px; text-align:center; }
.day-card img { width:45px; }
.day-name { font-weight:bold; margin-bottom:5px; }
.temp-range { font-size:14px; }
#updated { font-weight:bold; }
</style>
</head>

<body>
<div class="container">

<div class="card current">
  <div class="version">1.4</div>
  <div class="current">
    <img id="icon" width="80">
    <div>
      <div class="temp" id="temp">--°</div>
      <div>Vind: <span id="wind">--</span></div>
      <div>Luftfuktighet: <span id="humidity">--</span></div>
      <div>Tryck: <span id="pressure">--</span></div>
      <div>Igår Min/Max: <span id="yMin">--</span> / <span id="yMax">--</span></div>
      <div id="updated"></div>
    </div>
  </div>
</div>

<div class="card">
  <div class="forecast" id="forecast"></div>
</div>

</div>

<script>
const lat = 57.173;
const lon = 14.040;
const station = 2556;

// Hämta aktuell prognos + 5 dygn
async function loadForecast(){
  try{
    const res = await fetch(`https://opendata-download-metfcst.smhi.se/api/category/pmp3g/version/2/geotype/point/lon/${lon}/lat/${lat}/data.json`);
    const data = await res.json();
    const series = data.timeSeries;

    const now = new Date();
    const current = series[0];
    const params = {};
    current.parameters.forEach(p=>params[p.name]=p.values[0]);

    temp.textContent = Math.round(params.t)+"°";
    wind.textContent = params.ws.toFixed(1)+" m/s";
    humidity.textContent = params.r+" %";
    pressure.textContent = params.msl+" hPa";

    const w = params.Wsymb2 || 1;
    icon.src = `https://opendata-download-metfcst.smhi.se/static/images/icons/w/${w}.png`;

    updated.textContent = "Uppdaterad: "+now.toLocaleTimeString("sv-SE",{hour:"2-digit",minute:"2-digit"});

    // Bygg 5-dygnsprognos
    const daily = {};
    series.forEach(ts=>{
      const d = ts.validTime.split("T")[0];
      if(!daily[d]) daily[d]=[];
      daily[d].push(ts);
    });

    forecast.innerHTML = "";
    Object.keys(daily).slice(1,6).forEach(d=>{
      const arr = daily[d];
      const temps = arr.map(x=>{
        const p={}; x.parameters.forEach(a=>p[a.name]=a.values[0]); return p.t;
      });
      const max = Math.max(...temps);
      const min = Math.min(...temps);

      const mid = arr[Math.floor(arr.length/2)];
      const midP={}; mid.parameters.forEach(a=>midP[a.name]=a.values[0]);
      const wIcon = midP.Wsymb2 || 1;

      const card = document.createElement("div");
      card.className="day-card";
      card.innerHTML=`
        <div class="day-name">${new Date(d).toLocaleDateString("sv-SE",{weekday:"short"})}</div>
        <img src="https://opendata-download-metfcst.smhi.se/static/images/icons/w/${wIcon}.png">
        <div class="temp-range">${Math.round(max)}° / ${Math.round(min)}°</div>
      `;
      forecast.appendChild(card);
    });

  }catch(e){
    console.error("Forecast fetch error", e);
    updated.textContent="Datafel";
  }
}

// Hämta igår Min/Max
async function loadYesterday(){
  try{
    const res = await fetch(`https://opendata-download-metobs.smhi.se/api/version/latest/parameter/1/station/${station}/period/latest-month/data.json`);
    const data = await res.json();
    if(!data.value) return;

    const vals = data.value.slice(-48); // senaste 48 mätpunkter
    const temps = vals.map(v=>v.value);
    yMin.textContent = Math.round(Math.min(...temps))+"°";
    yMax.textContent = Math.round(Math.max(...temps))+"°";
  }catch(e){
    console.error("Yesterday fetch error", e);
  }
}

// INIT
async function init(){
  await loadForecast();
  await loadYesterday();
}
init();
setInterval(init,600000); // uppdatera var 10:e minut
</script>

</body>
</html>

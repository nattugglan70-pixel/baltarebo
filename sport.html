<!--
IFK SPORTBAR
Version: 4.2
Datum: 2026-04-05

ÄNDRINGAR:
- Automatisk tabell via FotMob
- Nedräkning till avspark
- MATCH IDAG highlight
- Klickbar arena (bortamatcher)
-->

<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IFK Sportbar</title>

<style>
body{
margin:0;
background:#05070a;
color:white;
font-family:Arial, Helvetica, sans-serif;
}

.container{
display:grid;
grid-template-columns:1.4fr 1fr;
gap:25px;
padding:40px;
}

.panel{
background:#0c1118ee;
border-radius:18px;
padding:25px;
}

.matchCard{padding:15px;border-bottom:1px solid #222;}
.matchTeams{font-size:22px;font-weight:bold;}
.matchTime{color:#aaa;margin-top:5px;}

.nextMatch{
background:#16263f;
padding:15px;
border-radius:10px;
margin-bottom:15px;
}

.badge{padding:3px 8px;border-radius:6px;font-size:12px;margin-left:8px;}
.home{background:#1e7a1e;}
.away{background:#7a1e1e;}

.today{
background:#7a1e1e;
padding:2px 6px;
border-radius:6px;
margin-left:6px;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{opacity:1;}
50%{opacity:0.4;}
100%{opacity:1;}
}

.arenaLink{
font-size:13px;
color:#6fa8ff;
text-decoration:none;
}

.arenaLink:hover{text-decoration:underline;}

table{width:100%;border-collapse:collapse;}
td,th{padding:8px;border-bottom:1px solid #222;}
.ifkRow{color:gold;font-weight:bold;}
</style>
</head>

<body>

<div class="container">

<div class="panel">
<div id="matches"></div>
</div>

<div class="panel">
<h2>Tabell</h2>
<table id="table"></table>
</div>

</div>

<script>
const manualMatches = [
{date:"2026-04-04 12:30", teams:"IFK Norrköping – IFK Värnamo", arena:"PlatinumCars Arena", map:"https://www.google.com/maps/dir/?api=1&destination=PlatinumCars+Arena+Norrköping"},
{date:"2026-04-14 19:00", teams:"IFK Värnamo – GIF Sundsvall"},
{date:"2026-04-18 15:00", teams:"Sandvikens IF – IFK Värnamo", arena:"Jernvallen", map:"https://www.google.com/maps/dir/?api=1&destination=Jernvallen+Sandviken"}
];

function formatDate(d){
return d.toLocaleString("sv-SE",{weekday:"short",day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"});
}

function countdown(date){
const diff = new Date(date) - new Date();
if(diff<=0) return "Match startad";
const h=Math.floor(diff/1000/60/60);
const m=Math.floor((diff/1000/60)%60);
return `${h}h ${m}m kvar`;
}

function showManual(){
  const now=new Date();

const upcoming=manualMatches
.filter(m=>new Date(m.date)>=now)
.sort((a,b)=>new Date(a.date)-new Date(b.date));

let html="";

if(upcoming.length){
const next=upcoming[0];
html+=`
<div class="nextMatch">
<b>NÄSTA MATCH</b><br>
${next.teams}<br>
${formatDate(new Date(next.date))}
</div>`;
}

upcoming.forEach(m=>{
const d=new Date(m.date);
const isHome=m.teams.startsWith("IFK Värnamo");
const badge=isHome?'<span class="badge home">HEMMA</span>':'<span class="badge away">BORTA</span>';
const today=(d.toDateString()===new Date().toDateString())?'<span class="today">IDAG</span>':'';

let arena="";
if(!isHome && m.arena){
arena=`<a class="arenaLink" href="${m.map}" target="_blank">📍 ${m.arena}</a>`;
}

html+=`
<div class="matchCard">
<div class="matchTeams">${m.teams} ${badge} ${today}</div>
<div class="matchTime">
${formatDate(d)}<br>
${countdown(m.date)}
</div>
${arena}
</div>`;
});

document.getElementById("matches").innerHTML=html;
}

async function loadTable(){
try{
const res=await fetch("https://www.fotmob.com/api/leagues?id=27&ccode3=SWE_MALE");
const data=await res.json();
const table=data.table[0].data.table.all;

let html="<tr><th>#</th><th>Lag</th><th>P</th><th>+/-</th></tr>";

table.forEach((t,i)=>{
const isIFK=t.name==="IFK Värnamo";
html+=`
<tr class="${isIFK?'ifkRow':''}">
<td>${i+1}</td>
<td>${t.name}</td>
<td>${t.pts}</td>
<td>${t.gd}</td>
</tr>`;
});

document.getElementById("table").innerHTML=html;

}catch(e){
console.log("Tabell fel");
}
}

showManual();
loadTable();
setInterval(loadTable,600000);
</script>

</body>
</html>

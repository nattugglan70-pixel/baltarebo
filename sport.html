<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IFK Värnamo Sportbar</title>

<style>
body{
    margin:0;
    background:radial-gradient(circle at top,#111827,#05070a);
    color:white;
    font-family:Arial, Helvetica, sans-serif;
}

.header{
    text-align:center;
    font-size:52px;
    font-weight:bold;
    padding:20px 0 5px 0;
}

.sub{
    text-align:center;
    font-size:22px;
    color:#00ff88;
    margin-bottom:15px;
}

.container{
    display:grid;
    grid-template-columns: 1.4fr 1fr;
    gap:25px;
    padding:20px 40px;
}

.panel{
    background:#0c1118;
    border-radius:18px;
    padding:25px;
    box-shadow:0 0 40px rgba(0,0,0,0.7);
}

.big{
    font-size:32px;
    margin-bottom:15px;
}

.countdown{
    font-size:44px;
    color:#00ff88;
    margin-bottom:25px;
    font-weight:bold;
}

.info{
    font-size:22px;
    color:#aaa;
}

table{
    width:100%;
    border-collapse:collapse;
    font-size:18px;
}

td,th{
    padding:10px;
    border-bottom:1px solid #222;
}

.highlight{
    color:#00ff88;
    font-weight:bold;
}

.footer{
    text-align:center;
    opacity:0.3;
    font-size:12px;
    padding:8px;
}
</style>
</head>

<body>

<div class="header">⚽ IFK VÄRNAMO</div>
<div class="sub">Superettan 2026</div>

<div class="container">

<div class="panel">
<div class="big" id="nextMatch">Väntar på spelschema…</div>
<div class="countdown" id="countdown">--</div>
<div class="info" id="status">Matchschema fastställs av förbundet</div>
</div>

<div class="panel">
<h2>Superettan lag 2026</h2>
<table id="table"></table>
</div>

</div>

<div class="footer">Uppdateras automatiskt</div>

<script>
const TEAM="IFK Värnamo";
const LEAGUE="4403";

// alla lag 2026
const teams=[
"IFK Värnamo",
"Helsingborgs IF",
"GIF Sundsvall",
"Östers IF",
"Utsiktens BK",
"Trelleborgs FF",
"Östersunds FK",
"Gefle IF",
"Skövde AIK",
"Varbergs BoIS",
"IK Brage",
"Landskrona BoIS",
"Örgryte IS",
"Sandvikens IF",
"Falkenbergs FF",
"Oddevold"
];

// visa laglista innan tabell finns
function showTeams(){
    let html="<tr><th>Lag</th></tr>";
    teams.forEach(t=>{
        let hl=t===TEAM?"class='highlight'":"";
        html+=`<tr ${hl}><td>${t}</td></tr>`;
    });
    document.getElementById("table").innerHTML=html;
}

// countdown
function startCountdown(dateStr){
    function update(){
        const match=new Date(dateStr+"T19:00:00").getTime();
        const now=new Date().getTime();
        const diff=match-now;

        if(diff<0){
            document.getElementById("countdown").innerHTML="Match pågår/spelad";
            return;
        }

        const d=Math.floor(diff/86400000);
        const h=Math.floor((diff%86400000)/3600000);
        const m=Math.floor((diff%3600000)/60000);

        document.getElementById("countdown").innerHTML=
        d+"d "+h+"h "+m+"m";
    }
    update();
    setInterval(update,60000);
}

// hämta matcher från API
async function loadMatches(){
    try{
        const t=await fetch(`https://www.thesportsdb.com/api/v1/json/3/searchteams.php?t=${TEAM}`);
        const td=await t.json();
        const id=td.teams[0].idTeam;

        const res=await fetch(`https://www.thesportsdb.com/api/v1/json/3/eventsnext.php?id=${id}`);
        const data=await res.json();

        if(!data.events){
            return; // fortsätt visa väntläge
        }

        const m=data.events[0];

        document.getElementById("nextMatch").innerHTML=
        m.strHomeTeam+" vs "+m.strAwayTeam;

        document.getElementById("status").innerHTML=
        "Nästa match: "+m.dateEvent;

        startCountdown(m.dateEvent);

    }catch{}
}

// riktig tabell när den finns
async function loadTable(){
    const year=new Date().getFullYear();
    try{
        const res=await fetch(`https://www.thesportsdb.com/api/v1/json/3/lookuptable.php?l=${LEAGUE}&s=${year}`);
        const data=await res.json();

        if(!data.table || data.table.length<10){
            showTeams();
            return;
        }

        let html="<tr><th>#</th><th>Lag</th><th>P</th></tr>";
        data.table.forEach(t=>{
            let hl=t.strTeam===TEAM?"class='highlight'":"";
            html+=`<tr ${hl}><td>${t.intRank}</td><td>${t.strTeam}</td><td>${t.intPoints}</td></tr>`;
        });

        document.getElementById("table").innerHTML=html;

    }catch{
        showTeams();
    }
}

function init(){
    showTeams();
    loadMatches();
    loadTable();
}

init();
setInterval(init,300000);
</script>

</body>
</html>

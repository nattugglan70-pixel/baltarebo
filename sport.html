<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IFK Värnamo – Matchcenter</title>

<style>
body{
    margin:0;
    background:linear-gradient(180deg,#0b0f14,#111827);
    color:white;
    font-family:Arial, Helvetica, sans-serif;
}

.header{
    text-align:center;
    font-size:44px;
    padding:25px 0 10px 0;
    font-weight:bold;
}

.sub{
    text-align:center;
    color:#00ff88;
    font-size:22px;
    margin-bottom:20px;
}

.container{
    display:grid;
    grid-template-columns: 1.2fr 1fr;
    gap:30px;
    padding:25px;
}

.panel{
    background:#111827;
    padding:25px;
    border-radius:16px;
    box-shadow:0 0 25px rgba(0,0,0,0.6);
}

h2{
    margin-top:0;
    border-bottom:1px solid #333;
    padding-bottom:8px;
    font-size:26px;
}

.match{
    margin-bottom:16px;
    padding-bottom:10px;
    border-bottom:1px solid #222;
    font-size:19px;
}

.date{
    color:#00ff88;
    font-weight:bold;
}

.countdown{
    font-size:28px;
    color:#00ff88;
    margin-bottom:15px;
}

table{
    width:100%;
    border-collapse:collapse;
}

td, th{
    padding:8px;
    border-bottom:1px solid #222;
}

.highlight{
    color:#00ff88;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="header">⚽ IFK Värnamo</div>
<div class="sub">Superettan 2026</div>

<div class="container">

<div class="panel">
<h2>⏳ Nästa match</h2>
<div id="countdown" class="countdown">Laddar...</div>

<h2>📅 Kommande matcher</h2>
<div id="next">Laddar matcher...</div>
</div>

<div class="panel">
<h2>📊 Tabell</h2>
<table id="table"></table>
</div>

</div>

<script>
// ===== MANUELL BACKUP 2026 =====
// Uppdaterar denna när spelschema släpps
const backupMatches = [
{date:"2026-04-05", home:"IFK Värnamo", away:"Östersund"},
{date:"2026-04-12", home:"Helsingborg", away:"IFK Värnamo"},
{date:"2026-04-20", home:"IFK Värnamo", away:"Utsikten"},
{date:"2026-04-27", home:"Trelleborg", away:"IFK Värnamo"}
];

const TEAM_NAME="IFK Värnamo";
const LEAGUE_ID="4403";

// ===== COUNTDOWN =====
function startCountdown(dateStr){
    function update(){
        const matchTime = new Date(dateStr+"T19:00:00").getTime();
        const now = new Date().getTime();
        const diff = matchTime-now;

        if(diff<=0){
            document.getElementById("countdown").innerHTML="Matchdag!";
            return;
        }

        const d=Math.floor(diff/(1000*60*60*24));
        const h=Math.floor((diff/(1000*60*60))%24);
        const m=Math.floor((diff/(1000*60))%60);

        document.getElementById("countdown").innerHTML=
        d+" dagar "+h+"h "+m+"m";
    }
    update();
    setInterval(update,60000);
}

// ===== VISA BACKUP =====
function showBackup(){
    let html="";
    backupMatches.forEach((m,i)=>{
        if(i===0) startCountdown(m.date);
        html+=`
        <div class="match">
        <div class="date">${m.date}</div>
        ${m.home} vs ${m.away}
        </div>`;
    });
    document.getElementById("next").innerHTML=html;
}

// ===== API MATCHER =====
async function loadAPI(){
    try{
        const resTeam=await fetch(`https://www.thesportsdb.com/api/v1/json/3/searchteams.php?t=${TEAM_NAME}`);
        const teamData=await resTeam.json();
        const id=teamData.teams[0].idTeam;

        const res=await fetch(`https://www.thesportsdb.com/api/v1/json/3/eventsnext.php?id=${id}`);
        const data=await res.json();

        if(!data.events){
            showBackup();
            return;
        }

        let html="";
        data.events.slice(0,8).forEach((m,i)=>{
            if(i===0) startCountdown(m.dateEvent);
            html+=`
            <div class="match">
            <div class="date">${m.dateEvent}</div>
            ${m.strHomeTeam} vs ${m.strAwayTeam}
            </div>`;
        });

        document.getElementById("next").innerHTML=html;

    }catch{
        showBackup();
    }
}

// ===== TABELL =====
async function loadTable(){
    const year=new Date().getFullYear();
    try{
        const res=await fetch(`https://www.thesportsdb.com/api/v1/json/3/lookuptable.php?l=${LEAGUE_ID}&s=${year}`);
        const data=await res.json();

        if(!data.table){
            document.getElementById("table").innerHTML="Tabell visas när serien startar";
            return;
        }

        let html="<tr><th>#</th><th>Lag</th><th>P</th></tr>";
        data.table.forEach(t=>{
            let hl=t.strTeam===TEAM_NAME?"class='highlight'":"";
            html+=`<tr ${hl}><td>${t.intRank}</td><td>${t.strTeam}</td><td>${t.intPoints}</td></tr>`;
        });
        document.getElementById("table").innerHTML=html;
    }catch{}
}

// ===== START =====
function init(){
    loadAPI();
    loadTable();
}
init();
setInterval(init,300000);
</script>

</body>
</html>

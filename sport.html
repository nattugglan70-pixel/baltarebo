<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IFK Sportbar</title>

<style>
body{
margin:0;
background:#05070a;
color:white;
font-family:Arial, Helvetica, sans-serif;
overflow-x:hidden;
}

body::before{
content:"";
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:950px;
height:950px;
background:url("IFK.png") no-repeat center;
background-size:contain;
opacity:0.22;
z-index:0;
}

.container{
display:grid;
grid-template-columns:1.4fr 1fr;
gap:25px;
padding:40px;
position:relative;
z-index:2;
}

.panel{
background:#0c1118ee;
border-radius:18px;
padding:25px;
box-shadow:0 0 40px rgba(0,0,0,0.7);
position:relative;
}

.version{
position:absolute;
top:12px;
right:18px;
color:gold;
font-size:14px;
}

.matchCard{
padding:18px 10px;
border-bottom:1px solid #1f2630;
}

.matchTeams{
font-size:24px;
font-weight:bold;
}

.matchTime{
font-size:20px;
color:#aaa;
margin-top:4px;
}

.nextMatch{
background:#16263f;
padding:18px;
border-radius:12px;
margin-bottom:15px;
}

.badge{
display:inline-block;
padding:4px 10px;
border-radius:8px;
font-size:12px;
margin-left:10px;
}

.home{background:#1e7a1e;}
.away{background:#7a1e1e;}

.arenaLink{
font-size:14px;
color:#6fa8ff;
margin-top:3px;
display:inline-block;
text-decoration:none;
}

.arenaLink:hover{
text-decoration:underline;
color:#9fc5ff;
cursor:pointer;
}

table{width:100%;border-collapse:collapse;font-size:18px;}
td,th{padding:10px;border-bottom:1px solid #222;}
.ifkRow{color:gold;font-weight:bold;}

.footer{
text-align:center;
opacity:0.25;
font-size:12px;
padding:10px;
}
</style>
</head>

<body>

<div class="container">

<div class="panel">
<div id="matches"></div>
</div>

<div class="panel">
<div class="version">v4.1</div>
<h2>Tabell 2026</h2>
<table>
<tr><th>#</th><th>Lag</th><th>P</th><th>+/-</th></tr>
<tr class="ifkRow"><td>1</td><td>IFK Värnamo</td><td>0</td><td>0</td></tr>
</table>
</div>

</div>

<div class="footer">Sportbar aktiv</div>

<script>
const manualMatches = [
{date:"2026-04-04 12:30", teams:"IFK Norrköping – IFK Värnamo", arena:"PlatinumCars Arena", map:"https://www.google.com/maps?q=PlatinumCars+Arena+Norrköping"},
{date:"2026-04-14 19:00", teams:"IFK Värnamo – GIF Sundsvall"},
{date:"2026-04-18 15:00", teams:"Sandvikens IF – IFK Värnamo", arena:"Jernvallen", map:"https://www.google.com/maps?q=Jernvallen+Sandviken"},
{date:"2026-04-26 13:00", teams:"IFK Värnamo – IK Oddevold"},
{date:"2026-05-03 13:00", teams:"Östersunds FK – IFK Värnamo", arena:"Jämtkraft Arena", map:"https://www.google.com/maps?q=Jämtkraft+Arena"},
{date:"2026-05-08 19:00", teams:"Varbergs BoIS FC – IFK Värnamo", arena:"Påskbergsvallen", map:"https://www.google.com/maps?q=Påskbergsvallen"},
{date:"2026-05-12 19:00", teams:"IFK Värnamo – Örebro SK"},
{date:"2026-05-17 17:00", teams:"IFK Värnamo – Norrby IF"},
{date:"2026-05-23 17:00", teams:"Falkenbergs FF – IFK Värnamo", arena:"Falcon Arena", map:"https://www.google.com/maps?q=Falcon+Arena+Falkenberg"},
{date:"2026-05-31 15:00", teams:"IFK Värnamo – Nordic United FC"},
{date:"2026-06-09 19:00", teams:"Östers IF – IFK Värnamo", arena:"Spiris Arena", map:"https://www.google.com/maps?q=Spiris+Arena+Växjö"},
{date:"2026-06-16 19:00", teams:"IFK Värnamo – Helsingborgs IF"},
{date:"2026-06-21 15:00", teams:"IK Brage – IFK Värnamo", arena:"Borlänge Energi Arena", map:"https://www.google.com/maps?q=Borlänge+Energi+Arena"},
{date:"2026-06-28 15:00", teams:"Landskrona BoIS – IFK Värnamo", arena:"Landskrona IP", map:"https://www.google.com/maps?q=Landskrona+IP"},
{date:"2026-07-19 15:00", teams:"IFK Värnamo – Ljungskile SK"}
];

function formatDate(d){
const dateStr = d.toLocaleDateString("sv-SE", {weekday:"short",day:"numeric",month:"short"});
const timeStr = d.toLocaleTimeString("sv-SE", {hour:"2-digit",minute:"2-digit"});
return `${dateStr} kl ${timeStr}`;
}

function showManual(){

const now = new Date();

const upcoming = manualMatches
.filter(m => new Date(m.date) >= now)
.sort((a,b)=> new Date(a.date) - new Date(b.date));

let html="";

if(upcoming.length){
const next = upcoming[0];
html+=`
<div class="nextMatch">
<b>NÄSTA MATCH</b><br>
${next.teams}<br>
${formatDate(new Date(next.date))}
</div>`;
}

upcoming.forEach(m=>{

const d = new Date(m.date);
const isHome = m.teams.startsWith("IFK Värnamo");

const badge = isHome 
? '<span class="badge home">HEMMA</span>' 
: '<span class="badge away">BORTA</span>';

let arenaHtml = "";
if(!isHome && m.arena && m.map){
arenaHtml = `<a class="arenaLink" href="${m.map}" target="_blank">📍 ${m.arena}</a>`;
}

html+=`
<div class="matchCard">
<div class="matchTeams">${m.teams} ${badge}</div>
<div class="matchTime">${formatDate(d)}</div>
${arenaHtml}
</div>`;
});

document.getElementById("matches").innerHTML = html;
}

showManual();
</script>

</body>
</html>

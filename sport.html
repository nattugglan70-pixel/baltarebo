<!-- 
========================================================
IFK VÄRNAMO SPORTBAR – OFFICIELL VERSION 1.2
========================================================

Bas: Version 1.1
Plats: Baltarebo / sport.html
Status: Stabil

NYTT I v1.2
- Nyhetsrad vänster i header
- IFK + logga centrerad
- Höger header reserverad för framtida moduler
- Stabil RSS-hämtning
- Fungerande IFK-logga
- Versionsnummer visas på sidan (guld)

v1.1
- Versionsvisning i guld
- RSS nyheter
- Stabil grundlayout
- API redo matcher/tabell

KOMMANDE
v1.3 Live matchläge
v2.0 Mega-dashboard

Skapad: 2026
========================================================
--><!DOCTYPE html><html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IFK Värnamo Sportbar</title><style>
body{
margin:0;
background:radial-gradient(circle at top,#111827,#05070a);
color:white;
font-family:Arial, Helvetica, sans-serif;
}

/* HEADER GRID */
.topbar{
display:grid;
grid-template-columns: 1fr auto 1fr;
align-items:center;
padding:18px 30px 10px 30px;
}

/* LEFT NEWS */
.newsTicker{
font-size:15px;
opacity:0.9;
white-space:nowrap;
overflow:hidden;
}

.newsTicker a{
color:#ccc;
text-decoration:none;
margin-right:18px;
}

.newsTicker a:hover{color:#00ff88;}

/* CENTER LOGO */
.centerHead{
display:flex;
align-items:center;
gap:18px;
justify-content:center;
}

.logo{width:55px;}
.header{font-size:44px;font-weight:bold;letter-spacing:1px;}

/* RIGHT EMPTY (future modules) */
.rightBox{text-align:right;}

/* SUB */
.sub{text-align:center;font-size:20px;color:#00ff88;margin-bottom:15px;}

/* GRID */
.container{
display:grid;
grid-template-columns: 1.4fr 1fr;
gap:25px;
padding:20px 40px;
}

.panel{
background:#0c1118;
border-radius:18px;
padding:25px;
box-shadow:0 0 40px rgba(0,0,0,0.7);
position:relative;
}

.version{
position:absolute;
top:12px;
right:18px;
color:gold;
font-size:14px;
opacity:0.9;
}

.big{font-size:28px;margin-bottom:15px;}
.countdown{font-size:42px;color:#00ff88;margin-bottom:20px;font-weight:bold;}
.info{font-size:20px;color:#aaa;}

table{width:100%;border-collapse:collapse;font-size:18px;}
td,th{padding:10px;border-bottom:1px solid #222;}
.highlight{color:#00ff88;font-weight:bold;}

.footer{text-align:center;opacity:0.3;font-size:12px;padding:8px;}
</style></head><body><div class="topbar"><div class="newsTicker" id="news">
Laddar IFK-nyheter…
</div><div class="centerHead">
<img class="logo" src="https://upload.wikimedia.org/wikipedia/sv/thumb/5/5f/IFK_V%C3%A4rnamo_logo.svg/512px-IFK_V%C3%A4rnamo_logo.svg.png">
<div class="header">IFK VÄRNAMO</div>
</div><div class="rightBox">
<!-- framtida moduler -->
</div></div><div class="sub">Superettan 2026</div><div class="container"><div class="panel">
<div class="big" id="nextMatch">Väntar på spelschema…</div>
<div class="countdown" id="countdown">--</div>
<div class="info" id="status">Matchschema fastställs av förbundet</div>
</div><div class="panel">
<div class="version">v1.2</div>
<h2>Superettan lag 2026</h2>
<table id="table"></table>
</div></div><div class="footer">Sportbar aktiv</div><script>
const TEAM="IFK Värnamo";
const LEAGUE="4403";

/* lag */
const teams=[
"IFK Värnamo","Helsingborgs IF","GIF Sundsvall","Östers IF",
"Utsiktens BK","Trelleborgs FF","Östersunds FK","Gefle IF",
"Skövde AIK","Varbergs BoIS","IK Brage","Landskrona BoIS",
"Örgryte IS","Sandvikens IF","Falkenbergs FF","Oddevold"
];

function showTeams(){
let html="<tr><th>Lag</th></tr>";
teams.forEach(t=>{
let hl=t===TEAM?"class='highlight'":"";
html+=`<tr ${hl}><td>${t}</td></tr>`;
});
document.getElementById("table").innerHTML=html;
}

/* countdown */
function startCountdown(dateStr){
function update(){
const match=new Date(dateStr+"T19:00:00").getTime();
const now=new Date().getTime();
const diff=match-now;
if(diff<0)return;

const d=Math.floor(diff/86400000);
const h=Math.floor((diff%86400000)/3600000);
const m=Math.floor((diff%3600000)/60000);

document.getElementById("countdown").innerHTML=
d+"d "+h+"h "+m+"m";
}
update();
setInterval(update,60000);
}

/* matcher */
async function loadMatches(){
try{
const t=await fetch(`https://www.thesportsdb.com/api/v1/json/3/searchteams.php?t=${TEAM}`);
const td=await t.json();
const id=td.teams[0].idTeam;

const res=await fetch(`https://www.thesportsdb.com/api/v1/json/3/eventsnext.php?id=${id}`);
const data=await res.json();

if(!data.events)return;

const m=data.events[0];

document.getElementById("nextMatch").innerHTML=
m.strHomeTeam+" vs "+m.strAwayTeam;

document.getElementById("status").innerHTML=
"Nästa match: "+m.dateEvent;

startCountdown(m.dateEvent);

}catch{}
}

/* tabell */
async function loadTable(){
const year=new Date().getFullYear();
try{
const res=await fetch(`https://www.thesportsdb.com/api/v1/json/3/lookuptable.php?l=${LEAGUE}&s=${year}`);
const data=await res.json();

if(!data.table || data.table.length<10){
showTeams();
return;
}

let html="<tr><th>#</th><th>Lag</th><th>P</th></tr>";
data.table.forEach(t=>{
let hl=t.strTeam===TEAM?"class='highlight'":"";
html+=`<tr ${hl}><td>${t.intRank}</td><td>${t.strTeam}</td><td>${t.intPoints}</td></tr>`;
});

document.getElementById("table").innerHTML=html;

}catch{showTeams();}
}

/* NYHETER */
async function loadNews(){
try{
const res=await fetch("https://api.allorigins.win/get?url="+encodeURIComponent("https://ifkvarnamo.se/feed/"));
const data=await res.json();
const xml=new window.DOMParser().parseFromString(data.contents,"text/xml");
const items=xml.querySelectorAll("item");

let html="";
for(let i=0;i<3;i++){
const title=items[i].querySelector("title").textContent;
const link=items[i].querySelector("link").textContent;
html+=`<a href="${link}" target="_blank">${title}</a>`;
}
document.getElementById("news").innerHTML=html;
}catch{
document.getElementById("news").innerHTML="IFK-nyheter laddas…";
}
}

function init(){
showTeams();
loadMatches();
loadTable();
loadNews();
}

init();
setInterval(init,300000);
</script></body>
</html>

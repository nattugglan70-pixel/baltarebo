<!-- 
========================================================
IFK VÄRNAMO SPORTBAR – VERSION 1.7
========================================================
Senaste uppdatering:
- Stabil fungerande IFK-nyheter (3 senaste)
- Guld "Superettan 2026"
- IFK-bakgrund med starkare synlighet
- Klassisk tabell
- IFK guld + glow i tabell
- Optimerad layout för TV

Denna är nu huvudversion.
========================================================
--><!DOCTYPE html><html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet"><title>IFK Värnamo Sportbar</title><style>
body{
margin:0;
background:#05070a;
color:white;
font-family:Arial, Helvetica, sans-serif;
overflow-x:hidden;
}

/* BAKGRUND IFK */
body::before{
content:"";
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:950px;
height:950px;
background:url("IFK.png") no-repeat center;
background-size:contain;
opacity:0.22;
filter:blur(0.6px);
pointer-events:none;
z-index:0;
}

/* HEADER */
.topbar{
display:grid;
grid-template-columns: 1fr auto 1fr;
align-items:center;
padding:18px 30px 10px 30px;
position:relative;
z-index:2;
}

.newsTicker{
font-size:15px;
opacity:0.95;
white-space:nowrap;
overflow:hidden;
}

.newsTicker a{
color:#ccc;
text-decoration:none;
margin-right:24px;
}
.newsTicker a:hover{color:gold;}

.centerHead{
display:flex;
align-items:center;
justify-content:center;
}

.header{
font-family:'Orbitron', sans-serif;
font-size:52px;
font-weight:700;
letter-spacing:4px;
color:#f1f1f1;
text-shadow:0 0 14px rgba(0,255,150,0.25);
}

.sub{
text-align:center;
font-size:22px;
color:gold;
margin-bottom:18px;
position:relative;
z-index:2;
letter-spacing:2px;
}

.container{
display:grid;
grid-template-columns: 1.4fr 1fr;
gap:25px;
padding:20px 40px;
position:relative;
z-index:2;
}

.panel{
background:#0c1118ee;
backdrop-filter:blur(3px);
border-radius:18px;
padding:25px;
box-shadow:0 0 40px rgba(0,0,0,0.7);
position:relative;
}

.version{
position:absolute;
top:12px;
right:18px;
color:gold;
font-size:14px;
opacity:0.95;
}

.big{font-size:28px;margin-bottom:15px;}
.countdown{font-size:42px;color:#00ff88;margin-bottom:20px;font-weight:bold;}
.info{font-size:20px;color:#aaa;}

table{width:100%;border-collapse:collapse;font-size:18px;}
td,th{padding:10px;border-bottom:1px solid #222;}
th{text-align:left;}

.ifkRow{
color:gold;
font-weight:bold;
text-shadow:0 0 10px rgba(255,215,0,0.8);
}

.footer{
text-align:center;
opacity:0.25;
font-size:12px;
padding:8px;
position:relative;
z-index:2;
}
</style></head><body><div class="topbar">
<div class="newsTicker" id="news">Laddar IFK-nyheter…</div>
<div class="centerHead">
<div class="header">IFK VÄRNAMO</div>
</div>
<div></div>
</div><div class="sub">Superettan 2026</div><div class="container"><div class="panel">
<div class="big" id="nextMatch">Väntar på spelschema…</div>
<div class="countdown" id="countdown">--</div>
<div class="info" id="status">Matchschema fastställs</div>
</div><div class="panel">
<div class="version">v1.7</div>
<h2>Tabell</h2>
<table id="table"></table>
</div></div><div class="footer">Sportbar aktiv</div><script>
const TEAM="IFK Värnamo";
const LEAGUE="4403";

const teams=[
"IFK Värnamo","Helsingborgs IF","GIF Sundsvall","Östers IF",
"Utsiktens BK","Trelleborgs FF","Östersunds FK","Gefle IF",
"Skövde AIK","Varbergs BoIS","IK Brage","Landskrona BoIS",
"Örgryte IS","Sandvikens IF","Falkenbergs FF","Oddevold"
];

function showTeams(){
let html="<tr><th>#</th><th>Lag</th><th>P</th><th>+/-</th></tr>";
teams.forEach((t,i)=>{
let rowClass=t===TEAM?"class='ifkRow'":"";
html+=`<tr ${rowClass}><td>${i+1}</td><td>${t}</td><td>0</td><td>0</td></tr>`;
});
document.getElementById("table").innerHTML=html;
}

async function loadTable(){
const year=new Date().getFullYear();
try{
const res=await fetch(`https://www.thesportsdb.com/api/v1/json/3/lookuptable.php?l=${LEAGUE}&s=${year}`);
const data=await res.json();
if(!data.table){showTeams();return;}

let html="<tr><th>#</th><th>Lag</th><th>P</th><th>+/-</th></tr>";
data.table.forEach(t=>{
let rowClass=t.strTeam===TEAM?"class='ifkRow'":"";
let diff=(parseInt(t.intGoalsFor||0)-parseInt(t.intGoalsAgainst||0));
html+=`<tr ${rowClass}><td>${t.intRank}</td><td>${t.strTeam}</td><td>${t.intPoints}</td><td>${diff}</td></tr>`;
});
document.getElementById("table").innerHTML=html;
}catch{showTeams();}
}

/* STABIL NYHETER */
async function loadNews(){
try{
const res=await fetch("https://api.allorigins.win/raw?url="+encodeURIComponent("https://ifkvarnamo.se/feed/"));
const text=await res.text();
const parser=new DOMParser();
const xml=parser.parseFromString(text,"text/xml");
const items=xml.querySelectorAll("item");

let html="";
for(let i=0;i<3;i++){
const title=items[i].querySelector("title").textContent;
const link=items[i].querySelector("link").textContent;
html+=`<a href="${link}" target="_blank">${title}</a>`;
}
document.getElementById("news").innerHTML=html;

}catch{
document.getElementById("news").innerHTML="IFK Värnamo";
}
}

function init(){
showTeams();
loadTable();
loadNews();
}
init();
setInterval(init,300000);
</script></body>
</html>
